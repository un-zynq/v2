<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="dynamic-title">HRN | GAMES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #030508;
            --accent: #89b4fa;
            --ui-silver: rgba(235, 240, 255, .85);
            --ui-border: rgba(255, 255, 255, .1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--ui-silver);
            font-family: Inter, sans-serif;
            overflow-x: hidden;
            height: 100vh;
            text-transform: uppercase;
        }

        /* EXACTE ACHTERGROND REPRODUCTIE */
        .ambient-bg {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background-size: cover;
            background-position: center;
            opacity: 0;
            filter: brightness(.7);
            transition: 2.5s cubic-bezier(.4, 0, .2, 1);
        }

        .ambient-bg.loaded {
            opacity: 1;
        }

        .overlay-dim {
            position: fixed;
            inset: 0;
            z-index: 2;
            background: rgba(0, 0, 0, .3);
            pointer-events: none;
        }

        /* CONTENT LAYER */
        .wrapper {
            position: relative;
            z-index: 10;
            padding: 60px 40px;
            min-height: 100vh;
            opacity: 0;
            transform: scale(1.02);
            transition: 1.5s cubic-bezier(.16, 1, .3, 1);
            overflow-y: auto;
            height: 100vh;
        }

        .wrapper.active {
            opacity: 1;
            transform: scale(1);
        }

        .header-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 50px;
            max-width: 1600px;
            margin-left: auto;
            margin-right: auto;
        }

        .title-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .category {
            font-size: 9px;
            letter-spacing: 5px;
            color: var(--accent);
            font-weight: 900;
        }

        .main-title {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -1px;
            color: #fff;
        }

        .close-btn {
            width: 58px;
            height: 58px;
            border-radius: 18px;
            background: rgba(0, 0, 0, .4);
            border: 1px solid var(--ui-border);
            color: var(--ui-silver);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: .4s cubic-bezier(.16, 1, .3, 1);
            backdrop-filter: blur(12px);
        }

        .close-btn:hover {
            opacity: 1;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, .35);
            background: rgba(255, 255, 255, .1);
            transform: scale(1.08) translateY(-2px);
        }

        /* GRID STYLING - EXACTE REPRODUCTIE */
        #games-grid {
            display: grid;
            gap: 25px;
            max-width: 1600px;
            margin: 0 auto;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            padding-bottom: 100px;
        }

        @media (min-width: 1200px) {
            #games-grid { grid-template-columns: repeat(5, 1fr); }
        }

        .game-card {
            position: relative;
            aspect-ratio: 16/10;
            background: rgba(0, 0, 0, .4);
            border: 1px solid var(--ui-border);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: .4s cubic-bezier(.16, 1, .3, 1);
            backdrop-filter: blur(12px);
            opacity: 0;
            transform: translateY(15px);
        }
        
        /* LAZY LOADING VISIBILITY */
        .game-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            background: rgba(255, 255, 255, 0.05);
        }

        .game-img {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .game-img.loaded {
            opacity: 0.5;
        }

        .game-card:hover .game-img.loaded {
            opacity: 0.8;
            transform: scale(1.1);
        }

        .game-info {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(to top, rgba(3,5,8,0.9), transparent);
            text-align: center;
        }

        .game-name {
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 2px;
            color: #fff;
        }

        /* Scrollbar verbergen */
        .wrapper::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>

    <div class="ambient-bg" id="bg"></div>
    <div class="overlay-dim"></div>

    <div class="wrapper" id="ui-layer">
        <div class="header-box">
            <div class="title-group">
                <span class="category">DATABASE</span>
                <span class="main-title">GAMES</span>
            </div>
            <div class="close-btn" onclick="window.parent.postMessage('close', '*')">
                <i data-lucide="x"></i>
            </div>
        </div>

        <div id="games-grid">
            </div>
    </div>

    <script>
        lucide.createIcons();
        const $ = id => document.getElementById(id);
        const DB_NAME = "hrn_db";
        const defaultBg = "https://img.freepik.com/free-vector/black-background-with-wavy-lines_52683-76524.jpg";

        // 1. ACHTERGROND LOGICA (IndexedDB & LocalStorage Sync)
        function initDB() {
            return new Promise(resolve => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onsuccess = e => resolve(e.target.result);
                req.onerror = () => resolve(null);
            });
        }

        async function loadBackground() {
            const db = await initDB();
            if (!db) return updateBg(defaultBg);

            const tx = db.transaction('background', 'readonly');
            const store = tx.objectStore('background');
            const req = store.get('current_bg');

            req.onsuccess = () => {
                const val = req.result ? req.result.value : defaultBg;
                updateBg(val);
            };
            req.onerror = () => updateBg(defaultBg);
        }

        function updateBg(val) {
            const bgLayer = $('bg');
            let displayUrl = defaultBg;
            if (val instanceof Blob) displayUrl = URL.createObjectURL(val);
            else if (typeof val === 'string' && val.length > 0) displayUrl = val;
            
            bgLayer.style.backgroundImage = `url('${displayUrl}')`;
            bgLayer.classList.add('loaded');
        }

        // 2. STYLING SYNC (Accent Kleur)
        const accent = localStorage.getItem('hrn_clr') || "#89b4fa";
        document.documentElement.style.setProperty('--accent', accent);

        // 3. LAZY LOADING LOGICA (Intersection Observer)
        const observerOptions = {
            rootMargin: '0px 0px 200px 0px', // Laad afbeeldingen 200px voordat ze in beeld komen
            threshold: 0.1
        };

        const cardObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const card = entry.target;
                    const img = card.querySelector('.game-img');
                    const realSrc = img.getAttribute('data-src');
                    
                    if (realSrc) {
                        const tempImg = new Image();
                        tempImg.src = realSrc;
                        tempImg.onload = () => {
                            img.style.backgroundImage = `url('${realSrc}')`;
                            img.classList.add('loaded');
                        };
                    }
                    
                    card.classList.add('visible');
                    cardObserver.unobserve(card); // Stop met observeren na laden
                }
            });
        }, observerOptions);

        // 4. FETCH & RENDER
        async function initGames() {
            await loadBackground(); // Eerst de bg laden
            
            try {
                const res = await fetch('https://un-zynq.github.io/games2.json');
                const data = await res.json();
                const grid = $('games-grid');
                grid.innerHTML = '';
                
                data.forEach(groupWrapper => {
                    const groupKey = Object.keys(groupWrapper)[0];
                    const games = groupWrapper[groupKey];

                    Object.values(games).forEach(game => {
                        const card = document.createElement('div');
                        card.className = 'game-card';
                        
                        // Placeholder image met naam van de game
                        const thumb = `https://placehold.co/600x400/030508/${accent.replace('#','')}/?text=${encodeURIComponent(game.name)}`;
                        
                        card.innerHTML = `
                            <div class="game-img" data-src="${thumb}"></div>
                            <div class="game-info">
                                <div class="game-name">${game.name}</div>
                            </div>
                        `;

                        card.onclick = () => window.parent.location.href = `/game/${game.alias}`;
                        grid.appendChild(card);
                        cardObserver.observe(card); // Start lazy loading observatie
                    });
                });

                // Fade-in animatie voor de hele container
                setTimeout(() => $('ui-layer').classList.add('active'), 100);

            } catch (e) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; font-size: 10px; opacity: 0.5;">FAILED TO SYNC DATABASE</div>`;
                console.error("Sync error:", e);
            }
        }

        window.onload = initGames;
    </script>
</body>
</html>
