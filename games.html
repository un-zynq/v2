<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #030508;
            --accent: #89b4fa;
            --ui-silver: rgba(235, 240, 255, .85);
            --ui-border: rgba(255, 255, 255, .1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            color: var(--ui-silver);
            font-family: Inter, sans-serif;
            overflow-x: hidden;
            height: 100vh;
            text-transform: uppercase;
        }

        /* BG REPRODUCTIE */
        .ambient-bg {
            position: fixed; inset: 0; z-index: 1;
            background-size: cover; background-position: center;
            opacity: 0; filter: brightness(.7);
            transition: 2.5s cubic-bezier(.4, 0, .2, 1);
        }
        .ambient-bg.loaded { opacity: 1; }
        .overlay-dim { position: fixed; inset: 0; z-index: 2; background: rgba(0, 0, 0, .3); pointer-events: none; }

        /* WRAPPER & SCROLL */
        .wrapper {
            position: relative; z-index: 10;
            height: 100vh; overflow-y: auto;
            padding: 60px 40px; opacity: 0;
            transition: opacity 1s ease;
            scrollbar-width: none;
        }
        .wrapper::-webkit-scrollbar { display: none; }
        .wrapper.active { opacity: 1; }

        .header-box {
            display: flex; align-items: center; justify-content: space-between;
            max-width: 1600px; margin: 0 auto 50px auto;
        }

        .title-group { display: flex; flex-direction: column; gap: 8px; }
        .category { font-size: 9px; letter-spacing: 5px; color: var(--accent); font-weight: 900; }
        .main-title { font-size: 24px; font-weight: 900; letter-spacing: -1px; color: #fff; }

        .close-btn {
            width: 58px; height: 58px; border-radius: 18px;
            background: rgba(0, 0, 0, .4); border: 1px solid var(--ui-border);
            color: var(--ui-silver); display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: .4s cubic-bezier(.16, 1, .3, 1);
            backdrop-filter: blur(12px);
        }
        .close-btn:hover { transform: scale(1.08); border-color: rgba(255, 255, 255, .3); background: rgba(255, 255, 255, .1); }

        /* GRID */
        #games-grid {
            display: grid; gap: 25px; max-width: 1600px; margin: 0 auto;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            padding-bottom: 100px;
        }
        @media (min-width: 1200px) { #games-grid { grid-template-columns: repeat(5, 1fr); } }

        /* CARD & LAZY LOADING */
        .game-card {
            position: relative; aspect-ratio: 16/10;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--ui-border); border-radius: 20px;
            overflow: hidden; cursor: pointer;
            transition: .4s cubic-bezier(.16, 1, .3, 1);
            backdrop-filter: blur(12px);
            opacity: 0; transform: translateY(10px);
        }
        .game-card.visible { opacity: 1; transform: translateY(0); }
        .game-card:hover { transform: translateY(-8px); border-color: var(--accent); background: rgba(255, 255, 255, 0.05); }

        .game-img {
            width: 100%; height: 100%;
            background-size: cover; background-position: center;
            opacity: 0; transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .game-img.loaded { opacity: 0.5; }
        .game-card:hover .game-img.loaded { opacity: 0.8; transform: scale(1.05); }

        .game-info {
            position: absolute; bottom: 0; width: 100%; padding: 20px;
            background: linear-gradient(to top, rgba(3,5,8,0.9), transparent);
            text-align: center;
        }
        .game-name { font-size: 10px; font-weight: 900; letter-spacing: 2px; color: #fff; }
    </style>
</head>
<body>

    <div class="ambient-bg" id="bg"></div>
    <div class="overlay-dim"></div>

    <div class="wrapper" id="ui-layer">
        <div class="header-box">
            <div class="title-group">
                <span class="category">DATABASE</span>
                <span class="main-title">GAMES</span>
            </div>
            <div class="close-btn" onclick="window.parent.postMessage('close', '*')">
                <i data-lucide="x"></i>
            </div>
        </div>
        <div id="games-grid"></div>
    </div>

    <script>
        lucide.createIcons();
        const $ = id => document.getElementById(id);
        const accent = localStorage.getItem('hrn_clr') || "#89b4fa";
        document.documentElement.style.setProperty('--accent', accent);

        // 1. ACHTERGROND LADEN (IndexedDB)
        async function loadBackground() {
            const req = indexedDB.open("hrn_db", 1);
            req.onsuccess = e => {
                const db = e.target.result;
                try {
                    const store = db.transaction('background', 'readonly').objectStore('background');
                    const getReq = store.get('current_bg');
                    getReq.onsuccess = () => {
                        const val = getReq.result ? getReq.result.value : null;
                        const url = val instanceof Blob ? URL.createObjectURL(val) : (val || "https://img.freepik.com/free-vector/black-background-with-wavy-lines_52683-76524.jpg");
                        $('bg').style.backgroundImage = `url('${url}')`;
                        $('bg').classList.add('loaded');
                    };
                } catch(err) { updateBgDefault(); }
            };
            req.onerror = updateBgDefault;
        }
        function updateBgDefault() {
            $('bg').style.backgroundImage = `url('https://img.freepik.com/free-vector/black-background-with-wavy-lines_52683-76524.jpg')`;
            $('bg').classList.add('loaded');
        }

        // 2. LAZY LOADING LOGICA
        const observerOptions = { root: $('ui-layer'), rootMargin: '0px 0px 200px 0px', threshold: 0.1 };
        
        const cardObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const card = entry.target;
                    const img = card.querySelector('.game-img');
                    const realSrc = img.getAttribute('data-src');
                    
                    // Start laden van img
                    if (realSrc) {
                        const tempImg = new Image();
                        tempImg.src = realSrc;
                        tempImg.onload = () => {
                            img.style.backgroundImage = `url('${realSrc}')`;
                            img.classList.add('loaded');
                        };
                    }
                    
                    card.classList.add('visible');
                    cardObserver.unobserve(card);
                }
            });
        }, observerOptions);

        // 3. FETCH & BUILD
        async function init() {
            await loadBackground();
            try {
                const res = await fetch('https://un-zynq.github.io/games2.json');
                const data = await res.json();
                const grid = $('games-grid');
                
                data.forEach(groupWrapper => {
                    const groupKey = Object.keys(groupWrapper)[0];
                    const games = groupWrapper[groupKey];

                    Object.values(games).forEach(game => {
                        const card = document.createElement('div');
                        card.className = 'game-card';
                        
                        const thumbUrl = `https://placehold.co/600x400/030508/${accent.replace('#','')}/?text=${encodeURIComponent(game.name)}`;
                        
                        card.innerHTML = `
                            <div class="game-img" data-src="${thumbUrl}"></div>
                            <div class="game-info">
                                <div class="game-name">${game.name}</div>
                            </div>
                        `;

                        card.onclick = () => window.parent.location.href = `/game/${game.alias}`;
                        grid.appendChild(card);
                        cardObserver.observe(card);
                    });
                });

                $('ui-layer').classList.add('active');
            } catch (e) { console.error(e); }
        }

        window.onload = init;
    </script>
</body>
</html>
