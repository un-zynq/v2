<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games</title>
    <style>
        :root {
            --accent: #89b4fa;
            --border: rgba(255, 255, 255, .08);
            --text: rgba(255, 255, 255, .92);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            color: var(--text);
            overflow: hidden;
            background: #000;
        }
        #bg {
            position: fixed;
            inset: -20px;
            background-size: cover;
            background-position: center;
            filter: brightness(.3) blur(20px); 
            z-index: 0;
            transform: translateZ(0);
        }
        #wrap {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 25px;
            z-index: 10;
        }
        #header {
            flex-shrink: 0;
            margin-bottom: 20px;
        }
        #title-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }
        #close {
            cursor: pointer;
            opacity: .6;
            display: flex;
        }
        #close:hover { opacity: 1; }
        #close svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 2.5; fill: none; }
        h1 { font-size: 20px; letter-spacing: 0.5px; font-weight: 600; opacity: 0.9; }
        #search {
            width: 100%;
            background: rgba(255, 255, 255, .06);
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: 10px;
            color: #fff;
            outline: none;
            font-size: 14px;
        }
        
        #viewport {
            flex: 1;
            overflow-y: auto;
            position: relative;
            contain: size layout style;
            scrollbar-width: none; 
            -ms-overflow-style: none; 
        }
        #viewport::-webkit-scrollbar { display: none; }

        #spacer {
            position: absolute;
            top: 0; left: 0; right: 0;
            pointer-events: none;
        }
        #grid {
            position: absolute;
            top: 0; left: 0; right: 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
            gap: 10px;
            will-change: transform;
            transform: translate3d(0,0,0);
        }
        .card {
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            height: 72px;
            padding: 10px;
            user-select: none;
            transition: background 0.1s;
        }
        .card:hover {
            background: rgba(255, 255, 255, .1);
            border-color: rgba(255, 255, 255, .15);
        }
    </style>
</head>
<body>

<div id="bg"></div>

<div id="wrap">
    <div id="header">
        <div id="title-container">
            <div id="close" onclick="window.parent.postMessage('close', '*')">
                <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
            </div>
            <h1>Games</h1>
        </div>
        <input id="search" placeholder="Search games..." autocomplete="off">
    </div>
    
    <div id="viewport">
        <div id="spacer"></div>
        <div id="grid"></div>
    </div>
</div>

<script>
    const viewport = document.getElementById('viewport');
    const grid = document.getElementById('grid');
    const spacer = document.getElementById('spacer');
    const search = document.getElementById('search');
    const bg = document.getElementById('bg');

    let allGames = [];
    let filteredGames = [];
    
    const CARD_HEIGHT = 72;
    const GAP = 10;
    const OVERSCAN = 5;
    let columns = 0;
    let ticking = false;

    function openGame(alias, group) {
        const url = `${window.location.origin}/${group}/${alias}`;
        const win = window.open('about:blank', '_blank');
        if (!win) return;

        const doc = win.document;
        doc.open();
        doc.write(`
            <!DOCTYPE html>
            <html style="margin:0;padding:0;height:100%;overflow:hidden;">
                <head>
                    <meta charset="UTF-8">
                    <title>\u200E</title>
                    <link rel="icon" href="data:image/x-icon;base64,AAABAAEAAQEAAAEAIAAwAAAAFgAAACgAAAABAAAAAgAAAAEAIAAAAAAABAAAAAAAAAAAAAAAAAAAAAAAAAAAAP//AAAAAA==">
                    <style>
                        * { margin: 0; padding: 0; border: none; outline: none; }
                        body, html { height: 100%; width: 100%; background: #000; overflow: hidden; }
                        iframe { width: 100vw; height: 100vh; display: block; border: none; }
                    </style>
                </head>
                <body><iframe src="${url}"></iframe></body>
            </html>
        `);
        doc.close();
    }

    async function applyBackground() {
        const req = indexedDB.open("hrn_db", 1);
        req.onsuccess = e => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains('background')) return;
            const tx = db.transaction('background', 'readonly');
            const store = tx.objectStore('background').get('current_bg');
            store.onsuccess = () => {
                const val = store.result?.value;
                if (val) bg.style.backgroundImage = `url('${val instanceof Blob ? URL.createObjectURL(val) : val}')`;
            };
        };
    }

    function calculateLayout() {
        const containerWidth = viewport.clientWidth;
        columns = Math.floor((containerWidth + GAP) / (155 + GAP)) || 1;
        const rowCount = Math.ceil(filteredGames.length / columns);
        spacer.style.height = `${rowCount * (CARD_HEIGHT + GAP)}px`;
    }

    function updateVirtualScroll() {
        const scrollTop = viewport.scrollTop;
        const rowHeight = CARD_HEIGHT + GAP;
        
        let startRow = Math.max(0, Math.floor(scrollTop / rowHeight) - OVERSCAN);
        const visibleRows = Math.ceil(viewport.clientHeight / rowHeight) + (OVERSCAN * 2);
        
        const startIndex = startRow * columns;
        const endIndex = Math.min(filteredGames.length, (startRow + visibleRows) * columns);

        grid.style.transform = `translate3d(0, ${startRow * rowHeight}px, 0)`;

        let html = '';
        for (let i = startIndex; i < endIndex; i++) {
            const game = filteredGames[i];
            html += `<div class="card" onclick="openGame('${game.alias}', '${game.group}')">${game.name}</div>`;
        }
        grid.innerHTML = html;
        ticking = false;
    }

    async function loadGames() {
        try {
            const res = await fetch("https://un-zynq.github.io/games2.json");
            const rawData = await res.json();
            
            allGames = [];
            
            // Loop door elk object in de array (meestal is er maar 1, maar dit pakt alles)
            rawData.forEach(entry => {
                // Loop door g1, g2, g3, etc.
                for (const groupKey in entry) {
                    const gamesInGroup = entry[groupKey];
                    // Loop door de individuele game objecten
                    for (const gameId in gamesInGroup) {
                        const gameData = gamesInGroup[gameId];
                        allGames.push({
                            name: gameData.name,
                            alias: gameData.alias,
                            group: groupKey
                        });
                    }
                }
            });

            filteredGames = allGames;
            calculateLayout();
            updateVirtualScroll();
        } catch(e) { console.error("Error loading games:", e); }
    }

    search.addEventListener("input", () => {
        const q = search.value.toLowerCase().trim();
        filteredGames = allGames.filter(g => 
            g.name.toLowerCase().includes(q) || g.alias.toLowerCase().includes(q)
        );
        viewport.scrollTop = 0;
        calculateLayout();
        updateVirtualScroll();
    });

    viewport.addEventListener('scroll', () => {
        if (!ticking) {
            window.requestAnimationFrame(() => {
                updateVirtualScroll();
                ticking = false;
            });
            ticking = true;
        }
    }, { passive: true });

    window.addEventListener('resize', () => {
        calculateLayout();
        updateVirtualScroll();
    });

    applyBackground();
    loadGames();
</script>
</body>
</html>
