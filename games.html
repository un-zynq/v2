<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games</title>
    <style>
        :root {
            --accent: #89b4fa;
            --border: rgba(255, 255, 255, .08);
            --text: rgba(255, 255, 255, .92);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Inter, sans-serif;
            color: var(--text);
            overflow: hidden;
            background: #000;
        }

        #bg {
            position: fixed;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: brightness(.65) saturate(1.1);
            z-index: 0;
        }

        #overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, rgba(0, 0, 0, .25), rgba(0, 0, 0, .7));
            backdrop-filter: blur(6px);
            z-index: 1;
        }

        #wrap {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 28px 26px 18px 26px;
            z-index: 10;
        }

        #header {
            flex-shrink: 0;
            margin-bottom: 14px;
            z-index: 20;
        }

        #title-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        #close {
            cursor: pointer;
            opacity: .6;
            transition: .2s;
            display: flex;
        }

        #close:hover { opacity: 1; }
        #close svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2.5; fill: none; }

        h1 { font-size: 20px; letter-spacing: 1px; opacity: .85; font-weight: 600; }

        #search {
            width: 100%;
            background: rgba(255, 255, 255, .06);
            border: 1px solid var(--border);
            padding: 14px 16px;
            border-radius: 14px;
            color: #fff;
            outline: none;
            font-size: 13px;
        }

        #viewport {
            flex: 1;
            overflow-y: auto;
            position: relative;
            padding-right: 4px;
            /* Browser optimalisaties */
            contain: size layout style; 
        }

        #viewport::-webkit-scrollbar { width: 5px; }
        #viewport::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 10px; }

        #spacer {
            position: absolute;
            top: 0; left: 0; right: 0;
            pointer-events: none;
        }

        #grid {
            position: absolute;
            top: 0; left: 0; right: 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 14px;
            /* Forceer GPU rendering */
            will-change: transform;
            transform: translateZ(0); 
        }

        .card {
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 11px;
            letter-spacing: 1px;
            cursor: pointer;
            height: 82px;
            padding: 10px;
            transition: background .2s;
            color: inherit;
            /* Voorkom tekst selectie tijdens snel scrollen */
            user-select: none;
        }

        .card:hover {
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .25);
        }
    </style>
</head>
<body>

<div id="bg"></div>
<div id="overlay"></div>

<div id="wrap">
    <div id="header">
        <div id="title-container">
            <div id="close" onclick="window.parent.postMessage('close', '*')">
                <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
            </div>
            <h1>Games</h1>
        </div>
        <input id="search" placeholder="Search games..." autocomplete="off">
    </div>
    
    <div id="viewport">
        <div id="spacer"></div>
        <div id="grid"></div>
    </div>
</div>

<script>
    const viewport = document.getElementById('viewport');
    const grid = document.getElementById('grid');
    const spacer = document.getElementById('spacer');
    const search = document.getElementById('search');
    const bg = document.getElementById('bg');

    let allGames = [], filteredGames = [];
    const CARD_HEIGHT = 82;
    const GAP = 14;
    const OVERSCAN_ROWS = 4; // Hoeveel rijen buiten beeld we alvast laden

    let columns = 0;
    let ticking = false;

    async function applyBackground() {
        try {
            const req = indexedDB.open("hrn_db", 1);
            req.onsuccess = e => {
                const db = e.target.result;
                const tx = db.transaction('background', 'readonly');
                const store = tx.objectStore('background').get('current_bg');
                store.onsuccess = () => {
                    const val = store.result?.value;
                    if (val) bg.style.backgroundImage = `url('${val instanceof Blob ? URL.createObjectURL(val) : val}')`;
                };
            };
        } catch(e) {}
    }

    function calculateLayout() {
        const containerWidth = viewport.clientWidth;
        columns = Math.floor((containerWidth + GAP) / (150 + GAP)) || 1;
        const rowHeight = CARD_HEIGHT + GAP;
        spacer.style.height = `${Math.ceil(filteredGames.length / columns) * rowHeight}px`;
    }

    function updateVirtualScroll() {
        if (filteredGames.length === 0) {
            grid.innerHTML = '';
            return;
        }

        const scrollTop = viewport.scrollTop;
        const rowHeight = CARD_HEIGHT + GAP;
        
        // Bereken bereik met extra buffer (overscan)
        let startRow = Math.floor(scrollTop / rowHeight) - OVERSCAN_ROWS;
        startRow = Math.max(0, startRow);
        
        const visibleRows = Math.ceil(viewport.clientHeight / rowHeight);
        const endRow = startRow + visibleRows + (OVERSCAN_ROWS * 2);

        const startIndex = startRow * columns;
        const endIndex = Math.min(filteredGames.length, endRow * columns);

        // Positioneer de grid precies op de startRow
        grid.style.transform = `translateY(${startRow * rowHeight}px)`;

        // Renderen via Fragment (snelste methode)
        const fragment = document.createDocumentFragment();
        for (let i = startIndex; i < endIndex; i++) {
            const game = filteredGames[i];
            const card = document.createElement('div');
            card.className = 'card';
            card.textContent = game.replaceAll('-', ' ');
            card.onclick = () => window.location.href = `$/game/{game}`;
            fragment.appendChild(card);
        }

        grid.replaceChildren(fragment);
        ticking = false;
    }

    async function loadGames() {
        try {
            const res = await fetch("https://un-zynq.github.io/games.json");
            const data = await res.json();
            allGames = Object.values(data).flat();
            filteredGames = allGames;
            calculateLayout();
            updateVirtualScroll();
        } catch(e) { console.error(e); }
    }

    // Handlers met performance optimalisatie
    search.addEventListener("input", () => {
        const q = search.value.toLowerCase().trim().replace(/[\s-]/g, '');
        filteredGames = allGames.filter(g => 
            g.toLowerCase().replace(/[\s-]/g, '').includes(q)
        );
        viewport.scrollTop = 0;
        calculateLayout();
        updateVirtualScroll();
    });

    viewport.addEventListener('scroll', () => {
        if (!ticking) {
            requestAnimationFrame(updateVirtualScroll);
            ticking = true;
        }
    });

    window.addEventListener('resize', () => {
        calculateLayout();
        updateVirtualScroll();
    });

    window.addEventListener('keydown', e => {
        if(e.key === "Escape") window.parent.postMessage('close', '*');
    });

    applyBackground();
    loadGames();
</script>
</body>
</html>
