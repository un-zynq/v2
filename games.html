<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <base href="https://un-zynq.github.io/">
    <title>HRN | Games</title>
    <link rel="icon" type="image/png" href="/logo.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#030508;--bg-card:rgba(12,16,24,0.85);--border:rgba(255,255,255,0.08);--border-hover:rgba(137,180,250,0.3);--text:rgba(235,240,255,0.95);--text-muted:rgba(235,240,255,0.5);--text-dim:rgba(235,240,255,0.25);--accent:#89b4fa;--accent-soft:rgba(137,180,250,0.15)}*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}html{scroll-behavior:smooth}body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;text-transform:uppercase;scrollbar-width:none;-ms-overflow-style:none}body::-webkit-scrollbar{display:none}#webgl-canvas{position:fixed;inset:0;z-index:1;pointer-events:none}.ambient-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background-size:cover;background-position:center;opacity:0;filter:brightness(0.6);transition:2.5s cubic-bezier(0.4,0,0.2,1)}.ambient-bg.loaded{opacity:1}.overlay-dim{position:fixed;inset:0;z-index:1;background:rgba(3,5,8,0.7);pointer-events:none}#loader{position:fixed;inset:0;z-index:10000;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .8s,visibility .8s}.load-line{width:180px;height:2px;background:rgba(255,255,255,0.05);border-radius:10px;overflow:hidden}#progress{height:100%;width:0;background:var(--accent);transition:width .4s;box-shadow:0 0 15px var(--accent)}#app{position:relative;z-index:10;max-width:900px;margin:0 auto;padding:0 24px 80px;opacity:0;transform:translateY(10px);transition:.8s cubic-bezier(0.16,1,0.3,1)}#app.active{opacity:1;transform:translateY(0)}.header{position:sticky;top:0;z-index:100;padding:20px 0 16px;background:var(--bg);border-bottom:1px solid var(--border);margin-bottom:24px}.header-row{display:flex;gap:12px;align-items:center}.back-btn{width:42px;height:42px;border-radius:10px;background:rgba(255,255,255,0.03);border:1px solid var(--border);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0}.back-btn:hover{background:var(--accent-soft);border-color:var(--accent)}.back-btn svg{width:18px;height:18px}.search-wrapper{flex:1;position:relative}.search-input{width:100%;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:10px;padding:12px 16px 12px 44px;font-size:11px;font-weight:600;letter-spacing:1.5px;color:var(--text);font-family:inherit;outline:none;transition:all .2s}.search-input::placeholder{color:var(--text-dim)}.search-input:focus{border-color:var(--accent);background:rgba(0,0,0,0.5)}.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none}.count-label{font-size:10px;font-weight:700;letter-spacing:3px;color:var(--text-muted);margin-bottom:16px;padding-left:2px}.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}.game-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;text-decoration:none;color:var(--text);display:flex;align-items:center;transition:all .2s;position:relative;overflow:hidden}.game-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);transform:scaleY(0);transition:transform .2s}.game-card:hover{border-color:var(--border-hover);transform:translateY(-2px);background:rgba(20,25,35,0.9)}.game-card:hover::before{transform:scaleY(1)}.game-card:active{transform:translateY(0)}.game-title{font-size:12px;font-weight:700;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.empty-state{text-align:center;padding:80px 20px;color:var(--text-dim);font-size:11px;letter-spacing:2px;grid-column:1/-1}@media(max-width:600px){#app{padding:0 16px 60px}.header{padding:16px 0}.games-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <div id="loader"><div class="load-line"><div id="progress"></div></div></div>
    <div class="ambient-bg" id="bg"></div>
    <div class="overlay-dim"></div>
    <canvas id="webgl-canvas"></canvas>

    <div id="app">
        <div class="header">
            <div class="header-row">
                <button class="back-btn" onclick="window.parent.postMessage('close', '*')">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <div class="search-wrapper">
                    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
                    <input type="text" class="search-input" id="search" placeholder="Search..." autocomplete="off">
                </div>
            </div>
        </div>
        <div class="count-label" id="count">Loading...</div>
        <div class="games-grid" id="grid"></div>
    </div>

    <script id="vs" type="x-shader/x-vertex">attribute vec2 a_pos;attribute float a_size;attribute float a_op;uniform vec2 u_res;uniform float u_time;varying float v_op;void main(){vec2 zeroToOne=a_pos/u_res;vec2 clipSpace=(zeroToOne*2.0)-1.0;gl_Position=vec4(clipSpace*vec2(1.0,-1.0),0.0,1.0);float pulse=0.85+(sin(u_time*1.5+a_op*10.0)*0.15);gl_PointSize=a_size*1.5*pulse;v_op=a_op;}</script>
    <script id="fs" type="x-shader/x-fragment">precision mediump float;uniform vec3 u_color;varying float v_op;void main(){float dist=distance(gl_PointCoord,vec2(0.5));if(dist>0.5)discard;gl_FragColor=vec4(u_color,(v_op*1.3)*(1.0-dist*2.0));}</script>

    <script type="module">
        const $ = id => document.getElementById(id);
        const bg = $('bg'), canvas = $('webgl-canvas'), gl = canvas.getContext('webgl', { antialias: true, alpha: true });
        const app = $('app'), grid = $('grid'), count = $('count'), searchInput = $('search'), progress = $('progress');
        
        let games = [], p = [], pCount = 0, prog, aPos, aSize, aOp, uRes, uCol, uTime, bPos, bSize, bOp, tStart = Date.now();
        const defBg = "https://img.freepik.com/free-vector/black-background-with-wavy-lines_52683-76524.jpg";

        const cS = (gl, t, s) => { const x = gl.createShader(t); gl.shaderSource(x, s); gl.compileShader(x); return x; };
        
        function initGL() {
            if (!gl) return;
            prog = gl.createProgram();
            gl.attachShader(prog, cS(gl, gl.VERTEX_SHADER, $('vs').textContent));
            gl.attachShader(prog, cS(gl, gl.FRAGMENT_SHADER, $('fs').textContent));
            gl.linkProgram(prog); gl.useProgram(prog);
            aPos = gl.getAttribLocation(prog, "a_pos"); aSize = gl.getAttribLocation(prog, "a_size"); aOp = gl.getAttribLocation(prog, "a_op");
            uRes = gl.getUniformLocation(prog, "u_res"); uCol = gl.getUniformLocation(prog, "u_color"); uTime = gl.getUniformLocation(prog, "u_time");
            bPos = gl.createBuffer(); bSize = gl.createBuffer(); bOp = gl.createBuffer();
            gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
        }

        function settings() {
            const c = localStorage.getItem('hrn_clr') || "#89b4fa", o = parseFloat(localStorage.getItem('hrn_op')) || 0.8, d = parseFloat(localStorage.getItem('hrn_int')) || 1.1;
            const nP = Math.floor((window.innerWidth * window.innerHeight) / 10000 * d);
            const r = parseInt(c.slice(1, 3), 16) / 255, g = parseInt(c.slice(3, 5), 16) / 255, b = parseInt(c.slice(5, 7), 16) / 255;
            if (gl && prog) gl.uniform3f(uCol, r, g, b);
            document.documentElement.style.setProperty('--accent', c);
            if (localStorage.getItem('hrn_part') === 'false') { pCount = 0; return; }
            if (pCount !== nP) { pCount = nP; p = []; for (let i = 0; i < pCount; i++) p.push({ x: Math.random() * innerWidth, y: Math.random() * innerHeight, s: Math.random() * 4 + 2.5, vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4, o: o * (Math.random() * 0.5 + 0.5) }); }
            bg.style.backgroundImage = `url('${localStorage.getItem('hrn_bg') || defBg}')`; bg.classList.add('loaded');
        }

        function render() {
            if (!gl || !prog || pCount === 0) { if (gl) gl.clear(gl.COLOR_BUFFER_BIT); requestAnimationFrame(render); return; }
            const e = (Date.now() - tStart) / 1000, dP = new Float32Array(pCount * 2), dS = new Float32Array(pCount), dO = new Float32Array(pCount);
            for (let i = 0; i < pCount; i++) { let x = p[i]; x.x += x.vx; x.y += x.vy; if (x.x < 0) x.x = innerWidth; if (x.x > innerWidth) x.x = 0; if (x.y < 0) x.y = innerHeight; if (x.y > innerHeight) x.y = 0; dP[i * 2] = x.x; dP[i * 2 + 1] = x.y; dS[i] = x.s; dO[i] = x.o; }
            gl.clear(gl.COLOR_BUFFER_BIT); gl.useProgram(prog); gl.uniform2f(uRes, innerWidth, innerHeight); gl.uniform1f(uTime, e);
            gl.bindBuffer(gl.ARRAY_BUFFER, bPos); gl.bufferData(gl.ARRAY_BUFFER, dP, gl.DYNAMIC_DRAW); gl.enableVertexAttribArray(aPos); gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);
            gl.bindBuffer(gl.ARRAY_BUFFER, bSize); gl.bufferData(gl.ARRAY_BUFFER, dS, gl.DYNAMIC_DRAW); gl.enableVertexAttribArray(aSize); gl.vertexAttribPointer(aSize, 1, gl.FLOAT, false, 0, 0);
            gl.bindBuffer(gl.ARRAY_BUFFER, bOp); gl.bufferData(gl.ARRAY_BUFFER, dO, gl.DYNAMIC_DRAW); gl.enableVertexAttribArray(aOp); gl.vertexAttribPointer(aOp, 1, gl.FLOAT, false, 0, 0);
            gl.drawArrays(gl.POINTS, 0, pCount); requestAnimationFrame(render);
        }

        const fmt = s => s.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());

        function draw(g) {
            count.textContent = g.length + ' titles';
            grid.innerHTML = g.length ? g.map(x => `<a href="./game/${x}" class="game-card"><span class="game-title">${fmt(x)}</span></a>`).join('') : '<div class="empty-state">Nothing found</div>';
        }

        function init() {
            canvas.width = innerWidth; canvas.height = innerHeight;
            if (gl) gl.viewport(0, 0, canvas.width, canvas.height);
            initGL(); settings(); render();
            progress.style.width = '30%';
            fetch('/games.json').then(r => r.json()).then(d => { games = Object.values(d).flat(); progress.style.width = '100%'; draw(games); }).catch(() => draw([]));
            setTimeout(() => { $('loader').style.opacity = '0'; setTimeout(() => { $('loader').style.display = 'none'; app.classList.add('active'); }, 600); }, 400);
        }

        searchInput.oninput = e => draw(games.filter(x => fmt(x).toLowerCase().includes(e.target.value.toLowerCase().trim())));
        onresize = () => { canvas.width = innerWidth; canvas.height = innerHeight; if (gl) gl.viewport(0, 0, canvas.width, canvas.height); settings(); };
        addEventListener('storage', settings);
        init();
    </script>
</body>
</html>
