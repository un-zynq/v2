<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games</title>
<style>
:root{--accent:#89b4fa;--border:rgba(255,255,255,.08);--text:rgba(255,255,255,.92)}*{margin:0;padding:0;box-sizing:border-box}body{font-family:Inter,sans-serif;color:var(--text);overflow:hidden;background:#000}#bg{position:fixed;inset:0;background-size:cover;background-position:center;filter:brightness(.65) saturate(1.1);z-index:-3}#overlay{position:fixed;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.45),rgba(0,0,0,.9));backdrop-filter:blur(30px);z-index:-2}#wrap{position:fixed;inset:0;display:flex;flex-direction:column;padding:28px 26px 18px 26px}#header{display:flex;flex-direction:column;gap:16px;margin-bottom:14px}h1{font-size:20px;letter-spacing:4px;opacity:.85}#top{display:flex;gap:10px;align-items:center}#search{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--border);padding:14px 16px;border-radius:14px;color:#fff;outline:none;font-size:13px;transition:.25s}#search:focus{border:1px solid rgba(255,255,255,.3);box-shadow:0 0 0 2px rgba(137,180,250,.25)}#count{font-size:11px;opacity:.6;letter-spacing:2px}#grid{flex:1;overflow:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;padding-right:4px}#grid::-webkit-scrollbar{width:5px}#grid::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:10px}.card{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:16px;padding:14px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:11px;letter-spacing:1px;cursor:pointer;height:82px;transition:.2s}.card:hover{transform:translateY(-4px) scale(1.03);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.25)}#close{position:absolute;top:20px;right:20px;width:42px;height:42px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.25s}#close:hover{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);transform:scale(1.1)}
</style>
</head>
<body>

<div id="bg"></div>
<div id="overlay"></div>

<div id="wrap">
    <div id="close">✕</div>

    <div id="header">
        <h1>GAME LIBRARY</h1>
        <div id="top">
            <input id="search" placeholder="Search games...">
            <div id="count">0</div>
        </div>
    </div>

    <div id="grid"></div>
</div>

<script>
const grid=document.getElementById('grid');
const search=document.getElementById('search');
const count=document.getElementById('count');
const bg=document.getElementById('bg');
const closeBtn=document.getElementById('close');

let games=[],filtered=[],db;

const DB_NAME="hrn_db",DB_VERSION=1;

function closePage(){
    window.parent.postMessage('close','*');
}

closeBtn.onclick=closePage;

window.addEventListener('keydown',e=>{
    if(e.key==="Escape") closePage();
});

function initDB(){
    return new Promise(r=>{
        const req=indexedDB.open(DB_NAME,DB_VERSION);
        req.onsuccess=e=>{db=e.target.result;r()};
        req.onerror=()=>r();
    });
}

function loadBackground(){
    return new Promise(r=>{
        try{
            const tx=db.transaction('background','readonly');
            const store=tx.objectStore('background');
            const req=store.get('current_bg');
            req.onsuccess=()=>r(req.result?req.result.value:null);
            req.onerror=()=>r(null);
        }catch(e){r(null)}
    });
}

async function applyBackground(){
    await initDB();
    const val=await loadBackground();
    if(val instanceof Blob){
        bg.style.backgroundImage=`url('${URL.createObjectURL(val)}')`;
    }else if(typeof val==="string"&&val.length>0){
        bg.style.backgroundImage=`url('${val}')`;
    }else{
        bg.style.backgroundImage="url('https://img.freepik.com/free-vector/black-background-with-wavy-lines_52683-76524.jpg')";
    }
}

function normalize(s){
    return s.toLowerCase().replace(/[\s-]/g,'');
}

function openGame(name){
    window.location.href=name+"/index.html";
}

async function loadGames(){
    const res=await fetch("https://un-zynq.github.io/games.json");
    const data=await res.json();
    games=Object.values(data).flat();
    filtered=games;
    render();
}

let start=0,CHUNK=60;

function render(){
    grid.innerHTML="";
    start=0;
    count.textContent=filtered.length;
    renderChunk();
}

function renderChunk(){
    if(start>=filtered.length) return;
    const frag=document.createDocumentFragment();
    for(let i=0;i<CHUNK&&start<filtered.length;i++,start++){
        const g=filtered[start];
        const el=document.createElement("div");
        el.className="card";
        el.textContent=g.replaceAll('-',' ');
        el.onclick=()=>openGame(g);
        frag.appendChild(el);
    }
    grid.appendChild(frag);
    requestAnimationFrame(renderChunk);
}

let t;
search.addEventListener("input",()=>{
    clearTimeout(t);
    t=setTimeout(()=>{
        const q=normalize(search.value);
        filtered=q?games.filter(g=>normalize(g).includes(q)):games;
        render();
    },120);
});

grid.addEventListener('scroll',()=>{
    if(grid.scrollTop+grid.clientHeight>=grid.scrollHeight-200){
        renderChunk();
    }
});

applyBackground();
loadGames();
</script>

</body>
</html>
