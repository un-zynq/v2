<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #030508;
            --accent: #89b4fa;
            --ui-silver: rgba(235, 240, 255, .85);
            --ui-border: rgba(255, 255, 255, .1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            color: var(--ui-silver);
            font-family: Inter, sans-serif;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* BG SYNC */
        .ambient-bg {
            position: fixed; inset: 0; z-index: 1;
            background-size: cover; background-position: center;
            opacity: 0; filter: brightness(.7);
            transition: 2.5s cubic-bezier(.4, 0, .2, 1);
        }
        .ambient-bg.loaded { opacity: 1; }
        .overlay-dim { position: fixed; inset: 0; z-index: 2; background: rgba(0,0,0,.3); pointer-events: none; }

        /* WRAPPER */
        .wrapper {
            position: relative; z-index: 10;
            height: 100vh; width: 100%;
            overflow-y: auto; padding: 50px 40px;
            opacity: 0; transform: scale(1.02);
            transition: 1.5s cubic-bezier(.16, 1, .3, 1);
            scrollbar-width: none;
        }
        .wrapper::-webkit-scrollbar { display: none; }
        .wrapper.active { opacity: 1; transform: scale(1); }

        /* HEADER */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            max-width: 1600px; margin: 0 auto 40px auto;
        }
        .title { font-size: 24px; font-weight: 900; letter-spacing: -1px; color: #fff; }

        .close-btn {
            width: 58px; height: 58px; border-radius: 18px;
            background: rgba(0, 0, 0, .4); border: 1px solid var(--ui-border);
            color: var(--ui-silver); display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: .4s cubic-bezier(.16, 1, .3, 1);
            backdrop-filter: blur(12px);
        }
        .close-btn:hover { opacity: 1; color: #fff; border: 1px solid rgba(255,255,255,.35); background: rgba(255,255,255,.1); transform: scale(1.08); }

        /* GRID 4:3 */
        #games-grid {
            display: grid; gap: 20px; max-width: 1600px; margin: 0 auto;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            padding-bottom: 80px;
        }
        @media (min-width: 1200px) { #games-grid { grid-template-columns: repeat(5, 1fr); } }

        /* CARD */
        .game-card {
            position: relative; aspect-ratio: 4/3;
            background: rgba(0, 0, 0, .4); border: 1px solid var(--ui-border);
            border-radius: 20px; overflow: hidden; cursor: pointer;
            transition: .4s cubic-bezier(.16, 1, .3, 1);
            backdrop-filter: blur(12px);
            opacity: 0; transform: translateY(15px);
        }
        .game-card.visible { opacity: 1; transform: translateY(0); }
        .game-card:hover { transform: translateY(-8px); border-color: var(--accent); background: rgba(255,255,255,0.05); }

        .game-img {
            width: 100%; height: 100%;
            background-size: cover; background-position: center;
            opacity: 0; transition: opacity 0.6s ease;
        }
        .game-img.loaded { opacity: 0.6; }
        .game-card:hover .game-img.loaded { opacity: 0.9; transform: scale(1.05); }

        .game-info {
            position: absolute; bottom: 0; width: 100%; padding: 18px;
            background: linear-gradient(to top, rgba(3,5,8,0.9), transparent);
            text-align: center;
        }
        .game-name { font-size: 10px; font-weight: 900; letter-spacing: 2px; color: #fff; }
    </style>
</head>
<body>

    <div class="ambient-bg" id="bg"></div>
    <div class="overlay-dim"></div>

    <div class="wrapper" id="ui">
        <div class="header">
            <h1 class="title">GAMES</h1>
            <div class="close-btn" onclick="window.parent.postMessage('close', '*')">
                <i data-lucide="x"></i>
            </div>
        </div>
        <div id="games-grid"></div>
    </div>

    <script>
        lucide.createIcons();
        const $ = id => document.getElementById(id);
        const accent = localStorage.getItem('hrn_clr') || "#89b4fa";
        document.documentElement.style.setProperty('--accent', accent);

        // BG SYNC
        async function loadBG() {
            const req = indexedDB.open("hrn_db", 1);
            req.onsuccess = e => {
                const db = e.target.result;
                try {
                    const store = db.transaction('background', 'readonly').objectStore('background');
                    const getReq = store.get('current_bg');
                    getReq.onsuccess = () => {
                        const val = getReq.result ? getReq.result.value : null;
                        const url = val instanceof Blob ? URL.createObjectURL(val) : (val || "https://img.freepik.com/free-vector/black-background-with-wavy-lines_52683-76524.jpg");
                        $('bg').style.backgroundImage = `url('${url}')`;
                        $('bg').classList.add('loaded');
                    };
                } catch(e) { $('bg').classList.add('loaded'); }
            };
        }

        // LAZY LOADING
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const card = entry.target;
                    const img = card.querySelector('.game-img');
                    const src = img.getAttribute('data-src');
                    const temp = new Image();
                    temp.src = src;
                    temp.onload = () => {
                        img.style.backgroundImage = `url('${src}')`;
                        img.classList.add('loaded');
                    };
                    card.classList.add('visible');
                    observer.unobserve(card);
                }
            });
        }, { rootMargin: '100px' });

        async function init() {
            await loadBG();
            try {
                const res = await fetch('https://un-zynq.github.io/games2.json');
                const data = await res.json();
                const grid = $('games-grid');
                
                data.forEach(groupWrapper => {
                    const groupKey = Object.keys(groupWrapper)[0];
                    const games = groupWrapper[groupKey];
                    Object.values(games).forEach(game => {
                        const card = document.createElement('div');
                        card.className = 'game-card';
                        const thumb = `https://placehold.co/600x450/030508/${accent.replace('#','')}/?text=${encodeURIComponent(game.name)}`;
                        
                        card.innerHTML = `
                            <div class="game-img" data-src="${thumb}"></div>
                            <div class="game-info"><div class="game-name">${game.name}</div></div>
                        `;
                        card.onclick = () => window.parent.location.href = `/game/${game.alias}`;
                        grid.appendChild(card);
                        observer.observe(card);
                    });
                });
                $('ui').classList.add('active');
            } catch (e) { console.log(e); }
        }

        window.onload = init;
    </script>
</body>
</html>
