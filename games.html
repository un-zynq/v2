<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games</title>
<style>
:root{--accent:#89b4fa;--border:rgba(255,255,255,.08);--text:rgba(255,255,255,.9)}*{margin:0;padding:0;box-sizing:border-box}body{font-family:Inter,sans-serif;color:var(--text);overflow:hidden;background:#000}#bg{position:fixed;inset:0;background-size:cover;background-position:center;filter:brightness(.7);z-index:-2}#overlay{position:fixed;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.5),rgba(0,0,0,.85));backdrop-filter:blur(25px);z-index:-1}#wrap{position:fixed;inset:0;display:flex;flex-direction:column;padding:40px 30px 20px 30px;animation:fade .6s ease}h1{font-size:18px;letter-spacing:3px;margin-bottom:20px;opacity:.8}#top{display:flex;gap:15px;align-items:center;margin-bottom:25px}#search{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--border);padding:14px 18px;border-radius:14px;color:#fff;outline:none;font-size:13px}#count{font-size:11px;opacity:.6;letter-spacing:2px}#grid{flex:1;overflow:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;padding-right:6px}#grid::-webkit-scrollbar{width:6px}#grid::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:10px}.card{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:16px;padding:14px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:11px;letter-spacing:1px;cursor:pointer;transition:.25s cubic-bezier(.16,1,.3,1);height:80px}.card:hover{transform:translateY(-4px) scale(1.03);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.25);color:#fff;box-shadow:0 10px 30px rgba(0,0,0,.5)}@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="bg"></div>
<div id="overlay"></div>

<div id="wrap">
    <h1>GAME LIBRARY</h1>

    <div id="top">
        <input id="search" placeholder="Search games...">
        <div id="count">0</div>
    </div>

    <div id="grid"></div>
</div>

<script>
const grid = document.getElementById('grid');
const search = document.getElementById('search');
const count = document.getElementById('count');
const bg = document.getElementById('bg');

let games = [];
let db;

const DB_NAME = "hrn_db";
const DB_VERSION = 1;

function initDB(){
    return new Promise(resolve=>{
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onsuccess = e=>{
            db = e.target.result;
            resolve();
        };
        req.onerror = ()=>resolve();
    });
}

function loadBackground(){
    return new Promise(resolve=>{
        try{
            const tx = db.transaction('background','readonly');
            const store = tx.objectStore('background');
            const req = store.get('current_bg');
            req.onsuccess = ()=>{
                resolve(req.result ? req.result.value : null);
            };
            req.onerror = ()=>resolve(null);
        }catch(e){
            resolve(null);
        }
    });
}

async function applyBackground(){
    await initDB();
    const val = await loadBackground();

    if(val instanceof Blob){
        bg.style.backgroundImage = `url('${URL.createObjectURL(val)}')`;
    }else if(typeof val === "string" && val.length > 0){
        bg.style.backgroundImage = `url('${val}')`;
    }else{
        bg.style.backgroundImage = "url('https://img.freepik.com/free-vector/black-background-with-wavy-lines_52683-76524.jpg')";
    }
}

function formatName(name){
    return name.replaceAll('-', ' ');
}

function openGame(name){
    window.location.href = name + "/index.html";
}

async function loadGames(){
    try{
        const res = await fetch("https://un-zynq.github.io/games.json");
        const data = await res.json();

        games = Object.values(data).flat();
        render(games);
    }catch(e){
        grid.innerHTML = "<div style='opacity:.6'>Failed to load games</div>";
    }
}

function render(list){
    grid.innerHTML = "";
    list.forEach(g=>{
        const el = document.createElement("div");
        el.className = "card";
        el.textContent = formatName(g);
        el.onclick = () => openGame(g);
        grid.appendChild(el);
    });
    count.textContent = list.length;
}

search.addEventListener("input", ()=>{
    const q = search.value.toLowerCase();
    const filtered = games.filter(g => g.includes(q));
    render(filtered);
});

applyBackground();
loadGames();
</script>

</body>
</html>
