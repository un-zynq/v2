<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root{--accent:#89b4fa;--bg:#030508;--glass:rgba(0,0,0,0.45);--border:rgba(255,255,255,0.15)}*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}body{background:#030508;color:#fff;height:100dvh;display:flex;align-items:center;justify-content:center;text-transform:uppercase;letter-spacing:1px;overflow:hidden}.ambient-bg{position:fixed;inset:0;z-index:1;pointer-events:none;background-size:cover;background-position:center;opacity:1;filter:brightness(0.7);display:block}.overlay-dim{position:fixed;inset:0;z-index:1;background:rgba(0,0,0,0.3);pointer-events:none}.core-pane{position:relative;z-index:10;width:90%;max-width:400px;background:rgba(13,15,23,0.75);backdrop-filter:blur(30px) saturate(150%);-webkit-backdrop-filter:blur(30px) saturate(150%);border:1px solid var(--border);border-radius:30px;padding:30px;box-shadow:0 25px 50px -12px rgba(0,0,0,0.6)}.nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px}.nav h2{font-size:10px;font-weight:900;color:var(--accent);letter-spacing:3px}.close-btn{cursor:pointer;opacity:0.5;transition:0.2s}.close-btn:hover{opacity:1;transform:scale(1.1);color:var(--accent)}.row{margin-bottom:18px}label{font-size:7px;font-weight:800;opacity:0.6;display:block;margin-bottom:8px;letter-spacing:1.5px}input[type="text"],.btn-action{width:100%;background:var(--glass);border:1px solid var(--border);padding:12px;border-radius:12px;color:#fff;font-size:10px;outline:none}.flex-group{display:grid;grid-template-columns:1fr 1fr;gap:12px}input[type="color"]{-webkit-appearance:none;border:1px solid var(--border);width:100%;height:42px;border-radius:12px;background:var(--glass);cursor:pointer}input[type="color"]::-webkit-color-swatch{border:none;border-radius:8px}.slider-box{background:var(--glass);padding:12px;border-radius:12px;border:1px solid var(--border);display:flex;align-items:center;gap:10px}input[type="range"]{-webkit-appearance:none;flex:1;height:2px;background:rgba(255,255,255,0.1)}input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--accent);border-radius:50%;cursor:pointer;box-shadow:0 0 8px var(--accent)}.toggle-box{display:flex;align-items:center;justify-content:space-between;padding:14px;background:var(--glass);border-radius:12px;border:1px solid var(--border)}.dot{width:10px;height:10px;border-radius:50%;background:#333;transition:0.3s}input:checked+.dot{background:var(--accent);box-shadow:0 0 10px var(--accent)}.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}.chips::-webkit-scrollbar{display:none}.chip{padding:8px 12px;background:var(--glass);border:1px solid var(--border);border-radius:10px;font-size:8px;font-weight:700;cursor:pointer;white-space:nowrap;transition:0.2s}.chip:hover{border-color:var(--accent);color:var(--accent);background:rgba(137,180,250,0.05)}.hidden-file{position:absolute;width:1px;height:1px;opacity:0}
    </style>
</head>
<body>
    <div class="ambient-bg" id="bg-layer"></div>
    <div class="overlay-dim"></div>
    
    <div class="core-pane">
        <div class="nav">
            <h2>SETTINGS</h2>
            <div class="close-btn" onclick="window.parent.postMessage('close', '*')">
                <i data-lucide="x" size="18"></i>
            </div>
        </div>

        <div class="row">
            <div class="flex-group">
                <div class="group">
                    <label>Accent</label>
                    <input type="color" id="clr">
                </div>
                <div class="group">
                    <label>Wallpaper</label>
                    <button class="btn-action" onclick="document.getElementById('bg-file').click()">Upload</button>
                    <input type="file" id="bg-file" class="hidden-file" accept="image/*">
                </div>
            </div>
        </div>

        <div class="row">
            <label>Remote Background URL</label>
            <input type="text" id="bg" placeholder="Paste link here...">
        </div>

        <div class="row">
            <div class="toggle-box" onclick="document.getElementById('part').click()" style="cursor:pointer">
                <label style="margin:0; opacity:1">Particles</label>
                <input type="checkbox" id="part" hidden>
                <div class="dot"></div>
            </div>
        </div>

        <div class="row flex-group">
            <div class="group">
                <label>Density</label>
                <div class="slider-box"><input type="range" id="int" min="0.1" max="4.0" step="0.1"></div>
            </div>
            <div class="group">
                <label>Opacity</label>
                <div class="slider-box"><input type="range" id="op" min="0.1" max="1" step="0.05"></div>
            </div>
        </div>

        <div class="row">
            <label>Identity Presets</label>
            <div class="chips" id="p-list"></div>
        </div>

        <div class="row flex-group">
            <div class="group">
                <label>Tab Title</label>
                <input type="text" id="title" placeholder="Title">
            </div>
            <div class="group">
                <label>Favicon</label>
                <input type="text" id="fav" placeholder="URL">
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const sync = () => window.parent.postMessage('sync', '*');
        const defaultBg = "https://img.freepik.com/free-vector/black-background-with-wavy-lines_52683-76524.jpg?semt=ais_incoming&w=740&q=80";
        
        const presets = [
            {n:"Default",t:"HRN",f:"/logo.svg"},
            {n:"Google",t:"Google",f:"https://google.cm/favicon.ico"},
            {n:"Drive",t:"My Drive",f:"https://ssl.gstatic.com/docs/doclist/images/drive_2022q3_32dp.png"},
            {n:"Mail",t:"Gmail",f:"https://ssl.gstatic.com/ui/v1/icons/mail/images/favicon5.ico"},
            {n:"Classroom",t:"Home - Classroom",f:"https://www.gstatic.com/classroom/favicon.png"}
        ];

        presets.forEach(p => {
            const c = document.createElement('div'); 
            c.className = 'chip'; 
            c.innerText = p.n;
            c.onclick = () => { 
                document.getElementById('title').value = p.t; 
                document.getElementById('fav').value = p.f; 
                localStorage.setItem('hrn_title', p.t); 
                localStorage.setItem('hrn_fav', p.f); 
                sync(); 
            };
            document.getElementById('p-list').appendChild(c);
        });

        function updateBg(val) {
            const bgLayer = document.getElementById('bg-layer');
            const bgToSet = (val && val.length > 5) ? val : defaultBg;
            localStorage.setItem('hrn_bg', bgToSet); 
            bgLayer.style.backgroundImage = `url(${bgToSet})`; 
            sync();
        }
        document.getElementById('bg-file').onchange = (e) => { 
            if(!e.target.files[0]) return;
            const fr = new FileReader(); 
            fr.onload = () => updateBg(fr.result); 
            fr.readAsDataURL(e.target.files[0]); 
        };
        const bgInput = document.getElementById('bg');
        bgInput.onchange = async () => {
            const url = bgInput.value.trim();
            if(!url || !url.startsWith('http')) return;

            try { 
                const r = await fetch(url); 
                if (!r.ok) throw new Error();
                const b = await r.blob(); 
                const fr = new FileReader(); 
                fr.onloadend = () => updateBg(fr.result); 
                fr.readAsDataURL(b); 
            } catch (err) { 
                updateBg(url); 
            }
        };
        ['title', 'clr', 'op', 'int', 'fav'].forEach(f => {
            const el = document.getElementById(f); 
            const defs = {title:'HRN | CORE', clr:'#89b4fa', op:0.8, int:1.1, fav:''};
                        const saved = localStorage.getItem('hrn_'+f);
            el.value = saved !== null ? saved : defs[f]; 
            el.oninput = () => { 
                localStorage.setItem('hrn_'+f, el.value); 
                sync(); 
            };
        });
        const partCheck = document.getElementById('part'); 
        partCheck.checked = localStorage.getItem('hrn_part') !== 'false';
        partCheck.onchange = () => { 
            localStorage.setItem('hrn_part', partCheck.checked); 
            sync(); 
        };
        const initialBg = localStorage.getItem('hrn_bg');
        if(initialBg) {
            updateBg(initialBg);
            if(initialBg.startsWith('http')) bgInput.value = initialBg;
        } else {
            updateBg(defaultBg);
        }
    </script>
</body>
</html>
