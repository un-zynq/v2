<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #030508; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { width: 320px; background: #0d1117; border: 1px solid #30363d; padding: 25px; border-radius: 15px; }
        .item { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: #8b949e; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 10px; background: #010409; border: 1px solid #30363d; color: white; border-radius: 5px; box-sizing: border-box; }
        .btns { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .save { background: #89b4fa; color: #030508; }
        .back { background: #21262d; color: white; }
    </style>
</head>
<body>
    <div class="card">
        <div class="item"><label>Background URL</label><input id="bg" type="text"></div>
        <div class="item"><label>Opacity (0.2 - 1.0)</label><input id="op" type="number" step="0.1" min="0.2" max="1"></div>
        <div class="item"><label>Accent Color</label><input id="clr" type="color"></div>
        <div class="btns">
            <button class="back" onclick="window.parent.postMessage('close','*')">Cancel</button>
            <button class="save" onclick="save()">Apply</button>
        </div>
    </div>
    <script>
        const s = localStorage;
        window.onload = () => {
            document.getElementById('bg').value = s.getItem('hrn_bg') || "";
            document.getElementById('op').value = s.getItem('hrn_op') || "0.5";
            document.getElementById('clr').value = s.getItem('hrn_clr') || "#89b4fa";
        };
        function save() {
            s.setItem('hrn_bg', document.getElementById('bg').value);
            s.setItem('hrn_op', document.getElementById('op').value);
            s.setItem('hrn_clr', document.getElementById('clr').value);
            window.parent.postMessage('sync', '*');
            window.parent.postMessage('close', '*');
        }
    </script>
</body>
</html>
