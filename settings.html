<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #030508;
            --accent: #89b4fa;
            --ui-silver: rgba(235, 240, 255, 0.85); 
            --ui-border: rgba(255, 255, 255, 0.08);
            --card-bg: rgba(13, 15, 23, 0.75);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100%; width: 100%; 
            background: var(--bg); 
            color: var(--ui-silver); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            text-transform: uppercase;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--ui-border); border-radius: 10px; }
        
        .ambient-bg { 
            position: fixed; inset: -50px; z-index: 1; 
            pointer-events: none; background-size: cover; background-position: center; 
            opacity: 0.4; filter: brightness(0.4); display: none; 
        }

        .wrapper { 
            position: relative; display: flex; align-items: center; justify-content: center; 
            min-height: 100dvh; width: 100%; padding: 40px 20px; z-index: 10;
        }
        .pane { 
            width: 100%; max-width: 480px; background: var(--card-bg); 
            backdrop-filter: blur(40px) saturate(160%); -webkit-backdrop-filter: blur(40px) saturate(160%);
            border: 1px solid var(--ui-border); border-radius: 32px; padding: 32px; 
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.8);
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        h2 { font-size: 11px; font-weight: 900; letter-spacing: 4px; color: var(--accent); opacity: 0.9; }
        .close-btn { 
            width: 36px; height: 36px; background: rgba(255,255,255,0.02);
            border: 1px solid var(--ui-border); border-radius: 10px; color: #fff;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .close-btn:hover { background: rgba(255,255,255,0.06); transform: rotate(90deg); }

        .section { margin-bottom: 28px; }
        .section-label { 
            font-size: 8px; color: var(--accent); opacity: 0.5; 
            margin-bottom: 16px; padding-bottom: 6px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); display: block;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .full { grid-column: span 2; }
        .group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 8px; font-weight: 800; opacity: 0.3; letter-spacing: 1.5px; }

        input[type="text"] { 
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--ui-border); 
            padding: 14px; border-radius: 14px; color: #fff; font-size: 10px; outline: none;
            transition: border 0.3s;
        }
        input[type="text"]:focus { border-color: rgba(255,255,255,0.2); }

        input[type="color"] { 
            -webkit-appearance: none; border: 1px solid var(--ui-border);
            width: 100%; height: 44px; border-radius: 14px; background: rgba(255,255,255,0.03); cursor: pointer;
        }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 10px; }
        
        .file-input-wrapper { position: relative; }
        .file-btn { 
            width: 100%; padding: 14px; background: rgba(255,255,255,0.03); border: 1px solid var(--ui-border);
            border-radius: 14px; color: #fff; font-size: 10px; cursor: pointer; text-align: center;
        }
        #bg-file { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }

        input[type="range"] { -webkit-appearance: none; width: 100%; height: 2px; background: rgba(255,255,255,0.08); margin: 15px 0; }
        input[type="range"]::-webkit-slider-thumb { 
            -webkit-appearance: none; width: 14px; height: 14px; background: var(--accent); 
            border-radius: 50%; cursor: pointer; box-shadow: 0 0 15px var(--accent); 
        }

        .checkbox-row {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.015); padding: 14px; border-radius: 14px; border: 1px solid var(--ui-border);
        }
        input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }

        .preset-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 12px; }
        .preset-btn {
            padding: 12px; background: rgba(255,255,255,0.02); border: 1px solid var(--ui-border);
            border-radius: 12px; color: #fff; font-size: 9px; cursor: pointer; transition: 0.2s;
        }
        .preset-btn:hover { background: rgba(255,255,255,0.05); border-color: var(--accent); transform: translateY(-2px); }

        @media (max-width: 450px) { .grid { grid-template-columns: 1fr; } .full { grid-column: span 1; } }
    </style>
</head>
<body>
    <div class="ambient-bg" id="bg-layer"></div>
    <div class="wrapper">
        <div class="pane">
            <div class="header">
                <h2>CORE ENGINE V3</h2>
                <div class="close-btn" onclick="window.parent.postMessage('close', '*')">
                    <i data-lucide="x" style="width:18px;height:18px"></i>
                </div>
            </div>

            <div class="section">
                <span class="section-label">Appearance & Canvas</span>
                <div class="grid">
                    <div class="group">
                        <label>Accent Tone</label>
                        <input type="color" id="clr">
                    </div>
                    <div class="group">
                        <label>Background Source</label>
                        <div class="file-input-wrapper">
                            <div class="file-btn" id="file-label">Upload / Link</div>
                            <input type="file" id="bg-file" accept="image/*">
                        </div>
                    </div>
                    <div class="group full">
                        <label>Remote Wallpaper URL</label>
                        <input type="text" id="bg" placeholder="https://image-hosting.com/img.jpg">
                    </div>
                </div>
            </div>

            <div class="section">
                <span class="section-label">Neural Dynamics</span>
                <div class="grid">
                    <div class="group full">
                        <div class="checkbox-row">
                            <label style="opacity: 1; margin: 0; cursor: pointer; font-size: 9px;">Active Neural Particles</label>
                            <input type="checkbox" id="part">
                        </div>
                    </div>
                    <div class="group">
                        <label>Density</label>
                        <input type="range" id="int" min="0.1" max="5.0" step="0.1">
                    </div>
                    <div class="group">
                        <label>Interface Alpha</label>
                        <input type="range" id="op" min="0.1" max="1" step="0.05">
                    </div>
                </div>
            </div>

            <div class="section">
                <span class="section-label">Identity Masking</span>
                <div class="grid">
                    <div class="group">
                        <label>Title</label>
                        <input type="text" id="title" placeholder="HRN | CORE">
                    </div>
                    <div class="group">
                        <label>Favicon</label>
                        <input type="text" id="fav" placeholder="https://...">
                    </div>
                    <div class="group full">
                        <div class="preset-grid" id="preset-container"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const presets = [
            { name: "Default", title: "HRN | CORE", fav: "favicon.png" },
            { name: "Google", title: "Google", fav: "https://www.google.com/favicon.ico" },
            { name: "Drive", title: "My Drive", fav: "https://ssl.gstatic.com/docs/doclist/images/drive_2022q3_32dp.png" },
            { name: "Classes", title: "Classes", fav: "https://www.gstatic.com/classroom/favicon.png" },
            { name: "Canvas", title: "Dashboard", fav: "https://du11hjcvhe07u.cloudfront.net/favicon.ico" },
            { name: "Gmail", title: "Gmail", fav: "https://ssl.gstatic.com/ui/v1/icons/mail/images/favicon5.ico" }
        ];

        const fields = ['title', 'clr', 'op', 'int', 'fav']; // 'bg' removed from auto-populating fields to avoid string reveal
        const defaults = { title: 'HRN | CORE', clr: '#89b4fa', op: '0.8', int: '1.1', part: true, fav: '', bg: '' };

        function updatePreview(url) {
            const bgLayer = document.getElementById('bg-layer');
            if (url && url.length > 5) {
                bgLayer.style.backgroundImage = `url(${url})`;
                bgLayer.style.display = 'block';
                document.getElementById('file-label').innerText = "Image Active";
            } else {
                bgLayer.style.display = 'none';
                document.getElementById('file-label').innerText = "Upload Image";
            }
        }

        async function urlToBase64(url) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(blob);
                });
            } catch (e) {
                return url; 
            }
        }

        function initPresets() {
            const container = document.getElementById('preset-container');
            presets.forEach(p => {
                const btn = document.createElement('button');
                btn.className = 'preset-btn';
                btn.innerText = p.name;
                btn.onclick = () => {
                    document.getElementById('title').value = p.title;
                    document.getElementById('fav').value = p.fav;
                    localStorage.setItem('hrn_title', p.title);
                    localStorage.setItem('hrn_fav', p.fav);
                    window.parent.postMessage('sync', '*');
                };
                container.appendChild(btn);
            });
        }

        function handleImage(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const base64 = e.target.result;
                localStorage.setItem('hrn_bg', base64);
                updatePreview(base64);
                window.parent.postMessage('sync', '*');
                document.getElementById('bg').value = ''; // Keep UI clean
            };
            reader.readAsDataURL(file);
        }

        function load() {
            initPresets();
            const storedBg = localStorage.getItem('hrn_bg');
            updatePreview(storedBg);

            // Populate other fields
            fields.forEach(f => {
                const stored = localStorage.getItem('hrn_' + f);
                const val = (stored !== null) ? stored : defaults[f];
                const el = document.getElementById(f);
                if (el) {
                    el.value = val;
                    el.oninput = () => {
                        localStorage.setItem('hrn_' + f, el.value);
                        window.parent.postMessage('sync', '*');
                    };
                }
            });

            // Special handling for BG input to prevent string dump
            const bgInput = document.getElementById('bg');
            bgInput.onchange = async () => {
                const url = bgInput.value;
                if(url.startsWith('http')) {
                    const converted = await urlToBase64(url);
                    localStorage.setItem('hrn_bg', converted);
                    updatePreview(converted);
                    window.parent.postMessage('sync', '*');
                    // We DO NOT set bgInput.value to converted here.
                }
            };

            const partCheck = document.getElementById('part');
            const pState = localStorage.getItem('hrn_part') !== 'false';
            partCheck.checked = pState;
            partCheck.onchange = () => {
                localStorage.setItem('hrn_part', partCheck.checked);
                window.parent.postMessage('sync', '*');
            };

            document.getElementById('bg-file').onchange = (e) => handleImage(e.target.files[0]);
        }

        load();
    </script>
</body>
</html>
