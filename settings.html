<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Settings | Core</title>
    <style>
        :root{--accent:#89b4fa;--bg:#030508;--glass:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.12)}
        *{margin:0;padding:0;box-sizing:border-box;font-family:Inter,-apple-system,sans-serif;user-select:none;-webkit-tap-highlight-color:transparent}
        body{background:var(--bg);color:#fff;height:100dvh;display:flex;align-items:center;justify-content:center;text-transform:uppercase;letter-spacing:1px;overflow:hidden;touch-action:none}
        .ambient-bg{position:fixed;inset:0;z-index:1;background-size:cover;background-position:center;filter:brightness(0.5);transition:opacity 0.5s ease}
        .overlay-dim{position:fixed;inset:0;z-index:2;background:radial-gradient(circle at center,transparent,rgba(0,0,0,0.5))}
        .core-pane{position:relative;z-index:10;width:92%;max-width:380px;max-height:85dvh;background:rgba(8,10,15,0.9);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid var(--border);border-radius:20px;padding:20px;display:flex;flex-direction:column;gap:14px;box-shadow:0 40px 80px rgba(0,0,0,0.9);overflow-y:auto}
        .core-pane::-webkit-scrollbar{display:none}
        .nav{display:flex;justify-content:space-between;align-items:center}
        .nav h2{font-size:10px;font-weight:900;color:var(--accent);letter-spacing:3px}
        .close-btn{cursor:pointer;font-size:18px;opacity:0.4;padding:4px;transition:0.2s}
        .close-btn:hover{opacity:1;transform:scale(1.1)}
        .row{width:100%}
        label{font-size:8px;font-weight:800;opacity:0.4;display:block;margin-bottom:6px;letter-spacing:1px}
        input[type="text"],input[type="color"]{width:100%;background:var(--glass);border:1px solid var(--border);padding:12px;border-radius:8px;color:#fff;font-size:10px;font-weight:700;outline:none}
        input[type="color"]{-webkit-appearance:none;height:38px;padding:0;cursor:pointer}
        input[type="color"]::-webkit-color-swatch{border:none;border-radius:4px}
        .btn-action{width:100%;background:var(--glass);border:1px solid var(--border);padding:12px;border-radius:8px;color:#fff;font-size:10px;font-weight:700;outline:none;cursor:pointer;transition:0.2s}
        .btn-action:hover{background:rgba(255,255,255,0.1);border-color:var(--accent)}
        .flex-group{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .btn-reset{background:rgba(243,139,168,0.05);border-color:rgba(243,139,168,0.2);color:#f38ba8}
        .btn-reset:hover{background:rgba(243,139,168,0.15);border-color:#f38ba8}
        .slider-wrap{width:100%;height:38px;background:var(--glass);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;padding:0 12px;position:relative;touch-action:none;cursor:ew-resize}
        .slider-track{width:100%;height:2px;background:rgba(255,255,255,0.1);position:relative;pointer-events:none}
        .slider-fill{position:absolute;height:100%;background:var(--accent);width:0%;pointer-events:none}
        .slider-knob{position:absolute;width:14px;height:14px;background:var(--accent);border-radius:50%;left:0%;top:50%;transform:translate(-50%,-50%);box-shadow:0 0 10px rgba(0,0,0,0.5);pointer-events:none}
        .toggle-box{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--glass);border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:0.2s}
        .toggle-box:hover{border-color:var(--accent)}
        .dot{width:8px;height:8px;border-radius:50%;background:#222;transition:0.3s}
        .active .dot{background:var(--accent);box-shadow:0 0 10px var(--accent)}
        .chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
        .chips::-webkit-scrollbar{display:none}
        .chip{padding:8px 12px;background:var(--glass);border:1px solid var(--border);border-radius:6px;font-size:8px;font-weight:800;white-space:nowrap;cursor:pointer;transition:0.2s}
        .chip:hover{border-color:var(--accent);color:var(--accent)}
        .hidden-file{display:none}
    </style>
</head>
<body>
    <div class="ambient-bg" id="bg-layer"></div>
    <div class="overlay-dim"></div>
    <div class="core-pane">
        <div class="nav">
            <h2>SETTINGS</h2>
            <div class="close-btn" onclick="window.parent.postMessage('close','*')">×</div>
        </div>
        <div class="row flex-group">
            <div><label>ACCENT</label><input type="color" id="clr"></div>
            <div>
                <label>WALLPAPER</label>
                <button class="btn-action" onclick="document.getElementById('bg-file').click()">UPLOAD</button>
                <input type="file" id="bg-file" class="hidden-file" accept="image/*">
            </div>
        </div>
        <div class="row">
            <label>REMOTE URL</label>
            <input type="text" id="bg" placeholder="PASTE LINK...">
        </div>
        <div class="row flex-group">
            <button class="btn-action btn-reset" onclick="resetBg()">RESET BG</button>
            <button class="btn-action btn-reset" onclick="resetAll()">PURGE ALL</button>
        </div>
        <div class="row">
            <div class="toggle-box" id="part-toggle">
                <label style="margin:0;opacity:1;cursor:pointer">PARTICLES</label>
                <div class="dot"></div>
            </div>
        </div>
        <div class="row flex-group">
            <div><label>DENSITY</label><div class="slider-wrap" id="slider-int" data-min="0.1" data-max="4.0" data-step="0.1"><div class="slider-track"><div class="slider-fill"></div><div class="slider-knob"></div></div></div></div>
            <div><label>OPACITY</label><div class="slider-wrap" id="slider-op" data-min="0.1" data-max="1" data-step="0.05"><div class="slider-track"><div class="slider-fill"></div><div class="slider-knob"></div></div></div></div>
        </div>
        <div class="row">
            <label>PRESETS</label>
            <div class="chips" id="p-list"></div>
        </div>
        <div class="row flex-group">
            <div><label>TITLE</label><input type="text" id="title"></div>
            <div><label>FAVICON</label><input type="text" id="fav"></div>
        </div>
    </div>

    <script>
        const sync = () => window.parent.postMessage('sync','*');
        const defaultBg = "https://img.freepik.com/free-vector/black-background-with-wavy-lines_52683-76524.jpg";
        const defaults = {title:'HRN | CORE',clr:'#89b4fa',op:0.8,int:1.1,fav:'',part:true};
        const presets = [
            {n:"DEFAULT",t:"HRN | CORE",f:"/logo.svg"},
            {n:"GOOGLE",t:"Google",f:"https://google.com/favicon.ico"},
            {n:"DRIVE",t:"My Drive",f:"https://ssl.gstatic.com/docs/doclist/images/drive_2022q3_32dp.png"}
        ];
        let db;
        const DB_NAME = "hrn_db";
        const DB_VERSION = 1;

        function initDB() {
            return new Promise((resolve) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = e => {
                    db = e.target.result;
                    if (!db.objectStoreNames.contains('background')) db.createObjectStore('background', { keyPath: 'id' });
                };
                request.onsuccess = e => { db = e.target.result; resolve(); };
                request.onerror = () => resolve();
            });
        }

        async function saveBackground(value) {
            if (!db) await initDB();
            return new Promise((resolve) => {
                const tx = db.transaction('background', 'readwrite');
                const store = tx.objectStore('background');
                store.put({id:'current_bg',value:value,timestamp:Date.now()});
                tx.oncomplete = () => resolve();
            });
        }

        async function loadBackground() {
            if (!db) await initDB();
            return new Promise((resolve) => {
                const tx = db.transaction('background', 'readonly');
                const store = tx.objectStore('background');
                const req = store.get('current_bg');
                req.onsuccess = () => resolve(req.result ? req.result.value : defaultBg);
                req.onerror = () => resolve(defaultBg);
            });
        }

        async function updateBg(val) {
            const bgLayer = document.getElementById('bg-layer');
            let displayUrl = defaultBg;
            if (val instanceof Blob) {
                await saveBackground(val);
                displayUrl = URL.createObjectURL(val);
            } else if (typeof val === 'string' && val.length > 0) {
                await saveBackground(val);
                displayUrl = val;
            } else {
                await saveBackground(defaultBg);
                displayUrl = defaultBg;
            }
            bgLayer.style.backgroundImage = `url('${displayUrl}')`;
            sync();
        }

        function setSliderUI(id, val) {
            const wrap = document.getElementById(id);
            const min = parseFloat(wrap.dataset.min);
            const max = parseFloat(wrap.dataset.max);
            const p = ((val - min) / (max - min)) * 100;
            wrap.querySelector('.slider-fill').style.width = p + '%';
            wrap.querySelector('.slider-knob').style.left = p + '%';
        }

        function initSlider(id, key) {
            const wrap = document.getElementById(id);
            const min = parseFloat(wrap.dataset.min);
            const max = parseFloat(wrap.dataset.max);
            const step = parseFloat(wrap.dataset.step);
            let isDragging = false;
            const update = (e) => {
                const rect = wrap.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                let pos = (clientX - rect.left) / rect.width;
                pos = Math.max(0, Math.min(1, pos));
                let val = min + (pos * (max - min));
                val = Math.round(val / step) * step;
                setSliderUI(id, val);
                localStorage.setItem('hrn_' + key, val.toFixed(2));
                sync();
            };
            wrap.addEventListener('mousedown', (e) => { isDragging = true; update(e); });
            window.addEventListener('mousemove', (e) => { if (isDragging) update(e); });
            window.addEventListener('mouseup', () => isDragging = false);
            wrap.addEventListener('touchstart', (e) => { isDragging = true; update(e); });
            window.addEventListener('touchmove', (e) => { if (isDragging) update(e); });
            window.addEventListener('touchend', () => isDragging = false);
            const saved = localStorage.getItem('hrn_' + key) || defaults[key];
            setSliderUI(id, parseFloat(saved));
        }

        initSlider('slider-int', 'int');
        initSlider('slider-op', 'op');

        ['title','clr','fav','bg'].forEach(id => {
            const el = document.getElementById(id);
            el.value = localStorage.getItem('hrn_' + id) || (id === 'bg' ? '' : defaults[id]);
            el.oninput = () => {
                localStorage.setItem('hrn_' + id, el.value);
                if (id === 'clr') document.documentElement.style.setProperty('--accent', el.value);
                if (id === 'bg') updateBg(el.value);
                sync();
            };
        });

        const partBtn = document.getElementById('part-toggle');
        let partActive = localStorage.getItem('hrn_part') !== 'false';
        if (partActive) partBtn.classList.add('active');
        partBtn.onclick = () => {
            partActive = !partActive;
            partBtn.classList.toggle('active', partActive);
            localStorage.setItem('hrn_part', partActive);
            sync();
        };

        window.resetBg = async () => {
            document.getElementById('bg').value = "";
            await saveBackground(defaultBg);
            updateBg(defaultBg);
        };

        window.resetAll = async () => {
            localStorage.clear();
            if (db) {
                const tx = db.transaction('background', 'readwrite');
                tx.objectStore('background').delete('current_bg');
            }
            document.getElementById('title').value = defaults.title;
            document.getElementById('fav').value = defaults.fav;
            document.getElementById('clr').value = defaults.clr;
            document.getElementById('bg').value = "";
            document.documentElement.style.setProperty('--accent', defaults.clr);
            setSliderUI('slider-int', defaults.int);
            setSliderUI('slider-op', defaults.op);
            partActive = true;
            partBtn.classList.add('active');
            await updateBg(defaultBg);
            sync();
        };

        document.getElementById('bg-file').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            await saveBackground(file);
            const url = URL.createObjectURL(file);
            document.getElementById('bg-layer').style.backgroundImage = `url('${url}')`;
            document.getElementById('bg').value = "Local File Uploaded";
            sync();
        };

        const list = document.getElementById('p-list');
        presets.forEach(p => {
            const c = document.createElement('div');
            c.className = 'chip';
            c.innerText = p.n;
            c.onclick = () => {
                document.getElementById('title').value = p.t;
                document.getElementById('fav').value = p.f;
                localStorage.setItem('hrn_title', p.t);
                localStorage.setItem('hrn_fav', p.f);
                sync();
            };
            list.appendChild(c);
        });

        async function startup() {
            await initDB();
            const bg = await loadBackground();
            updateBg(bg);
            document.documentElement.style.setProperty('--accent', localStorage.getItem('hrn_clr') || defaults.clr);
        }
        startup();
    </script>
</body>
</html>
