<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050608; --card: #0d1117; --border: #24292e; --text: #8b949e; --accent: #89b4fa; }
        
        /* Geen transparante body meer */
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .card { width: 90%; max-width: 380px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .group { margin-bottom: 20px; }
        label { display: flex; justify-content: space-between; font-size: 0.65rem; text-transform: uppercase; color: var(--text); margin-bottom: 10px; font-weight: 700; letter-spacing: 1.2px; }
        input[type="text"], input[type="url"], select { width: 100%; padding: 12px; background: #010409; border: 1px solid var(--border); border-radius: 8px; color: white; outline: none; font-size: 0.85rem; }
        
        /* Clean Custom Slider Styling */
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; background: #21262d; border-radius: 10px; outline: none; margin: 15px 0; }
        input[type="range"]::-webkit-slider-thumb { 
            -webkit-appearance: none; width: 18px; height: 18px; 
            background: #fff; border-radius: 50%; cursor: pointer; 
            box-shadow: 0 0 10px rgba(255,255,255,0.2); 
            border: 3px solid var(--accent); transition: transform 0.2s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

        .color-picker-wrapper { display: flex; align-items: center; gap: 12px; background: #010409; border: 1px solid var(--border); border-radius: 8px; padding: 10px; cursor: pointer; }
        .color-box { width: 25px; height: 25px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); }
        #themeColor { position: absolute; opacity: 0; width: 0; height: 0; }
        
        .footer { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; }
        .btn-row { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; border: none; transition: 0.2s; font-family: inherit; font-size: 0.85rem; }
        .btn-apply { background: var(--accent); color: #000; }
        .btn-cancel { background: #21262d; color: #c9d1d9; }
        .btn-reset { background: transparent; color: #f85149; font-size: 0.7rem; text-decoration: underline; border: none; padding-top: 10px; }
        button:hover { filter: brightness(1.2); }
    </style>
</head>
<body>
    <div class="card">
        <div class="group"><label>Tab Title</label><input type="text" id="tabTitle"></div>
        <div class="group"><label>Favicon URL</label><input type="url" id="faviconUrl"></div>
        <div class="group"><label>Background Image</label><input type="url" id="bgUrl"></div>
        <div class="group">
            <label>Logo Transparency <span id="opacityVal">50%</span></label>
            <input type="range" id="logoOpacity" min="0.2" max="1" step="0.05" value="0.5">
        </div>
        <div class="group">
            <label>Accent Color</label>
            <div class="color-picker-wrapper" onclick="document.getElementById('themeColor').click()">
                <div class="color-box" id="colorPreview"></div>
                <div style="font-size: 0.8rem; font-family: monospace;" id="colorHexText">#89B4FA</div>
                <input type="color" id="themeColor">
            </div>
        </div>
        <div class="group"><label>Particles</label><select id="particleAmount"><option value="off">Off</option><option value="low">Low</option><option value="mid">Mid</option><option value="high">High</option></select></div>
        <div class="footer">
            <div class="btn-row">
                <button class="btn-cancel" onclick="window.parent.postMessage({type:'closeIframe'}, '*')">Cancel</button>
                <button class="btn-apply" onclick="save()">Save Settings</button>
            </div>
            <button class="btn-reset" onclick="resetDefaults()">Reset Everything</button>
        </div>
    </div>
    <script>
        const colorInput = document.getElementById('themeColor');
        const colorPreview = document.getElementById('colorPreview');
        const colorHexText = document.getElementById('colorHexText');
        const opacityInput = document.getElementById('logoOpacity');
        const opacityValLabel = document.getElementById('opacityVal');

        opacityInput.addEventListener('input', e => { opacityValLabel.textContent = Math.round(e.target.value * 100) + "%"; });
        colorInput.addEventListener('input', e => { colorPreview.style.backgroundColor = e.target.value; colorHexText.textContent = e.target.value.toUpperCase(); });

        function save() {
            localStorage.setItem('hrn_tab_title', document.getElementById('tabTitle').value);
            localStorage.setItem('hrn_favicon_url', document.getElementById('faviconUrl').value);
            localStorage.setItem('hrn_bg_url', document.getElementById('bgUrl').value);
            localStorage.setItem('hrn_logo_opacity', opacityInput.value);
            localStorage.setItem('hrn_theme_color', colorInput.value);
            localStorage.setItem('hrn_particle_amount', document.getElementById('particleAmount').value);
            window.parent.postMessage({ type: 'updateSettings' }, '*');
            setTimeout(() => window.parent.postMessage({ type: 'closeIframe' }, '*'), 50);
        }

        function resetDefaults() {
            if(confirm("Full reset?")) {
                localStorage.clear();
                window.parent.postMessage({ type: 'updateSettings' }, '*');
                window.parent.postMessage({ type: 'closeIframe' }, '*');
            }
        }

        window.onload = () => {
            document.getElementById('tabTitle').value = localStorage.getItem('hrn_tab_title') || "";
            document.getElementById('faviconUrl').value = localStorage.getItem('hrn_favicon_url') || "";
            document.getElementById('bgUrl').value = localStorage.getItem('hrn_bg_url') || "";
            const savedOpacity = localStorage.getItem('hrn_logo_opacity') || "0.5";
            opacityInput.value = savedOpacity;
            opacityValLabel.textContent = Math.round(savedOpacity * 100) + "%";
            const savedColor = localStorage.getItem('hrn_theme_color') || "#89b4fa";
            colorInput.value = savedColor;
            colorPreview.style.backgroundColor = savedColor;
            colorHexText.textContent = savedColor.toUpperCase();
            document.getElementById('particleAmount').value = localStorage.getItem('hrn_particle_amount') || "mid";
        };
    </script>
</body>
</html>
