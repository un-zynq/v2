<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg: #050608; --card: #111318; --border: #242930; --text: #8e95a2; --accent: #89b4fa; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .card { width: 90%; max-width: 420px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 28px; box-shadow: 0 30px 60px rgba(0,0,0,0.6); }
        h2 { margin: 0 0 20px 0; font-size: 1.2rem; font-weight: 800; letter-spacing: -0.5px; }
        .group { margin-bottom: 18px; }
        label { display: block; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text); margin-bottom: 8px; font-weight: 700; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); border-radius: 10px; color: white; outline: none; font-size: 0.85rem; transition: 0.3s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(from var(--accent) r g b / 0.1); }
        input[type="color"] { height: 44px; padding: 6px; cursor: pointer; }
        .footer { margin-top: 28px; display: flex; gap: 12px; }
        button { flex: 1; padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 0.85rem; border: none; }
        .btn-apply { background: var(--accent); color: #000; }
        .btn-cancel { background: transparent; border: 1px solid var(--border); color: var(--text); }
        button:hover { filter: brightness(1.1); transform: translateY(-1px); }
    </style>
</head>
<body>
    <div class="card">
        <h2>Appearance</h2>
        <div class="group"><label>Tab Title</label><input type="text" id="tabTitle" placeholder="HRN | Gaming Hub"></div>
        <div class="group"><label>Background Image URL</label><input type="url" id="bgUrl" placeholder="https://..."></div>
        <div class="group"><label>Theme Accent Color</label><input type="color" id="themeColor"></div>
        <div class="group">
            <label>Particle Density</label>
            <select id="particleAmount">
                <option value="off">Off</option>
                <option value="low">Minimal</option>
                <option value="mid">Balanced</option>
                <option value="high">Atmospheric</option>
            </select>
        </div>
        <div class="footer">
            <button class="btn-cancel" onclick="window.parent.postMessage({type:'closeIframe'}, '*')">Cancel</button>
            <button class="btn-apply" onclick="save()">Apply</button>
        </div>
    </div>

    <script>
        function save() {
            localStorage.setItem('hrn_tab_title', document.getElementById('tabTitle').value);
            localStorage.setItem('hrn_bg_url', document.getElementById('bgUrl').value);
            localStorage.setItem('hrn_theme_color', document.getElementById('themeColor').value);
            localStorage.setItem('hrn_particle_amount', document.getElementById('particleAmount').value);
            window.parent.postMessage({ type: 'updateSettings' }, '*');
            setTimeout(() => window.parent.postMessage({ type: 'closeIframe' }, '*'), 50);
        }

        window.onload = () => {
            document.getElementById('tabTitle').value = localStorage.getItem('hrn_tab_title') || "";
            document.getElementById('bgUrl').value = localStorage.getItem('hrn_bg_url') || "";
            document.getElementById('themeColor').value = localStorage.getItem('hrn_theme_color') || "#89b4fa";
            document.getElementById('particleAmount').value = localStorage.getItem('hrn_particle_amount') || "mid";
        };
    </script>
</body>
</html>
