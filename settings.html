<!DOCTYPE html>
<html>
<head>
    <style>
        :root { --accent: #89b4fa; }
        body { background: #030508; color: white; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { width: 340px; background: #0d1117; border: 1px solid #30363d; padding: 30px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .item { margin-bottom: 20px; }
        label { display: block; font-size: 10px; color: #8b949e; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
        input[type="text"], input[type="number"] { 
            width: 100%; padding: 12px; background: #010409; border: 1px solid #30363d; color: white; 
            border-radius: 8px; box-sizing: border-box; outline: none; transition: border-color 0.2s;
        }
        input:focus { border-color: var(--accent); }
        input[type="color"] { width: 100%; height: 40px; border: none; background: none; cursor: pointer; }
        
        .btns { display: flex; gap: 12px; margin-top: 30px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: 900; font-size: 11px; text-transform: uppercase; transition: 0.2s; }
        .save { background: var(--accent); color: #030508; }
        .back { background: #21262d; color: white; }
        button:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .reset { background: none; color: #f85149; text-decoration: underline; font-size: 9px; width: 100%; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="item"><label>Hub Title</label><input id="t" type="text" placeholder="HRN | Gaming Hub"></div>
        <div class="item"><label>Custom Background URL</label><input id="bg" type="text" placeholder="https://..."></div>
        <div class="item"><label>Logo Transparency (0.2 - 1.0)</label><input id="op" type="number" step="0.1" min="0.2" max="1"></div>
        <div class="item"><label>Interface Accent</label><input id="clr" type="color"></div>
        
        <div class="btns">
            <button class="back" onclick="window.parent.postMessage('close','*')">Cancel</button>
            <button class="save" onclick="save()">Apply Settings</button>
        </div>
        <button class="reset" onclick="reset()">Factory Reset All Data</button>
    </div>

    <script>
        const s = localStorage;
        const $ = id => document.getElementById(id);

        window.onload = () => {
            $('t').value = s.getItem('hrn_title') || "";
            $('bg').value = s.getItem('hrn_bg') || "";
            $('op').value = s.getItem('hrn_op') || "0.5";
            $('clr').value = s.getItem('hrn_clr') || "#89b4fa";
            document.documentElement.style.setProperty('--accent', $('clr').value);
        };

        function save() {
            s.setItem('hrn_title', $('t').value);
            s.setItem('hrn_bg', $('bg').value);
            s.setItem('hrn_op', $('op').value);
            s.setItem('hrn_clr', $('clr').value);
            window.parent.postMessage('sync', '*');
            window.parent.postMessage('close', '*');
        }

        function reset() {
            if(confirm("Erase all settings?")) {
                s.clear();
                window.parent.postMessage('sync', '*');
                window.parent.postMessage('close', '*');
            }
        }
    </script>
</body>
</html>
