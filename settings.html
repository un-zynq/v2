<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SETTINGS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030508; --accent: #89b4fa; --text: #f0f4ff; --panel: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 30px 20px; text-transform: uppercase; }
        .container { max-width: 450px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        h1 { font-size: 10px; letter-spacing: 4px; color: var(--accent); }
        .group { background: var(--panel); border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin-bottom: 15px; }
        .label { font-size: 8px; color: rgba(255,255,255,0.4); margin-bottom: 12px; display: block; letter-spacing: 2px; }
        input[type="text"] { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: white; font-size: 10px; outline: none; margin-bottom: 10px; }
        .flex { display: flex; gap: 15px; align-items: center; justify-content: space-between; }
        
        /* UI ELEMENTS */
        .switch { position: relative; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: rgba(255,255,255,0.1); transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); }
        input[type="range"] { flex: 1; accent-color: var(--accent); cursor: pointer; }

        .btn-save { width: 100%; background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 900; font-size: 10px; cursor: pointer; transition: 0.2s; }
        .btn-save:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="container">
        <header><h1>SYSTEM.CONFIG</h1><button style="background:none; border:none; color:white; cursor:pointer; font-weight:900;" onclick="window.parent.postMessage('close', '*')">X</button></header>

        <div class="group">
            <span class="label">Identity</span>
            <input type="text" id="sys-title" placeholder="Tab Title">
            <input type="text" id="sys-fav" placeholder="Favicon URL">
        </div>

        <div class="group">
            <span class="label">Particle Engine</span>
            <div class="flex" style="margin-bottom:15px;">
                <span style="font-size:9px;">Active</span>
                <label class="switch"><input type="checkbox" id="sys-part"><span class="slider"></span></label>
            </div>
            <span class="label">Intensity & Speed</span>
            <div class="flex"><input type="range" id="sys-int" min="0.1" max="1" step="0.1"></div>
        </div>

        <div class="group">
            <span class="label">Visuals</span>
            <div class="flex">
                <input type="color" id="sys-color">
                <input type="range" id="sys-opacity" min="0.1" max="1" step="0.1">
            </div>
        </div>

        <div class="group">
            <span class="label">Wallpaper URL</span>
            <input type="text" id="sys-bg" placeholder="URL">
        </div>

        <button class="btn-save" onclick="save()">SAVE & REBOOT</button>
    </div>

    <script>
        window.onload = () => {
            document.getElementById('sys-title').value = localStorage.getItem('hrn_title') || "";
            document.getElementById('sys-fav').value = localStorage.getItem('hrn_fav') || "";
            document.getElementById('sys-color').value = localStorage.getItem('hrn_clr') || "#89b4fa";
            document.getElementById('sys-opacity').value = localStorage.getItem('hrn_op') || "0.8";
            document.getElementById('sys-bg').value = localStorage.getItem('hrn_bg') || "";
            document.getElementById('sys-part').checked = localStorage.getItem('hrn_part') !== 'false';
            document.getElementById('sys-int').value = localStorage.getItem('hrn_int') || "0.5";
        };

        function save() {
            localStorage.setItem('hrn_title', document.getElementById('sys-title').value);
            localStorage.setItem('hrn_fav', document.getElementById('sys-fav').value);
            localStorage.setItem('hrn_clr', document.getElementById('sys-color').value);
            localStorage.setItem('hrn_op', document.getElementById('sys-opacity').value);
            localStorage.setItem('hrn_bg', document.getElementById('sys-bg').value);
            localStorage.setItem('hrn_part', document.getElementById('sys-part').checked);
            localStorage.setItem('hrn_int', document.getElementById('sys-int').value);
            window.parent.postMessage('sync', '*');
            const b = document.querySelector('.btn-save'); b.textContent = "SYNCED"; setTimeout(()=>b.textContent="SAVE & REBOOT", 1000);
        }
    </script>
</body>
</html>
