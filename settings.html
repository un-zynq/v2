<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - HRN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { margin:0; padding:40px; font-family:'Inter',sans-serif; background:#05070a; color:#f0f4ff; min-height:100vh; }
        .container { max-width:720px; margin:0 auto; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-radius:20px; padding:40px; }
        h1 { font-size:2.4rem; margin-bottom:8px; }
        .section { margin:32px 0; }
        label { display:block; margin:12px 0 6px; font-weight:500; color:#a8c4ff; }
        input[type="text"], input[type="url"] { width:100%; padding:14px 16px; background:#11151f; border:1px solid #334155; border-radius:12px; color:white; font-size:1rem; box-sizing: border-box; }
        button { padding:12px 28px; background:#89b4fa; color:#05070a; border:none; border-radius:9999px; font-weight:600; cursor:pointer; margin-top:20px; transition: all 0.2s ease; }
        button:hover { background:#a5c6ff; transform:scale(1.03); }
        .note { font-size:0.85rem; color:#64748b; margin-top:4px; }
        input[type="checkbox"] { margin-right: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Settings</h1>
        <p style="color:#94a3b8;">Personalize your HRN Gaming Hub</p>

        <div class="section">
            <label>Tab Title</label>
            <input type="text" id="tabTitle" placeholder="HRN | Gaming Hub" value="HRN | Gaming Hub">
        </div>

        <div class="section">
            <label>Background Image URL</label>
            <input type="url" id="bgUrl" placeholder="https://example.com/your-image.jpg">
            <div class="note">Leave empty for default dark gaming background</div>
        </div>

        <div class="section">
            <label>Favicon URL (png, jpg, svg, ico)</label>
            <input type="url" id="faviconUrl" placeholder="https://example.com/favicon.png">
        </div>

        <div class="section">
            <label>
                <input type="checkbox" id="particlesToggle" checked> Enable Particles
            </label>
        </div>

        <button onclick="saveSettings()">Save Settings</button>
    </div>

    <script>
        lucide.createIcons();

        function saveSettings() {
            const bgUrl = document.getElementById('bgUrl').value.trim();
            const tabTitle = document.getElementById('tabTitle').value.trim() || "HRN | Gaming Hub";
            const favicon = document.getElementById('faviconUrl').value.trim();
            const particlesOn = document.getElementById('particlesToggle').checked;

            // Save to localStorage
            if (bgUrl) localStorage.setItem('hrn_bg_url', bgUrl);
            else localStorage.removeItem('hrn_bg_url');

            localStorage.setItem('hrn_tab_title', tabTitle);
            if (favicon) localStorage.setItem('hrn_favicon_url', favicon);
            localStorage.setItem('hrn_particles', particlesOn);

            // Send update to main window
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({
                    type: 'updateSettings',
                    bgUrl: bgUrl || null,
                    tabTitle: tabTitle,
                    favicon: favicon || null
                }, '*');
            }

            alert('Settings saved! Refresh the page if you do not see the changes immediately.');
        }

        // Load current values
        window.onload = () => {
            document.getElementById('tabTitle').value = localStorage.getItem('hrn_tab_title') || "HRN | Gaming Hub";
            document.getElementById('bgUrl').value = localStorage.getItem('hrn_bg_url') || "";
            document.getElementById('faviconUrl').value = localStorage.getItem('hrn_favicon_url') || "";
            document.getElementById('particlesToggle').checked = localStorage.getItem('hrn_particles') !== 'false';
        };
    </script>
</body>
</html>
