<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg: #050608; --card: #111318; --border: #242930; --text: #8e95a2; --accent: #89b4fa; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { width: 90%; max-width: 400px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; }
        .group { margin-bottom: 15px; }
        label { display: block; font-size: 0.6rem; text-transform: uppercase; color: var(--text); margin-bottom: 5px; font-weight: 700; }
        input, select { width: 100%; padding: 10px; background: #000; border: 1px solid var(--border); border-radius: 8px; color: white; outline: none; font-size: 0.8rem; box-sizing: border-box; }
        input[type="color"] { height: 40px; padding: 5px; }
        .footer { margin-top: 25px; display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; border: none; }
        .btn-apply { background: var(--accent); color: #000; }
        .btn-cancel { background: transparent; border: 1px solid var(--border); color: var(--text); }
    </style>
</head>
<body>
    <div class="card">
        <div class="group"><label>Tab Title</label><input type="text" id="tabTitle"></div>
        <div class="group"><label>Favicon URL</label><input type="url" id="faviconUrl"></div>
        <div class="group"><label>Background URL</label><input type="url" id="bgUrl"></div>
        <div class="group"><label>Theme Color</label><input type="color" id="themeColor"></div>
        <div class="group">
            <label>Particles</label>
            <select id="particleAmount">
                <option value="off">Off</option>
                <option value="low">Low</option>
                <option value="mid">Mid</option>
                <option value="high">High</option>
            </select>
        </div>
        <div class="footer">
            <button class="btn-cancel" onclick="window.parent.postMessage({type:'closeIframe'}, '*')">Cancel</button>
            <button class="btn-apply" onclick="save()">Save</button>
        </div>
    </div>
    <script>
        function save() {
            localStorage.setItem('hrn_tab_title', document.getElementById('tabTitle').value);
            localStorage.setItem('hrn_favicon_url', document.getElementById('faviconUrl').value);
            localStorage.setItem('hrn_bg_url', document.getElementById('bgUrl').value);
            localStorage.setItem('hrn_theme_color', document.getElementById('themeColor').value);
            localStorage.setItem('hrn_particle_amount', document.getElementById('particleAmount').value);
            window.parent.postMessage({ type: 'updateSettings' }, '*');
            setTimeout(() => window.parent.postMessage({ type: 'closeIframe' }, '*'), 50);
        }
        window.onload = () => {
            document.getElementById('tabTitle').value = localStorage.getItem('hrn_tab_title') || "";
            document.getElementById('faviconUrl').value = localStorage.getItem('hrn_favicon_url') || "";
            document.getElementById('bgUrl').value = localStorage.getItem('hrn_bg_url') || "";
            document.getElementById('themeColor').value = localStorage.getItem('hrn_theme_color') || "#89b4fa";
            document.getElementById('particleAmount').value = localStorage.getItem('hrn_particle_amount') || "mid";
        };
    </script>
</body>
</html>
