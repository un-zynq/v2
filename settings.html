<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SETTINGS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #030508; --accent: #89b4fa; --text: #f0f4ff; --panel: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 40px 20px; text-transform: uppercase; overflow-x: hidden; }
        .container { max-width: 600px; margin: 0 auto; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        h1 { font-size: 12px; letter-spacing: 5px; font-weight: 900; color: var(--accent); }
        .close-btn { background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 10px 20px; border-radius: 12px; cursor: pointer; font-size: 9px; font-weight: 900; letter-spacing: 2px; transition: 0.3s; }
        .close-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }
        .group { background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        .label { font-size: 9px; font-weight: 600; letter-spacing: 2px; color: rgba(255,255,255,0.4); margin-bottom: 15px; display: block; }
        input[type="text"] { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 15px; border-radius: 12px; color: white; font-family: inherit; font-size: 11px; letter-spacing: 1px; outline: none; transition: 0.3s; margin-bottom: 10px; }
        input[type="text"]:focus { border-color: var(--accent); }
        .flex-row { display: flex; gap: 15px; align-items: center; }
        input[type="color"] { -webkit-appearance: none; border: none; width: 50px; height: 50px; border-radius: 12px; background: none; cursor: pointer; }
        input[type="color"]::-webkit-color-swatch { border: 2px solid var(--border); border-radius: 12px; padding: 0; }
        input[type="range"] { flex: 1; accent-color: var(--accent); cursor: pointer; }
        .btn-save { width: 100%; background: var(--accent); color: #000; border: none; padding: 18px; border-radius: 15px; font-weight: 900; font-size: 11px; letter-spacing: 3px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .hint { font-size: 8px; color: rgba(255,255,255,0.2); margin-top: 10px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1><i data-lucide="sliders-horizontal" style="width:14px; vertical-align:middle; margin-right:10px"></i> CORE SETTINGS</h1>
        <button class="close-btn" onclick="window.parent.postMessage('close', '*')">EXIT</button>
    </header>

    <div class="group">
        <span class="label">System Identity</span>
        <input type="text" id="sys-title" placeholder="HRN | CORE">
        <input type="text" id="sys-fav" placeholder="Favicon URL (png/ico)">
        <p class="hint">Updates browser tab title and icon.</p>
    </div>

    <div class="group">
        <span class="label">Visuals (Color & Transparency)</span>
        <div class="flex-row">
            <input type="color" id="sys-color" value="#89b4fa">
            <input type="range" id="sys-opacity" min="0.1" max="0.8" step="0.1" value="0.8">
        </div>
        <p class="hint">Opacity affects logo and UI icons simultaneously.</p>
    </div>

    <div class="group">
        <span class="label">Wallpaper URL</span>
        <input type="text" id="sys-bg" placeholder="https://image-url.com/wallpaper.jpg">
    </div>

    <button class="btn-save" onclick="saveSettings()">Apply Changes</button>
</div>

<script>
    lucide.createIcons();

    window.onload = () => {
        document.getElementById('sys-title').value = localStorage.getItem('hrn_title') || "HRN | CORE";
        document.getElementById('sys-fav').value = localStorage.getItem('hrn_fav') || "";
        document.getElementById('sys-color').value = localStorage.getItem('hrn_clr') || "#89b4fa";
        document.getElementById('sys-opacity').value = localStorage.getItem('hrn_op') || "0.8";
        document.getElementById('sys-bg').value = localStorage.getItem('hrn_bg') || "";
        document.documentElement.style.setProperty('--accent', localStorage.getItem('hrn_clr') || "#89b4fa");
    };

    function saveSettings() {
        localStorage.setItem('hrn_title', document.getElementById('sys-title').value);
        localStorage.setItem('hrn_fav', document.getElementById('sys-fav').value);
        localStorage.setItem('hrn_clr', document.getElementById('sys-color').value);
        localStorage.setItem('hrn_op', document.getElementById('sys-opacity').value);
        localStorage.setItem('hrn_bg', document.getElementById('sys-bg').value);

        // Tell index.html to update live
        window.parent.postMessage('sync', '*');
        
        const btn = document.querySelector('.btn-save');
        btn.textContent = "SYSTEM UPDATED";
        setTimeout(() => btn.textContent = "Apply Changes", 2000);
    }
</script>
</body>
</html>
