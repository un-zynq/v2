<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --accent: #89b4fa;
            --bg: #030508;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            height: 100dvh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-transform: uppercase;
            letter-spacing: 1px;
            overflow: hidden;
        }

        .ambient-preview { 
            position: fixed; inset: 0; z-index: 1; 
            background-size: cover; background-position: center; 
            opacity: 0.2; filter: blur(40px); 
        }

        .core-pane { 
            position: relative; z-index: 10;
            width: 90%; max-width: 400px; 
            background: rgba(10, 10, 15, 0.8); 
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 30px; 
            padding: 25px;
        }

        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .nav h2 { font-size: 10px; font-weight: 900; color: var(--accent); opacity: 0.8; }
        
        .close-btn { 
            cursor: pointer; opacity: 0.5; transition: 0.2s; 
        }
        .close-btn:hover { opacity: 1; transform: scale(1.1); color: var(--accent); }

        .row { margin-bottom: 15px; }
        label { font-size: 7px; font-weight: 800; opacity: 0.3; display: block; margin-bottom: 8px; }

        input[type="text"], .btn-action { 
            width: 100%; background: var(--glass); border: 1px solid var(--border); 
            padding: 12px; border-radius: 12px; color: #fff; font-size: 10px; outline: none;
        }

        .flex-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        input[type="color"] { 
            -webkit-appearance: none; border: 1px solid var(--border);
            width: 100%; height: 40px; border-radius: 12px; background: var(--glass); cursor: pointer;
        }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 8px; }

        .slider-box { 
            background: var(--glass); padding: 12px; border-radius: 12px; border: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px;
        }
        input[type="range"] { -webkit-appearance: none; flex: 1; height: 2px; background: rgba(255,255,255,0.1); }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; cursor: pointer; }

        .toggle-box {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px; background: var(--glass); border-radius: 12px; border: 1px solid var(--border);
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #333; transition: 0.3s; }
        input:checked + .dot { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        .chips { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 5px; }
        .chip { 
            padding: 6px 10px; background: var(--glass); border: 1px solid var(--border); 
            border-radius: 8px; font-size: 8px; font-weight: 700; cursor: pointer; white-space: nowrap;
        }
        .chip:hover { border-color: var(--accent); color: var(--accent); }

        .hidden-file { position: absolute; width: 1px; height: 1px; opacity: 0; }
    </style>
</head>
<body>
    <div class="ambient-preview" id="bg-view"></div>
    
    <div class="core-pane">
        <div class="nav">
            <h2>SYSTEM_V3</h2>
            <div class="close-btn" onclick="window.parent.postMessage('close', '*')">
                <i data-lucide="x-circle" size="18"></i>
            </div>
        </div>

        <div class="row">
            <div class="flex-group">
                <div class="group">
                    <label>Accent</label>
                    <input type="color" id="clr">
                </div>
                <div class="group">
                    <label>Wallpaper</label>
                    <button class="btn-action" onclick="document.getElementById('bg-file').click()">Upload</button>
                    <input type="file" id="bg-file" class="hidden-file" accept="image/*">
                </div>
            </div>
        </div>

        <div class="row">
            <label>Remote Background URL</label>
            <input type="text" id="bg" placeholder="https://...">
        </div>

        <div class="row">
            <div class="toggle-box" onclick="document.getElementById('part').click()" style="cursor:pointer">
                <label style="margin:0; opacity:1">Particles</label>
                <input type="checkbox" id="part" hidden>
                <div class="dot"></div>
            </div>
        </div>

        <div class="row flex-group">
            <div class="group">
                <label>Density</label>
                <div class="slider-box"><input type="range" id="int" min="0.1" max="4.0" step="0.1"></div>
            </div>
            <div class="group">
                <label>Opacity</label>
                <div class="slider-box"><input type="range" id="op" min="0.1" max="1" step="0.05"></div>
            </div>
        </div>

        <div class="row">
            <label>Masking Presets</label>
            <div class="chips" id="p-list"></div>
        </div>

        <div class="row">
            <div class="flex-group">
                <input type="text" id="title" placeholder="Title">
                <input type="text" id="fav" placeholder="Favicon URL">
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const msg = () => window.parent.postMessage('sync', '*');
        const presets = [
            {n:"Default", t:"HRN | CORE", f:"favicon.png"},
            {n:"Google", t:"Google", f:"https://google.com/favicon.ico"},
            {n:"Drive", t:"My Drive", f:"https://ssl.gstatic.com/docs/doclist/images/drive_2022q3_32dp.png"},
            {n:"Mail", t:"Gmail", f:"https://ssl.gstatic.com/ui/v1/icons/mail/images/favicon5.ico"}
        ];

        // Init Presets
        presets.forEach(p => {
            const c = document.createElement('div');
            c.className = 'chip'; c.innerText = p.n;
            c.onclick = () => {
                document.getElementById('title').value = p.t;
                document.getElementById('fav').value = p.f;
                localStorage.setItem('hrn_title', p.t);
                localStorage.setItem('hrn_fav', p.f);
                msg();
            };
            document.getElementById('p-list').appendChild(c);
        });

        // Background Logic
        const setBg = (val) => {
            localStorage.setItem('hrn_bg', val);
            document.getElementById('bg-view').style.backgroundImage = `url(${val})`;
            msg();
        };

        document.getElementById('bg-file').onchange = (e) => {
            const fr = new FileReader();
            fr.onload = () => setBg(fr.result);
            fr.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('bg').onchange = async (e) => {
            if(e.target.value.startsWith('http')) {
                try {
                    const r = await fetch(e.target.value);
                    const b = await r.blob();
                    const fr = new FileReader();
                    fr.onloadend = () => { setBg(fr.result); e.target.value = ''; };
                    fr.readAsDataURL(b);
                } catch { setBg(e.target.value); }
            }
        };

        // Standard Fields
        ['title', 'clr', 'op', 'int', 'fav'].forEach(f => {
            const el = document.getElementById(f);
            el.value = localStorage.getItem('hrn_'+f) || {title:'HRN', clr:'#89b4fa', op:0.8, int:1.1, fav:''}[f];
            el.oninput = () => { localStorage.setItem('hrn_'+f, el.value); msg(); };
        });

        const p = document.getElementById('part');
        p.checked = localStorage.getItem('hrn_part') !== 'false';
        p.onchange = () => { localStorage.setItem('hrn_part', p.checked); msg(); };
        
        if(localStorage.getItem('hrn_bg')) setBg(localStorage.getItem('hrn_bg'));
    </script>
</body>
</html>
