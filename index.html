<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HRN | Gaming Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Vanta.js dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>

    <style>
        :root {
            --bg: #05070a;
            --accent: #89b4fa;
            --text-main: #f0f4ff;
            --text-dim: rgba(255, 255, 255, 0.58);
            --glass: rgba(255, 255, 255, 0.035);
            --glass-border: rgba(255, 255, 255, 0.09);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        *::-webkit-scrollbar { display: none; }
        html, body {
            height: 100dvh;
            min-height: 100vh;
            width: 100%;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            overflow: hidden;
            user-select: none;
        }
        a, button, .side-link, .discord-pill, .info-pill { cursor: pointer; }

        .ambient-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(circle at 40% 30%, rgba(137, 180, 250, 0.025) 0%, transparent 70%);
        }

        /* Vanta container */
        #vanta-bg {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        .glow {
            position: fixed;
            width: 460px;
            height: 460px;
            background: radial-gradient(circle, rgba(137, 180, 250, 0.13) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
            opacity: 0.28;
            filter: blur(65px);
            mix-blend-mode: screen;
            display: none;
        }
        @media (hover: hover) { .glow { display: block; } }

        .wrapper {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            min-height: 100vh;
            padding: 28px 36px;
            max-width: 1680px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }
        .header {
            display: flex;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        .header.show { opacity: 1; }
        #status-pill {
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--glass);
            padding: 9px 24px;
            border-radius: 9999px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            color: var(--text-dim);
            text-transform: uppercase;
        }
        .pill-sep { width: 1px; height: 12px; background: var(--glass-border); }

        .main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-grow: 1;
            position: relative;
            z-index: 10;
        }
        .side-nav.desktop-only {
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 300;
            width: 62px;
        }
        .side-nav.mobile-nav {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 260px;
            margin: 0 auto;
            z-index: 300;
        }
        .side-link {
            width: 100%;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
            text-decoration: none;
        }
        .side-link:hover {
            background: rgba(137, 180, 250, 0.13);
            border-color: var(--accent);
            transform: translateY(-4px) scale(1.05);
            color: var(--accent);
        }
        .side-link svg { width: 22px; height: 22px; stroke-width: 2.1px; }

        .center-brand {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            z-index: 50;
        }
        .logo {
            font-size: clamp(4.2rem, 14vw, 10.5rem);
            font-weight: 900;
            letter-spacing: -0.07em;
            line-height: 0.82;
            background: linear-gradient(180deg, #ffffff 28%, #a8c4ff 72%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 20px 45px rgba(137, 180, 250, 0.35));
        }
        .tagline {
            font-size: 1.02rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            color: var(--text-dim);
            margin-top: -4px;
        }
        .info-pills { display: flex; gap: 12px; margin-top: 6px; flex-wrap: wrap; justify-content: center; }
        .info-pill {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 9999px;
            padding: 8px 19px;
            font-size: 0.81rem;
            font-weight: 500;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(16px);
            transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
            text-decoration: none;
        }
        .info-pill:hover {
            border-color: var(--accent);
            color: var(--text-main);
            transform: translateY(-2px);
        }
        .discord-pill {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 13px 34px;
            border-radius: 9999px;
            border: 1px solid rgba(255,255,255,0.14);
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            background: var(--glass);
            backdrop-filter: blur(18px);
            transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
            text-decoration: none;
            color: #fff;
        }
        .discord-pill svg {
            width: 22px;
            height: 22px;
            fill: #c0c8d8;
            transition: fill 0.3s ease;
        }
        .discord-pill:hover svg { fill: var(--accent); }

        @media (max-width: 768px) {
            .wrapper { padding: 20px 16px; }
            .main { flex-direction: column; justify-content: center; gap: 28px; }
            .center-brand { position: static; transform: none; order: 1; gap: 16px; }
            .logo { font-size: clamp(3.7rem, 16.5vw, 8.6rem); }
            .tagline { font-size: 0.96rem; }
            .info-pills { display: none; }
            .discord-pill {
                position: fixed;
                bottom: 22px;
                right: 18px;
                width: 52px;
                height: 52px;
                padding: 0;
                justify-content: center;
                border-radius: 14px;
                background: rgba(18, 20, 23, 0.95);
            }
            .discord-pill span { display: none; }
            .side-nav.mobile-nav {
                display: grid !important;
                grid-template-columns: repeat(3, 1fr);
                gap: 9px;
                width: 100%;
                max-width: 255px;
                margin: 0 auto;
                order: 2;
            }
        }
    </style>
</head>
<body>
    <!-- Vanta NET Background -->
    <div id="vanta-bg"></div>
    <div class="ambient-bg"></div>
    <div class="glow" id="mouse-glow"></div>

    <div class="wrapper">
        <header class="header" id="header">
            <div id="status-pill" role="status" aria-live="polite">
                <span id="date"></span>
                <div class="pill-sep"></div>
                <span id="clock"></span>
            </div>
        </header>
        <main class="main">
            <nav class="side-nav desktop-only" aria-label="Main navigation">
                <a href="#" class="side-link" aria-label="Shop"><i data-lucide="shopping-cart"></i></a>
                <a href="#" class="side-link" aria-label="Settings" onclick="toggleBG()"><i data-lucide="settings"></i></a>
                <a href="#" class="side-link" aria-label="Profile"><i data-lucide="user"></i></a>
            </nav>
            <div class="center-brand">
                <h1 class="logo">HRN</h1>
                <p class="tagline">ELITE GAMING COMMUNITY</p>
                <div class="info-pills desktop-only" id="info-pills"></div>
               
                <a href="https://discord.gg/JAmeRKQzX" target="_blank" rel="noopener noreferrer" class="discord-pill">
                    <svg viewBox="0 0 127.14 96.36" aria-hidden="true">
                        <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.71,32.65-1.82,56.6.48,80.21h0A105.73,105.73,0,0,0,32.47,96.36,77.7,77.7,0,0,0,39.2,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.73,11.1,105.32,105.32,0,0,0,32.05-16.15h0C129.58,52.84,121,29.22,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5.07-12.73,11.41-12.73S54,46,53.86,53,48.74,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5.07-12.73,11.44-12.73S96.23,46,96.11,53,91,65.69,84.69,65.69Z"/>
                    </svg>
                    <span>JOIN DISCORD</span>
                </a>
            </div>
            <nav class="side-nav mobile-nav" id="mobileNav" aria-label="Main navigation">
                <a href="#" class="side-link" aria-label="Play"><i data-lucide="play"></i></a>
                <a href="#" class="side-link" aria-label="Community"><i data-lucide="users"></i></a>
                <a href="#" class="side-link" aria-label="Tournaments"><i data-lucide="trophy"></i></a>
                <a href="#" class="side-link" aria-label="Shop"><i data-lucide="shopping-cart"></i></a>
                <a href="#" class="side-link" aria-label="Settings" onclick="toggleBG()"><i data-lucide="settings"></i></a>
                <a href="#" class="side-link" aria-label="Profile"><i data-lucide="user"></i></a>
            </nav>
        </main>
    </div>

    <script>
        lucide.createIcons();

        // Vanta NET Effect
        let vantaEffect;
        function initVanta() {
            vantaEffect = VANTA.NET({
                el: "#vanta-bg",
                mouseControls: true,
                touchControls: true,
                gyroControls: false,
                minHeight: 200.00,
                minWidth: 200.00,
                scale: 1.00,
                scaleMobile: 1.00,
                color: 0x89b4fa,           // jouw accent kleur
                backgroundColor: 0x05070a, // jouw achtergrond
                points: 12.0,              // aantal punten
                maxDistance: 22.0,         // maximale verbindingsafstand
                spacing: 16.0,             // afstand tussen punten
                showDots: true
            });
        }

        function toggleBG() {
            document.body.classList.toggle('show-bg');
            localStorage.setItem('bg-visible', document.body.classList.contains('show-bg'));
        }
        if (localStorage.getItem('bg-visible') === 'true') document.body.classList.add('show-bg');

        function updateDateTime() {
            const now = new Date();
            const hours = now.getHours() % 12 || 12;
            const min = now.getMinutes().toString().padStart(2, '0');
            const ampm = now.getHours() >= 12 ? 'PM' : 'AM';
            const dateStr = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();
            document.getElementById('clock').textContent = `${hours}:${min} ${ampm}`;
            document.getElementById('date').textContent = dateStr;
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();

        // Mouse glow
        const glow = document.getElementById('mouse-glow');
        let targetX = 0, targetY = 0, currentX = 0, currentY = 0;
        document.addEventListener('mousemove', (e) => {
            targetX = e.clientX;
            targetY = e.clientY;
        }, { passive: true });

        function animateGlow() {
            currentX += (targetX - currentX) * 0.09;
            currentY += (targetY - currentY) * 0.09;
            if (glow) glow.style.transform = `translate3d(${currentX}px, ${currentY}px, 0) translate(-50%, -50%)`;
            requestAnimationFrame(animateGlow);
        }
        animateGlow();

        function checkHeaderVisibility() {
            const header = document.getElementById('header');
            header.classList.toggle('show', window.innerHeight > 620);
        }
        window.addEventListener('resize', checkHeaderVisibility);
        window.addEventListener('load', checkHeaderVisibility);

        async function loadRandomGames() {
            const container = document.getElementById('info-pills');
            if (!container) return;
            try {
                const res = await fetch('https://un-zynq.github.io/games.json');
                const data = await res.json();
                let all = [];
                Object.values(data).forEach(arr => { if (Array.isArray(arr)) all = all.concat(arr); });
                const shuffled = all.sort(() => 0.5 - Math.random()).slice(0, 3);
                container.innerHTML = `
                    <a href="/game/${shuffled[0]}" class="info-pill">
                        <i data-lucide="play-circle"></i>
                        <span>${shuffled[0].replace(/-/g, ' ')}</span>
                    </a>
                    <a href="/unblocked/" class="info-pill">
                        <i data-lucide="globe"></i>
                        <span>Backup Sites</span>
                    </a>
                `;
                lucide.createIcons();
            } catch(e) {
                container.innerHTML = `
                    <a href="/game/2048" class="info-pill"><i data-lucide="play-circle"></i><span>2048</span></a>
                    <a href="/unblocked/" class="info-pill"><i data-lucide="globe"></i><span>Backup Sites</span></a>
                `;
                lucide.createIcons();
            }
        }

        // Start alles
        window.addEventListener('load', () => {
            initVanta();
            checkHeaderVisibility();
            loadRandomGames();
        });

        // Cleanup
        window.addEventListener('beforeunload', () => {
            if (vantaEffect) vantaEffect.destroy();
        });
    </script>
</body>
</html>
