<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="dynamic-title">HRN | CORE</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #030508;
            --accent: #89b4fa;
            --accent-rgb: 137, 180, 250;
            --text: #f0f4ff;
            /* Basis zichtbaarheid verhoogd */
            --dim: rgba(255, 255, 255, 0.7); 
            --border: rgba(255, 255, 255, 0.15);
            --logo-opacity: 0.8;
            
            /* DESKTOP HOVER (High Visibility) */
            --glow-opacity: 0.6;
            --border-opacity: 1; 
            --icon-opacity: 1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; text-transform: uppercase; }

        /* LOADER */
        #loader {
            position: fixed; inset: 0; z-index: 10000; background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .load-line { width: 140px; height: 1px; background: rgba(255,255,255,0.1); position: relative; }
        #progress { position: absolute; height: 100%; width: 0%; background: var(--accent); transition: width 0.3s; box-shadow: 0 0 15px var(--accent); }

        /* BACKGROUND */
        .ambient-bg { position: fixed; inset: 0; z-index: 1; pointer-events: none; background-size: cover; background-position: center; opacity: 0; filter: brightness(0.4); transition: opacity 1.5s; }
        canvas { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
        #mouse-glow { position: fixed; width: 600px; height: 600px; border-radius: 50%; pointer-events: none; z-index: 3; background: radial-gradient(circle, rgba(var(--accent-rgb), 0.12) 0%, transparent 70%); transform: translate(-50%, -50%); filter: blur(60px); }

        /* UI */
        .wrapper { position: relative; display: flex; flex-direction: column; height: 100dvh; width: 100%; z-index: 10; opacity: 0; transition: opacity 0.8s ease; }
        .wrapper.active { opacity: 1; }

        .header { position: absolute; top: 40px; width: 100%; display: flex; justify-content: center; }
        .status-pill { background: rgba(255,255,255,0.04); border: 1px solid var(--border); padding: 12px 28px; border-radius: 100px; backdrop-filter: blur(15px); font-size: 10px; font-weight: 900; letter-spacing: 2px; color: var(--text); display: flex; gap: 20px; }

        .brand { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .logo { 
            font-size: clamp(5rem, 22vw, 13rem); font-weight: 900; letter-spacing: -0.07em; line-height: 0.8;
            background: linear-gradient(180deg, #fff 50%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            opacity: var(--logo-opacity); transition: 0.4s; filter: drop-shadow(0 0 30px rgba(var(--accent-rgb), 0.2));
        }
        .tagline { font-size: 11px; letter-spacing: 12px; color: var(--text); margin-top: 30px; opacity: 0; transform: translateY(15px); transition: 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.5s; font-weight: 600; }
        .tagline.show { opacity: 0.7; transform: translateY(0); }

        /* NAV */
        .side-nav { position: absolute; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 30px; padding: 0 60px; z-index: 20; transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s; }
        .nav-left { left: -100px; opacity: 0; }
        .nav-right { right: -100px; opacity: 0; }
        .wrapper.active .nav-left { left: 0; opacity: 1; }
        .wrapper.active .nav-right { right: 0; opacity: 1; }

        .mobile-nav { display: none; gap: 25px; margin-top: 50px; pointer-events: all; }
        
        /* THE BUTTONS - Meer basis zichtbaarheid */
        .btn { 
            width: 65px; height: 65px; border-radius: 24px; 
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            color: var(--dim); display: flex; align-items: center; 
            justify-content: center; cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); pointer-events: all;
            backdrop-filter: blur(5px);
        }

        .btn:hover, .btn.active { 
            color: rgba(var(--accent-rgb), var(--icon-opacity)); 
            border: 1px solid rgba(var(--accent-rgb), var(--border-opacity)); 
            background: rgba(var(--accent-rgb), 0.08); 
            transform: scale(1.12) translateY(-3px); 
            box-shadow: 0 15px 40px -10px rgba(var(--accent-rgb), var(--glow-opacity));
        }

        /* MOBILE FIX: Duidelijkere 10%/20% (Visually tuned) */
        @media (max-width: 900px) {
            :root {
                --glow-opacity: 0.2;   /* Iets meer dan 10% omdat 10% onzichtbaar was */
                --border-opacity: 0.3; /* Duidelijkere lijn op mobiel */
                --icon-opacity: 0.5;   /* Icoon is nu echt zichtbaar bij hover */
            }
            .side-nav { display: none !important; }
            .mobile-nav { display: flex; }
            .logo { font-size: clamp(6.5rem, 30vw, 11rem); }
            .btn:hover { transform: scale(1.08); } 
        }

        /* MODAL */
        #container { position: fixed; inset: 0; z-index: 1000; background: var(--bg); display: none; }
        #container.active { display: block; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div id="loader"><div class="load-line"><div id="progress"></div></div></div>
    <div class="ambient-bg" id="bg"></div>
    <div id="mouse-glow"></div>
    <canvas id="particles"></canvas>

    <div class="wrapper" id="ui">
        <div class="header">
            <div class="status-pill"><span id="date">SYNCING</span><span id="clock">00:00</span></div>
        </div>

        <div class="side-nav nav-left">
            <div class="btn" data-page="settings" onclick="setHash('settings')"><i data-lucide="settings"></i></div>
            <div class="btn" data-page="games" onclick="setHash('games')"><i data-lucide="gamepad-2"></i></div>
            <div class="btn" data-page="bookmarklets" onclick="setHash('bookmarklets')"><i data-lucide="bookmark"></i></div>
        </div>

        <div class="brand">
            <h1 class="logo">HRN</h1>
            <p class="tagline" id="tagline">SYSTEM READY</p>
            <div class="mobile-nav">
                <div class="btn" data-page="settings" onclick="setHash('settings')"><i data-lucide="settings"></i></div>
                <div class="btn" data-page="games" onclick="setHash('games')"><i data-lucide="gamepad-2"></i></div>
                <div class="btn" data-page="bookmarklets" onclick="setHash('bookmarklets')"><i data-lucide="bookmark"></i></div>
            </div>
        </div>

        <div class="side-nav nav-right">
            <div class="btn" data-page="about" onclick="setHash('about')"><i data-lucide="info"></i></div>
            <div class="btn" data-page="add" onclick="setHash('add')"><i data-lucide="plus"></i></div>
        </div>
    </div>

    <div id="container"><iframe id="frame"></iframe></div>

    <script>
        lucide.createIcons();
        const $ = id => document.getElementById(id);
        const cache = {};
        const TAGLINES = ["INTERFACE ONLINE", "SYSTEM CORE", "NEURAL LINK STABLE", "BUILT DIFFERENT", "ELITE HUB"];

        const canvas = $('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let w, h;

        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        class P {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * w; this.y = Math.random() * h;
                this.s = Math.random() * 2; // Iets grotere particles
                this.vx = Math.random() * 0.4 - 0.2; this.vy = Math.random() * 0.4 - 0.2;
                this.o = Math.random() * 0.6; // Meer zichtbare particles
            }
            draw() {
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent');
                ctx.globalAlpha = this.o;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, 7); ctx.fill();
                this.x += this.vx; this.y += this.vy;
                if(this.x<0 || this.x>w || this.y<0 || this.y>h) this.init();
            }
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : "137, 180, 250";
        }

        async function loadPage(name) {
            try {
                const r = await fetch(name + '.html');
                if (!r.ok) throw new Error();
                cache[name] = await r.text();
            } catch(e) { 
                cache[name] = `<body style="background:#030508; margin:0; display:flex; align-items:center; justify-content:center; height:100vh;"><button onclick="window.parent.postMessage('close','*')" style="background:none; border:1px solid rgba(255,255,255,0.2); color:white; padding:15px 30px; border-radius:8px; cursor:pointer; font-family:sans-serif; font-size:10px; letter-spacing:4px; font-weight:900; text-transform:uppercase;">EXIT</button></body>`; 
            }
        }

        async function init() {
            sync();
            const pages = ['settings', 'games', 'about', 'add', 'bookmarklets'];
            for (let i = 0; i < pages.length; i++) {
                await loadPage(pages[i]);
                $('progress').style.width = ((i+1) / pages.length * 100) + '%';
            }
            for(let i=0; i<55; i++) particles.push(new P()); // Meer particles
            loop();
            setTimeout(() => {
                $('loader').style.opacity = '0';
                setTimeout(() => $('loader').style.display = 'none', 600);
                $('ui').classList.add('active');
                $('tagline').textContent = TAGLINES[Math.floor(Math.random()*TAGLINES.length)];
                $('tagline').classList.add('show');
                checkHash();
            }, 500);
        }

        function loop() { ctx.clearRect(0,0,w,h); particles.forEach(p => p.draw()); requestAnimationFrame(loop); }

        function sync() {
            const c = localStorage.getItem('hrn_clr') || "#89b4fa";
            const o = localStorage.getItem('hrn_op') || "0.8"; // Default nu 0.8
            const b = localStorage.getItem('hrn_bg');
            const t = localStorage.getItem('hrn_title') || "HRN | CORE";
            
            document.documentElement.style.setProperty('--accent', c);
            document.documentElement.style.setProperty('--accent-rgb', hexToRgb(c));
            document.documentElement.style.setProperty('--logo-opacity', o);
            $('dynamic-title').textContent = t;
            
            if(b) { $('bg').style.backgroundImage = `url(${b})`; $('bg').style.opacity = 0.6; }
        }

        function setHash(name) { window.location.hash = name; }

        function checkHash() {
            const h = window.location.hash.slice(1);
            if (h && cache[h]) {
                $('frame').srcdoc = cache[h];
                $('container').classList.add('active');
                document.querySelectorAll('.btn').forEach(b => b.classList.toggle('active', b.dataset.page === h));
            } else {
                $('container').classList.remove('active');
                document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            }
        }

        window.addEventListener('hashchange', checkHash);
        window.addEventListener('message', e => {
            if(e.data === 'close') window.location.hash = '';
            if(e.data === 'sync') sync();
        });

        window.onmousemove = (e) => {
            $('mouse-glow').style.left = e.clientX + 'px';
            $('mouse-glow').style.top = e.clientY + 'px';
        };

        setInterval(() => {
            const n = new Date();
            $('clock').textContent = n.toLocaleTimeString('en-US', {hour12: false, hour:'2-digit', minute:'2-digit'});
            $('date').textContent = n.toLocaleDateString('en-US', {weekday:'short', day:'numeric'}).toUpperCase();
        }, 1000);

        window.onload = init;
    </script>
</body>
</html>
