<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="dynamic-title">HRN | CORE</title>
    <link id="app-favicon" rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #030508;
            --accent: #89b4fa;
            --accent-rgb: 137, 180, 250;
            /* Subtiel zilver voor de rest */
            --ui-silver: rgba(230, 235, 255, 0.6); 
            --ui-border: rgba(255, 255, 255, 0.08);
            --logo-opacity: 0.8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; background: var(--bg); color: var(--ui-silver); font-family: 'Inter', sans-serif; overflow: hidden; text-transform: uppercase; }

        /* GPU LAYERS */
        #webgl-canvas { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
        .ambient-bg { position: fixed; inset: -50px; z-index: 1; pointer-events: none; background-size: cover; background-position: center; opacity: 0; filter: brightness(0.3) blur(40px); transition: 2.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .ambient-bg.loaded { opacity: 0.4; filter: brightness(0.4) blur(0px); }

        /* LOADER */
        #loader { position: fixed; inset: 0; z-index: 10000; background: var(--bg); display: flex; align-items: center; justify-content: center; transition: opacity 0.8s ease; }
        .load-line { width: 190px; height: 1px; background: rgba(255,255,255,0.03); position: relative; overflow: hidden; }
        #progress { position: absolute; height: 100%; width: 0%; background: var(--accent); transition: width 0.5s ease; box-shadow: 0 0 20px var(--accent); }

        /* UI STRUCTURE */
        .wrapper { position: relative; display: flex; flex-direction: column; height: 100dvh; width: 100%; z-index: 10; opacity: 0; transform: scale(1.02); transition: 1.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .wrapper.active { opacity: 1; transform: scale(1); }

        .header { position: absolute; top: 38px; width: 100%; display: flex; justify-content: center; z-index: 100; }
        .status-pill { background: rgba(255,255,255,0.01); border: 1px solid var(--ui-border); padding: 11px 28px; border-radius: 100px; backdrop-filter: blur(20px); font-size: 9.5px; font-weight: 900; letter-spacing: 2.8px; display: flex; gap: 28px; transition: 0.6s ease; color: var(--ui-silver); }

        .brand { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; width: 100%; }
        /* Logo behoudt accentkleur */
        .logo { font-size: clamp(6.5rem, 26vw, 14.5rem); font-weight: 900; letter-spacing: -0.08em; line-height: 0.75; background: linear-gradient(180deg, #fff 40%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; opacity: var(--logo-opacity); transition: 0.8s; }
        .tagline { font-size: 10.5px; letter-spacing: 13.5px; color: var(--ui-silver); margin-top: 38px; opacity: 0; transform: translateY(28px); transition: 2s cubic-bezier(0.16, 1, 0.3, 1) 0.8s; }
        .tagline.show { opacity: 0.4; transform: translateY(0); }

        /* NAVIGATION - SILVER DESIGN */
        .side-nav { position: absolute; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 25px; padding: 0 55px; z-index: 20; transition: 1.2s; }
        .nav-left { left: -150px; opacity: 0; }
        .nav-right { right: -150px; opacity: 0; }
        .wrapper.active .nav-left { left: 0; opacity: 1; }
        .wrapper.active .nav-right { right: 0; opacity: 1; }

        .mobile-nav { display: none; gap: 20px; margin-top: 45px; pointer-events: all; justify-content: center; }
        
        .btn { 
            width: 64px; height: 64px; border-radius: 22px; 
            background: rgba(255,255,255,0.02); border: 1px solid var(--ui-border); 
            color: var(--ui-silver); opacity: 0.6; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.45s cubic-bezier(0.16, 1, 0.3, 1); 
            pointer-events: all; backdrop-filter: blur(15px); 
        }
        .btn svg { width: 24px; height: 24px; stroke-width: 1.8px; }

        /* Alleen bij hover komt de accent kleur subtiel terug in de border/glow */
        .btn:hover, .btn.active { 
            opacity: 1; color: #fff; 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            background: rgba(255, 255, 255, 0.05); 
            transform: scale(1.12) translateY(-4px); 
            box-shadow: 0 18px 35px -10px rgba(0, 0, 0, 0.5); 
        }

        @media (max-width: 900px) { .side-nav { display: none !important; } .mobile-nav { display: flex; } .logo { font-size: clamp(7rem, 29vw, 11.5rem); } }

        #container { position: fixed; inset: 0; z-index: 1000; background: var(--bg); display: none; opacity: 0; transition: opacity 0.5s ease; }
        #container.active { display: block; opacity: 1; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div id="loader"><div class="load-line"><div id="progress"></div></div></div>
    <div class="ambient-bg" id="bg"></div>
    <canvas id="webgl-canvas"></canvas>

    <div class="wrapper" id="ui">
        <div class="header">
            <div class="status-pill" id="status-pill"><span id="date">SYNCING</span><span id="clock">00:00:00</span></div>
        </div>
        <div class="side-nav nav-left">
            <div class="btn" onclick="setHash('settings')"><i data-lucide="settings"></i></div>
            <div class="btn" onclick="setHash('games')"><i data-lucide="gamepad-2"></i></div>
        </div>
        <div class="brand">
            <h1 class="logo">HRN</h1>
            <p class="tagline" id="tagline">QUANTUM CORE ACTIVE</p>
            <div class="mobile-nav">
                <div class="btn" onclick="setHash('settings')"><i data-lucide="settings"></i></div>
                <div class="btn" onclick="setHash('games')"><i data-lucide="gamepad-2"></i></div>
                <div class="btn" onclick="setHash('about')"><i data-lucide="info"></i></div>
            </div>
        </div>
        <div class="side-nav nav-right">
            <div class="btn" onclick="setHash('about')"><i data-lucide="info"></i></div>
            <div class="btn" onclick="setHash('add')"><i data-lucide="plus"></i></div>
        </div>
    </div>
    <div id="container"><iframe id="frame"></iframe></div>

    <script id="vs" type="x-shader/x-vertex">
        attribute vec2 a_pos; attribute float a_size; attribute float a_op;
        uniform vec2 u_res; varying float v_op;
        void main() {
            vec2 zeroToOne = a_pos / u_res;
            vec2 clipSpace = (zeroToOne * 2.0) - 1.0;
            gl_Position = vec4(clipSpace * vec2(1, -1), 0, 1);
            gl_PointSize = a_size * 1.5;
            v_op = a_op;
        }
    </script>
    <script id="fs" type="x-shader/x-fragment">
        precision mediump float; uniform vec3 u_color; varying float v_op;
        void main() {
            float dist = distance(gl_PointCoord, vec2(0.5));
            if (dist > 0.5) discard;
            gl_FragColor = vec4(u_color, (v_op * 1.3) * (1.0 - dist * 2.0));
        }
    </script>

    <script>
        lucide.createIcons();
        const $ = id => document.getElementById(id);
        const canvas = $('webgl-canvas');
        const gl = canvas.getContext('webgl', { antialias: true, alpha: true });
        let cache = {}, particles = [], pAmount = 150, pEnabled = true;
        let program, posAttr, sizeAttr, opAttr, resUni, colUni;

        function createShader(gl, type, source) {
            const s = gl.createShader(type);
            gl.shaderSource(s, source); gl.compileShader(s);
            return s;
        }

        function initGL() {
            const vS = createShader(gl, gl.VERTEX_SHADER, $('vs').text);
            const fS = createShader(gl, gl.FRAGMENT_SHADER, $('fs').text);
            program = gl.createProgram();
            gl.attachShader(program, vS); gl.attachShader(program, fS);
            gl.linkProgram(program); gl.useProgram(program);
            posAttr = gl.getAttribLocation(program, "a_pos");
            sizeAttr = gl.getAttribLocation(program, "a_size");
            opAttr = gl.getAttribLocation(program, "a_op");
            resUni = gl.getUniformLocation(program, "u_res");
            colUni = gl.getUniformLocation(program, "u_color");
            gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
        }

        function sync() {
            const c = localStorage.getItem('hrn_clr') || "#89b4fa";
            const o = parseFloat(localStorage.getItem('hrn_op')) || 0.8;
            pAmount = parseInt(localStorage.getItem('hrn_int')) || 150;
            pEnabled = localStorage.getItem('hrn_part') !== 'false';
            
            const r = parseInt(c.slice(1,3), 16)/255, g = parseInt(c.slice(3,5), 16)/255, b = parseInt(c.slice(5,7), 16)/255;
            gl.useProgram(program);
            gl.uniform3f(colUni, r, g, b); // Particles behouden de accent kleur
            
            document.documentElement.style.setProperty('--accent', c);
            document.documentElement.style.setProperty('--accent-rgb', `${r*255},${g*255},${b*255}`);
            document.documentElement.style.setProperty('--logo-opacity', o);

            $('dynamic-title').textContent = localStorage.getItem('hrn_title') || "HRN | CORE";
            
            particles = [];
            for(let i=0; i<pAmount; i++) {
                particles.push({
                    x: Math.random()*window.innerWidth, y: Math.random()*window.innerHeight,
                    s: Math.random()*4+2.5, vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4,
                    o: o * (Math.random() * 0.5 + 0.5) 
                });
            }
            if(localStorage.getItem('hrn_bg')) { $('bg').style.backgroundImage = `url(${localStorage.getItem('hrn_bg')})`; $('bg').classList.add('loaded'); }
            if(localStorage.getItem('hrn_fav')) $('app-favicon').href = localStorage.getItem('hrn_fav');
        }

        function render() {
            if(!pEnabled) { gl.clear(gl.COLOR_BUFFER_BIT); requestAnimationFrame(render); return; }
            const posData = new Float32Array(pAmount * 2);
            const sizeData = new Float32Array(pAmount);
            const opData = new Float32Array(pAmount);
            for(let i=0; i<pAmount; i++) {
                let p = particles[i]; p.x += p.vx; p.y += p.vy;
                if(p.x<0) p.x=window.innerWidth; if(p.x>window.innerWidth) p.x=0;
                if(p.y<0) p.y=window.innerHeight; if(p.y>window.innerHeight) p.y=0;
                posData[i*2] = p.x; posData[i*2+1] = p.y; sizeData[i] = p.s; opData[i] = p.o;
            }
            gl.clear(gl.COLOR_BUFFER_BIT); gl.uniform2f(resUni, window.innerWidth, window.innerHeight);
            const bPos = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, bPos); gl.bufferData(gl.ARRAY_BUFFER, posData, gl.STATIC_DRAW);
            gl.enableVertexAttribArray(posAttr); gl.vertexAttribPointer(posAttr, 2, gl.FLOAT, false, 0, 0);
            const bSize = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, bSize); gl.bufferData(gl.ARRAY_BUFFER, sizeData, gl.STATIC_DRAW);
            gl.enableVertexAttribArray(sizeAttr); gl.vertexAttribPointer(sizeAttr, 1, gl.FLOAT, false, 0, 0);
            const bOp = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, bOp); gl.bufferData(gl.ARRAY_BUFFER, opData, gl.STATIC_DRAW);
            gl.enableVertexAttribArray(opAttr); gl.vertexAttribPointer(opAttr, 1, gl.FLOAT, false, 0, 0);
            gl.drawArrays(gl.POINTS, 0, pAmount); requestAnimationFrame(render);
        }

        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; gl.viewport(0,0,canvas.width,canvas.height); };
        async function init() {
            window.onresize(); initGL(); sync();
            const pages = ['settings', 'games', 'about', 'add'];
            let loaded = 0;
            await Promise.all(pages.map(async p => { try { const r = await fetch(p+'.html'); cache[p] = await r.text(); } catch(e) { cache[p] = 'Error'; } loaded++; $('progress').style.width = (loaded/pages.length*100)+'%'; }));
            render();
            setTimeout(() => { $('loader').style.opacity = '0'; setTimeout(() => { $('loader').style.display = 'none'; $('ui').classList.add('active'); $('tagline').classList.add('show'); checkHash(); }, 800); }, 1000);
        }
        function setHash(n) { window.location.hash = n; }
        function checkHash() {
            const h = window.location.hash.slice(1);
            const container = $('container'), frame = $('frame');
            if(h && cache[h]) { frame.srcdoc = cache[h]; container.style.display = 'block'; setTimeout(() => container.classList.add('active'), 25); }
            else { container.classList.remove('active'); setTimeout(() => { if(!window.location.hash) container.style.display = 'none'; }, 500); }
        }
        window.addEventListener('hashchange', checkHash);
        window.addEventListener('message', e => { if(e.data === 'sync') sync(); if(e.data === 'close') setHash(''); });
        setInterval(() => { const n = new Date(); $('clock').textContent = n.toTimeString().split(' ')[0]; $('date').textContent = n.toLocaleDateString('en-US', {weekday:'short', day:'numeric'}).toUpperCase(); }, 1000);
        window.onload = init;
    </script>
</body>
</html>
