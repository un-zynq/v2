<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title id="dynamic-title">HRN</title>
<link id="app-favicon" rel="icon" type="image/png" href="/logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root{--bg:#030508;--accent:#89b4fa;--accent-rgb:137,180,250;--ui-silver:rgba(235,240,255,.85);--ui-border:rgba(255,255,255,.1)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;background:var(--bg);color:var(--ui-silver);font-family:Inter,sans-serif;overflow:hidden;text-transform:uppercase}
#webgl-canvas{position:fixed;inset:0;z-index:2;pointer-events:none}
.ambient-bg{position:fixed;inset:0;z-index:1;pointer-events:none;background-size:cover;background-position:center;opacity:0;filter:brightness(.7);transition:2.5s cubic-bezier(.4,0,.2,1)}
.ambient-bg.loaded{opacity:1}
.overlay-dim{position:fixed;inset:0;z-index:1;background:rgba(0,0,0,.3);pointer-events:none}
#loader{position:fixed;inset:0;z-index:10000;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .8s cubic-bezier(.4,0,.2,1),visibility .8s}
.load-line{width:220px;height:2px;background:rgba(255,255,255,.05);position:relative;overflow:hidden;border-radius:10px}
#progress{position:absolute;height:100%;width:0;background:var(--accent);transition:width .6s cubic-bezier(.22,1,.36,1);box-shadow:0 0 15px var(--accent)}
.wrapper{position:relative;display:flex;flex-direction:column;height:100dvh;width:100%;z-index:10;opacity:0;transform:scale(1.02);transition:1.5s cubic-bezier(.16,1,.3,1)}
.wrapper.active{opacity:1;transform:scale(1)}
.header{position:absolute;top:38px;width:100%;display:flex;justify-content:center;z-index:100}
.status-pill{background:rgba(0,0,0,.4);border:1px solid var(--ui-border);padding:11px 28px;border-radius:100px;backdrop-filter:blur(12px);font-size:9px;font-weight:900;letter-spacing:2.5px;display:flex;gap:28px;color:var(--ui-silver)}
.brand{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;width:100%;display:flex;flex-direction:column;align-items:center;gap:35px}
.logo{font-size:clamp(5.5rem,22vw,11.5rem);font-weight:900;letter-spacing:-.06em;line-height:.7;background:linear-gradient(180deg,#fff 50%,var(--accent) 150%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;opacity:.7}
.tagline{font-size:10px;font-weight:600;letter-spacing:9px;color:#fff;margin-top:0;opacity:0;transform:translateY(15px);transition:1.5s cubic-bezier(.16,1,.3,1) .5s;text-shadow:0 2px 15px rgba(0,0,0,.8);line-height:1.2;max-width:75%}
.tagline.show{opacity:.9;transform:translateY(0)}
.side-nav{position:absolute;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:20px;padding:0 55px;z-index:20;transition:1.2s cubic-bezier(.16,1,.3,1)}
.nav-left{left:-150px;opacity:0}
.nav-right{right:-150px;opacity:0}
.wrapper.active .nav-left{left:0;opacity:1}
.wrapper.active .nav-right{right:0;opacity:1}
.mobile-nav,.bottom-nav{display:none;pointer-events:all;justify-content:center}
.mobile-nav{gap:15px;margin-top:5px}
.bottom-nav{gap:18px;margin-top:40px;flex-wrap:wrap}
.bottom-nav.show{display:flex}
.btn{width:58px;height:58px;border-radius:18px;background:rgba(0,0,0,.4);border:1px solid var(--ui-border);color:var(--ui-silver);opacity:.85;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.4s cubic-bezier(.16,1,.3,1);backdrop-filter:blur(12px)}
.btn svg{width:22px;height:22px;stroke-width:1.8px}
.btn:active{transform:scale(.96)}
.btn.active,.btn:hover{opacity:1;color:#fff;border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.1);transform:scale(1.08) translateY(-2px);box-shadow:0 12px 25px -10px rgba(0,0,0,.5)}
#container{position:fixed;inset:0;z-index:1000;background:transparent;display:none;opacity:0;transition:opacity .5s ease-in-out}
#container.active{display:block;opacity:1}
iframe{width:100%;height:100%;border:none;background:transparent}
</style>
</head>
<body>
<div id="loader"><div class="load-line"><div id="progress"></div></div></div>
<div class="ambient-bg" id="bg"></div>
<div class="overlay-dim"></div>
<canvas id="webgl-canvas"></canvas>

<div class="wrapper" id="ui">
    <div class="header">
        <div class="status-pill" id="status-pill">
            <span id="date">SYNCING</span>
            <span id="clock">00:00:00</span>
        </div>
    </div>

    <div class="side-nav nav-left" id="side-left">
        <div class="btn" onclick="setHash('settings')"><i data-lucide="settings"></i></div>
        <div class="btn" onclick="setHash('games')"><i data-lucide="gamepad-2"></i></div>
    </div>

    <div class="brand">
        <h1 class="logo" id="main-logo">HRN</h1>
        <p class="tagline" id="tagline"></p>

        <div class="mobile-nav" id="mobile-nav">
            <div class="btn" onclick="setHash('settings')"><i data-lucide="settings"></i></div>
            <div class="btn" onclick="setHash('games')"><i data-lucide="gamepad-2"></i></div>
            <div class="btn" onclick="setHash('about')"><i data-lucide="info"></i></div>
        </div>

        <div class="bottom-nav" id="bottom-nav">
            <div class="btn" onclick="setHash('settings')"><i data-lucide="settings"></i></div>
            <div class="btn" onclick="setHash('games')"><i data-lucide="gamepad-2"></i></div>
            <div class="btn" onclick="setHash('about')"><i data-lucide="info"></i></div>
            <div class="btn" onclick="setHash('add')"><i data-lucide="plus"></i></div>
        </div>
    </div>

    <div class="side-nav nav-right" id="side-right">
        <div class="btn" onclick="setHash('about')"><i data-lucide="info"></i></div>
        <div class="btn" onclick="setHash('add')"><i data-lucide="plus"></i></div>
    </div>
</div>

<div id="container"><iframe id="frame"></iframe></div>

<script>
lucide.createIcons();

const $=id=>document.getElementById(id);
let db,cache={},startTime=Date.now();
const canvas=$('webgl-canvas');
const gl=canvas.getContext('webgl',{antialias:true,alpha:true});
const defaultBg="https://img.freepik.com/free-vector/black-background-with-wavy-lines_52683-76524.jpg";
let particles=[],pAmount=0,pEnabled=true;
const taglines=["YOU ARE THE AURA","LEGEND IN MAKING","POWER WITHIN YOU","OWN THE GAME","FEARLESS AND STRONG","RULE YOUR WORLD","MASTER OF ALL","RISE ABOVE ALL","UNSTOPPABLE FORCE","YOU DEFINE GREAT","BORN TO WIN","NEXT LEVEL: YOU","ALWAYS STAY SHARP","VICTORY IS YOURS","PURE SKILL ONLY","YOUR TIME: NOW","GAME CHANGER: HERE","UNLEASH YOUR POWER","NO LIMITS FOR YOU","DOMINATE THE FIELD","LEGENDS WALK HERE","ALL EYES ON YOU","YOUR SKILL, YOUR RULE"];
const DB_NAME="hrn_db"; const DB_VERSION=1;

function initDB(){
    return new Promise(resolve=>{
        const req=indexedDB.open(DB_NAME,DB_VERSION);
        req.onupgradeneeded=e=>{
            db=e.target.result;
            if(!db.objectStoreNames.contains('background')) db.createObjectStore('background',{keyPath:'id'});
        };
        req.onsuccess=e=>{db=e.target.result;resolve();};
        req.onerror=()=>resolve();
    });
}

async function loadBackground(){
    if(!db) await initDB();
    return new Promise(resolve=>{
        try{
            const tx=db.transaction('background','readonly');
            const req=tx.objectStore('background').get('current_bg');
            req.onsuccess=()=>resolve(req.result?req.result.value:defaultBg);
            req.onerror=()=>resolve(defaultBg);
        }catch(e){resolve(defaultBg);}
    });
}

async function updateBg(val){
    const bg=$('bg'); let displayUrl=defaultBg;
    if(val instanceof Blob) displayUrl=URL.createObjectURL(val);
    else if(typeof val==='string'&&val.length>0) displayUrl=val;
    bg.style.backgroundImage=`url('${displayUrl}')`;
    bg.classList.add('loaded');
}

// … rest van je WebGL en settings logic blijft hetzelfde zoals in jouw code
// initGL(), applyAllSettings(), render(), sync(), init(), setHash(), checkHash(), etc.

</script>
</body>
</html>
