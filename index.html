<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="dynamic-title">HRN</title>
    <link id="app-favicon" rel="icon" type="image/png" href="/logo.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root{--bg:#030508;--accent:#89b4fa;--accent-rgb:137,180,250;--ui-silver:rgba(235,240,255,0.85);--ui-border:rgba(255,255,255,0.1)}*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}body,html{height:100%;width:100%;background:var(--bg);color:var(--ui-silver);font-family:Inter,sans-serif;overflow:hidden;text-transform:uppercase}#webgl-canvas{position:fixed;inset:0;z-index:2;pointer-events:none}.ambient-bg{position:fixed;inset:0;z-index:1;pointer-events:none;background-size:cover;background-position:center;opacity:0;filter:brightness(0.7);transition:2.5s cubic-bezier(.4,0,.2,1)}.ambient-bg.loaded{opacity:1}.overlay-dim{position:fixed;inset:0;z-index:1;background:rgba(0,0,0,0.3);pointer-events:none}#loader{position:fixed;inset:0;z-index:10000;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .8s cubic-bezier(0.4,0,0.2,1),visibility .8s}.load-line{width:220px;height:2px;background:rgba(255,255,255,.05);position:relative;overflow:hidden;border-radius:10px}#progress{position:absolute;height:100%;width:0%;background:var(--accent);transition:width 0.6s cubic-bezier(0.22,1,0.36,1);box-shadow:0 0 15px var(--accent)}.wrapper{position:relative;display:flex;flex-direction:column;height:100dvh;width:100%;z-index:10;opacity:0;transform:scale(1.02);transition:1.5s cubic-bezier(.16,1,.3,1)}.wrapper.active{opacity:1;transform:scale(1)}.header{position:absolute;top:38px;width:100%;display:flex;justify-content:center;z-index:100}.status-pill{background:rgba(0,0,0,0.4);border:1px solid var(--ui-border);padding:11px 28px;border-radius:100px;backdrop-filter:blur(12px);font-size:9px;font-weight:900;letter-spacing:2.5px;display:flex;gap:28px;transition:.6s ease;color:var(--ui-silver)}.brand{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;width:100%;display:flex;flex-direction:column;align-items:center}.logo{font-size:clamp(5.5rem,22vw,11.5rem);font-weight:900;letter-spacing:-.06em;line-height:.75;background:linear-gradient(180deg,#fff 50%,var(--accent) 150%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;opacity:.7;transition:.8s}.tagline{font-size:10px;font-weight:600;letter-spacing:9px;color:#fff;margin-top:32px;opacity:0;transform:translateY(20px);transition:1.5s cubic-bezier(.16,1,.3,1).5s;text-shadow:0 2px 15px rgba(0,0,0,0.8);line-height:1.8;display:inline-block;max-width:80%;word-wrap:break-word}.tagline.show{opacity:.9;transform:translateY(0)}.side-nav{position:absolute;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:25px;padding:0 55px;z-index:20;transition:1.2s cubic-bezier(.16,1,.3,1)}.nav-left{left:-150px;opacity:0}.nav-right{right:-150px;opacity:0}.wrapper.active .nav-left{left:0;opacity:1}.wrapper.active .nav-right{right:0;opacity:1}.mobile-nav{display:none;gap:18px;margin-top:45px;pointer-events:all;justify-content:center}.btn{width:62px;height:62px;border-radius:20px;background:rgba(0,0,0,0.4);border:1px solid var(--ui-border);color:var(--ui-silver);opacity:.85;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.4s cubic-bezier(.16,1,.3,1);pointer-events:all;backdrop-filter:blur(12px)}.btn:active { transform: scale(0.96); }.btn svg{width:23px;height:23px;stroke-width:1.8px}.btn.active,.btn:hover{opacity:1;color:#fff;border:1px solid rgba(255,255,255,0.35);background:rgba(255,255,255,0.1);transform:scale(1.08) translateY(-3px);box-shadow:0 12px 25px -10px rgba(0,0,0,0.5)}@media (max-width:900px){.side-nav{display:none!important}.mobile-nav{display:flex}}#container{position:fixed;inset:0;z-index:1000;background:transparent;display:none;opacity:0;transition:opacity .5s ease-in-out}#container.active{display:block;opacity:1}iframe{width:100%;height:100%;border:none;background:transparent}
    </style>
</head>
<body>
    <div id="loader"><div class="load-line"><div id="progress"></div></div></div>
    <div class="ambient-bg" id="bg"></div>
    <div class="overlay-dim"></div>
    <canvas id="webgl-canvas"></canvas>
    
    <div class="wrapper" id="ui">
        <div class="header">
            <div class="status-pill" id="status-pill">
                <span id="date">SYNCING</span>
                <span id="clock">00:00:00</span>
            </div>
        </div>
        <div class="side-nav nav-left">
            <div class="btn" onclick="setHash('settings')"><i data-lucide="settings"></i></div>
            <div class="btn" onclick="setHash('games')"><i data-lucide="gamepad-2"></i></div>
        </div>
        <div class="brand">
            <h1 class="logo" id="main-logo">HRN</h1>
            <p class="tagline" id="tagline"></p>
            <div class="mobile-nav">
                <div class="btn" onclick="setHash('settings')"><i data-lucide="settings"></i></div>
                <div class="btn" onclick="setHash('games')"><i data-lucide="gamepad-2"></i></div>
                <div class="btn" onclick="setHash('about')"><i data-lucide="info"></i></div>
            </div>
        </div>
        <div class="side-nav nav-right">
            <div class="btn" onclick="setHash('about')"><i data-lucide="info"></i></div>
            <div class="btn" onclick="setHash('add')"><i data-lucide="plus"></i></div>
        </div>
    </div>

    <div id="container"><iframe id="frame"></iframe></div>

    <script id="vs" type="x-shader/x-vertex">
        attribute vec2 a_pos;
        attribute float a_size;
        attribute float a_op;
        uniform vec2 u_res;
        uniform float u_time;
        varying float v_op;
        void main() {
            vec2 zeroToOne = a_pos / u_res;
            vec2 clipSpace = (zeroToOne * 2.0) - 1.0;
            gl_Position = vec4(clipSpace * vec2(1, -1), 0, 1);
            float pulse = 0.85 + (sin(u_time * 1.5 + a_op * 10.0) * 0.15);
            gl_PointSize = a_size * 1.5 * pulse;
            v_op = a_op;
        }
    </script>

    <script id="fs" type="x-shader/x-fragment">
        precision mediump float;
        uniform vec3 u_color;
        varying float v_op;
        void main() {
            float dist = distance(gl_PointCoord, vec2(0.5));
            if (dist > 0.5) discard;
            gl_FragColor = vec4(u_color, (v_op * 1.3) * (1.0 - dist * 2.0));
        }
    </script>

    <script>
        lucide.createIcons();
        const $ = id => document.getElementById(id);
        const canvas = $('webgl-canvas');
        const gl = canvas.getContext('webgl', { antialias: true, alpha: true });
        let particles = [], pAmount = 0, pEnabled = true, program, posAttr, sizeAttr, opAttr, resUni, colUni, timeUni, posBuffer, sizeBuffer, opBuffer, cache = {}, startTime = Date.now();
        const defaultBg = "https://img.freepik.com/free-vector/black-background-with-wavy-lines_52683-76524.jpg?semt=ais_incoming&w=740&q=80";

        const taglines = [ "YOU ARE THE AURA", "LEGEND IN MAKING", "POWER WITHIN YOU", "OWN THE GAME", "FEARLESS AND STRONG", "RULE YOUR WORLD", "MASTER OF ALL", "RISE ABOVE ALL", "UNSTOPPABLE FORCE", "YOU DEFINE GREAT", "BORN TO WIN", "NEXT LEVEL: YOU", "ALWAYS STAY SHARP", "VICTORY IS YOURS", "PURE SKILL ONLY", "YOUR TIME: NOW", "GAME CHANGER: HERE", "UNLEASH YOUR POWER", "NO LIMITS FOR YOU", "DOMINATE THE FIELD", "LEGENDS WALK HERE", "ALL EYES ON YOU", "YOUR SKILL, YOUR RULE" ];        
        
        function createShader(gl, type, source) {
            const s = gl.createShader(type);
            gl.shaderSource(s, source);
            gl.compileShader(s);
            return s;
        }

        function initGL() {
            const vS = createShader(gl, gl.VERTEX_SHADER, $('vs').text);
            const fS = createShader(gl, gl.FRAGMENT_SHADER, $('fs').text);
            program = gl.createProgram();
            gl.attachShader(program, vS);
            gl.attachShader(program, fS);
            gl.linkProgram(program);
            gl.useProgram(program);
            posAttr = gl.getAttribLocation(program, "a_pos");
            sizeAttr = gl.getAttribLocation(program, "a_size");
            opAttr = gl.getAttribLocation(program, "a_op");
            resUni = gl.getUniformLocation(program, "u_res");
            colUni = gl.getUniformLocation(program, "u_color");
            timeUni = gl.getUniformLocation(program, "u_time");
            posBuffer = gl.createBuffer();
            sizeBuffer = gl.createBuffer();
            opBuffer = gl.createBuffer();
            gl.enable(gl.BLEND);
            gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
        }

        function updateBg(val) {
            const bgLayer = $('bg');
            if (!val || val.trim() === "") {
                localStorage.setItem('hrn_bg', defaultBg);
                bgLayer.style.backgroundImage = `url(${defaultBg})`;
                bgLayer.classList.add('loaded');
                return;
            }
            const img = new Image();
            img.onload = () => {
                localStorage.setItem('hrn_bg', val);
                bgLayer.style.backgroundImage = `url(${val})`;
                bgLayer.classList.add('loaded');
            };
            img.onerror = () => {
                bgLayer.style.backgroundImage = 'none';
                localStorage.setItem('hrn_bg', 'none');
                bgLayer.classList.add('loaded');
            };
            img.src = val;
        }

        function sync() {
            const c = localStorage.getItem('hrn_clr') || "#89b4fa",
                o = parseFloat(localStorage.getItem('hrn_op')) || 0.8,
                density = parseFloat(localStorage.getItem('hrn_int')) || 1.1,
                area = (window.innerWidth * window.innerHeight) / 10000,
                newpAmount = Math.floor(area * density);
            
            pEnabled = localStorage.getItem('hrn_part') !== 'false';
            const r = parseInt(c.slice(1, 3), 16) / 255,
                g = parseInt(c.slice(3, 5), 16) / 255,
                b = parseInt(c.slice(5, 7), 16) / 255;
            
            if (program) {
                gl.useProgram(program);
                gl.uniform3f(colUni, r, g, b);
            }
            document.documentElement.style.setProperty('--accent', c);
            $('dynamic-title').textContent = localStorage.getItem('hrn_title') || "HRN | CORE";
            
            if (particles.length === 0 || Math.abs(particles.length - newpAmount) > 50) {
                particles = [];
                pAmount = newpAmount;
                for (let i = 0; i < pAmount; i++) {
                    particles.push({
                        x: Math.random() * window.innerWidth,
                        y: Math.random() * window.innerHeight,
                        s: Math.random() * 4 + 2.5,
                        vx: (Math.random() - 0.5) * 0.4,
                        vy: (Math.random() - 0.5) * 0.4,
                        o: o * (Math.random() * 0.5 + 0.5)
                    });
                }
            }
            
            const savedBg = localStorage.getItem('hrn_bg');
            if (savedBg === 'none') {
                $('bg').style.backgroundImage = 'none';
                $('bg').classList.add('loaded');
            } else {
                updateBg(savedBg || defaultBg);
            }
            
            if (localStorage.getItem('hrn_fav')) $('app-favicon').href = localStorage.getItem('hrn_fav');
        }

        function render() {
            if (!pEnabled || pAmount === 0) {
                gl.clear(gl.COLOR_BUFFER_BIT);
                requestAnimationFrame(render);
                return;
            }
            const elapsed = (Date.now() - startTime) / 1000,
                posData = new Float32Array(pAmount * 2),
                sizeData = new Float32Array(pAmount),
                opData = new Float32Array(pAmount);
            
            for (let i = 0; i < pAmount; i++) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0) p.x = window.innerWidth;
                if (p.x > window.innerWidth) p.x = 0;
                if (p.y < 0) p.y = window.innerHeight;
                if (p.y > window.innerHeight) p.y = 0;
                posData[i * 2] = p.x;
                posData[i * 2 + 1] = p.y;
                sizeData[i] = p.s;
                opData[i] = p.o;
            }
            gl.clear(gl.COLOR_BUFFER_BIT);
            gl.useProgram(program);
            gl.uniform2f(resUni, window.innerWidth, window.innerHeight);
            gl.uniform1f(timeUni, elapsed);
            gl.bindBuffer(gl.ARRAY_BUFFER, posBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, posData, gl.DYNAMIC_DRAW);
            gl.enableVertexAttribArray(posAttr);
            gl.vertexAttribPointer(posAttr, 2, gl.FLOAT, false, 0, 0);
            gl.bindBuffer(gl.ARRAY_BUFFER, sizeBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, sizeData, gl.DYNAMIC_DRAW);
            gl.enableVertexAttribArray(sizeAttr);
            gl.vertexAttribPointer(sizeAttr, 1, gl.FLOAT, false, 0, 0);
            gl.bindBuffer(gl.ARRAY_BUFFER, opBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, opData, gl.DYNAMIC_DRAW);
            gl.enableVertexAttribArray(opAttr);
            gl.vertexAttribPointer(opAttr, 1, gl.FLOAT, false, 0, 0);
            gl.drawArrays(gl.POINTS, 0, pAmount);
            requestAnimationFrame(render);
        }

        async function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
            $('tagline').textContent = taglines[Math.floor(Math.random() * taglines.length)];
            initGL();
            sync();
            render();
            const pages = ['settings', 'games', 'about', 'add'];
            let loadedCount = 0;
            $('progress').style.width = '10%';
            await Promise.all(pages.map(async (p) => {
                try {
                    const r = await fetch(p + '.html');
                    cache[p] = await r.text();
                } catch (e) {
                    cache[p] = 'Page not found';
                }
                loadedCount++;
                $('progress').style.width = (10 + (loadedCount / pages.length * 90)) + '%';
            }));
            const h = window.location.hash.slice(1);
            if (h && cache[h]) checkHash();
            setTimeout(() => {
                $('loader').style.opacity = '0';
                setTimeout(() => {
                    $('loader').style.display = 'none';
                    $('ui').classList.add('active');
                    $('tagline').classList.add('show');
                }, 800);
            }, 600);
        }

        function setHash(n) { window.location.hash = n; }

        function checkHash() {
            const h = window.location.hash.slice(1), container = $('container'), frame = $('frame');
            if (h && cache[h]) {
                frame.srcdoc = cache[h];
                container.style.display = 'block';
                void container.offsetWidth;
                container.classList.add('active');
            } else {
                container.classList.remove('active');
                setTimeout(() => {
                    if (!window.location.hash) {
                        container.style.display = 'none';
                        frame.srcdoc = '';
                    }
                }, 500);
            }
        }

        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
            sync();
        };
        window.addEventListener('hashchange', checkHash);
        window.addEventListener('message', e => {
            if (e.data === 'sync') sync();
            if (e.data === 'close') setHash('');
        });
        setInterval(() => {
            const n = new Date();
            $('clock').textContent = n.toTimeString().split(' ')[0];
            $('date').textContent = n.toLocaleDateString('en-US', { weekday: 'short', day: 'numeric' }).toUpperCase();
        }, 1000);
        window.onload = init;
    </script>
</body>
</html>
