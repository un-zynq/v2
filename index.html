<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="dynamic-title">HRN | CORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #030508;
            --accent: #89b4fa;
            --text: #f0f4ff;
            --dim: rgba(255, 255, 255, 0.4);
            --border: rgba(255, 255, 255, 0.08);
            --logo-opacity: 0.5;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; text-transform: uppercase; }

        /* LOADER */
        #loader {
            position: fixed; inset: 0; z-index: 10000; background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        .load-line { width: 140px; height: 1px; background: rgba(255,255,255,0.05); position: relative; }
        #progress { position: absolute; height: 100%; width: 0%; background: var(--accent); transition: width 0.3s; box-shadow: 0 0 15px var(--accent); }

        /* BACKGROUND */
        .ambient-bg { position: fixed; inset: 0; z-index: 1; pointer-events: none; background-size: cover; background-position: center; opacity: 0; filter: brightness(0.3); transition: opacity 1.5s; }
        canvas { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
        #mouse-glow { position: fixed; width: 500px; height: 500px; border-radius: 50%; pointer-events: none; z-index: 3; background: radial-gradient(circle, rgba(137, 180, 250, 0.08) 0%, transparent 70%); transform: translate(-50%, -50%); filter: blur(50px); }

        /* UI LAYOUT */
        .wrapper { position: relative; display: flex; flex-direction: column; height: 100dvh; width: 100%; z-index: 10; opacity: 0; transition: opacity 0.8s ease; }
        .wrapper.active { opacity: 1; }

        .header { position: absolute; top: 40px; width: 100%; display: flex; justify-content: center; }
        .status-pill { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 10px 25px; border-radius: 100px; backdrop-filter: blur(12px); font-size: 9px; font-weight: 900; letter-spacing: 2px; color: var(--dim); display: flex; gap: 20px; }

        .brand { 
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
            text-align: center; pointer-events: none; display: flex; flex-direction: column; align-items: center; width: 100%;
        }
        .logo { 
            font-size: clamp(5rem, 22vw, 13rem); font-weight: 900; letter-spacing: -0.07em; line-height: 0.8;
            background: linear-gradient(180deg, #fff 40%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            opacity: var(--logo-opacity); transition: 0.4s;
        }
        .tagline { font-size: 10px; letter-spacing: 10px; color: var(--dim); margin-top: 25px; opacity: 0; transform: translateY(10px); transition: 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s; font-weight: 400; }
        .tagline.show { opacity: 1; transform: translateY(0); }

        /* NAVIGATION */
        .side-nav { position: absolute; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 25px; padding: 0 50px; z-index: 20; }
        .nav-left { left: 0; }
        .nav-right { right: 0; }

        .mobile-nav { display: none; gap: 20px; margin-top: 40px; pointer-events: all; }
        
        .btn { 
            width: 62px; height: 62px; border-radius: 22px; background: rgba(255,255,255,0.02); 
            border: 1px solid var(--border); color: var(--dim); display: flex; align-items: center; 
            justify-content: center; cursor: pointer; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); pointer-events: all;
        }
        .btn:hover, .btn.active { color: var(--accent); border-color: var(--accent); background: rgba(255,255,255,0.06); transform: scale(1.1); }

        /* MODAL */
        #container { position: fixed; inset: 0; z-index: 1000; background: var(--bg); display: none; }
        #container.active { display: block; }
        iframe { width: 100%; height: 100%; border: none; }

        @media (max-width: 900px) {
            .side-nav { display: none; }
            .mobile-nav { display: flex; }
            .logo { font-size: clamp(6rem, 28vw, 10rem); }
        }
    </style>
</head>
<body>
    <div id="loader"><div class="load-line"><div id="progress"></div></div></div>
    <div class="ambient-bg" id="bg"></div>
    <div id="mouse-glow"></div>
    <canvas id="particles"></canvas>

    <div class="wrapper" id="ui">
        <div class="header">
            <div class="status-pill"><span id="date">SYNCING</span><span id="clock">00:00</span></div>
        </div>

        <div class="side-nav nav-left">
            <div class="btn" data-page="settings" onclick="setHash('settings')"><i data-lucide="settings"></i></div>
            <div class="btn" data-page="games" onclick="setHash('games')"><i data-lucide="gamepad-2"></i></div>
            <div class="btn" data-page="bookmarklets" onclick="setHash('bookmarklets')"><i data-lucide="bookmark"></i></div>
        </div>

        <div class="brand">
            <h1 class="logo">HRN</h1>
            <p class="tagline" id="tagline">SYSTEM READY</p>
            <div class="mobile-nav">
                <div class="btn" data-page="settings" onclick="setHash('settings')"><i data-lucide="settings"></i></div>
                <div class="btn" data-page="games" onclick="setHash('games')"><i data-lucide="gamepad-2"></i></div>
                <div class="btn" data-page="bookmarklets" onclick="setHash('bookmarklets')"><i data-lucide="bookmark"></i></div>
            </div>
        </div>

        <div class="side-nav nav-right">
            <div class="btn" data-page="about" onclick="setHash('about')"><i data-lucide="info"></i></div>
            <div class="btn" data-page="add" onclick="setHash('add')"><i data-lucide="plus"></i></div>
        </div>
    </div>

    <div id="container"><iframe id="frame"></iframe></div>

    <script>
        lucide.createIcons();
        const $ = id => document.getElementById(id);
        const cache = {};
        const TAGLINES = ["INTERFACE ONLINE", "SYSTEM CORE", "NEURAL LINK STABLE", "BUILT DIFFERENT", "ELITE HUB"];

        const canvas = $('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let w, h;

        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        class P {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * w; this.y = Math.random() * h;
                this.s = Math.random() * 1.5;
                this.vx = Math.random() * 0.3 - 0.15; this.vy = Math.random() * 0.3 - 0.15;
                this.o = Math.random() * 0.4;
            }
            draw() {
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent');
                ctx.globalAlpha = this.o;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, 7); ctx.fill();
                this.x += this.vx; this.y += this.vy;
                if(this.x<0 || this.x>w || this.y<0 || this.y>h) this.init();
            }
        }

        async function loadPage(name) {
            try {
                const r = await fetch(name + '.html');
                if (!r.ok) throw new Error();
                cache[name] = await r.text();
            } catch(e) { 
                cache[name] = `<body style="background:#030508; margin:0; display:flex; align-items:center; justify-content:center; height:100vh;"><button onclick="window.parent.postMessage('close','*')" style="background:none; border:1px solid rgba(255,255,255,0.1); color:rgba(255,255,255,0.3); padding:15px 30px; border-radius:8px; cursor:pointer; font-family:sans-serif; font-size:10px; letter-spacing:4px; font-weight:900; text-transform:uppercase;">EXIT</button></body>`; 
            }
        }

        async function init() {
            sync();
            const pages = ['settings', 'games', 'about', 'add', 'bookmarklets'];
            for (let i = 0; i < pages.length; i++) {
                await loadPage(pages[i]);
                $('progress').style.width = ((i+1) / pages.length * 100) + '%';
            }
            for(let i=0; i<45; i++) particles.push(new P());
            loop();
            setTimeout(() => {
                $('loader').style.opacity = '0';
                setTimeout(() => $('loader').style.display = 'none', 500);
                $('ui').classList.add('active');
                
                // Random Tagline
                $('tagline').textContent = TAGLINES[Math.floor(Math.random()*TAGLINES.length)];
                $('tagline').classList.add('show');
                
                // Check initial hash
                checkHash();
            }, 500);
        }

        function loop() { ctx.clearRect(0,0,w,h); particles.forEach(p => p.draw()); requestAnimationFrame(loop); }

        function sync() {
            const c = localStorage.getItem('hrn_clr') || "#89b4fa";
            const o = localStorage.getItem('hrn_op') || "0.5";
            const b = localStorage.getItem('hrn_bg');
            document.documentElement.style.setProperty('--accent', c);
            document.documentElement.style.setProperty('--logo-opacity', o);
            if(b) { $('bg').style.backgroundImage = `url(${b})`; $('bg').style.opacity = 0.5; }
        }

        // Hashing System
        function setHash(name) {
            window.location.hash = name;
        }

        function checkHash() {
            const h = window.location.hash.slice(1);
            if (h && cache[h]) {
                $('frame').srcdoc = cache[h];
                $('container').classList.add('active');
                document.querySelectorAll('.btn').forEach(b => b.classList.toggle('active', b.dataset.page === h));
            } else {
                $('container').classList.remove('active');
                document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            }
        }

        window.addEventListener('hashchange', checkHash);

        window.addEventListener('message', e => {
            if(e.data === 'close') {
                window.location.hash = '';
            }
            if(e.data === 'sync') sync();
        });

        window.onmousemove = (e) => {
            $('mouse-glow').style.left = e.clientX + 'px';
            $('mouse-glow').style.top = e.clientY + 'px';
        };

        setInterval(() => {
            const n = new Date();
            $('clock').textContent = n.toLocaleTimeString('en-US', {hour12: false, hour:'2-digit', minute:'2-digit'});
            $('date').textContent = n.toLocaleDateString('en-US', {weekday:'short', day:'numeric'}).toUpperCase();
        }, 1000);

        window.onload = init;
    </script>
</body>
</html>
