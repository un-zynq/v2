<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HRN | ULTRA REFINED</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #030508; --accent: #89b4fa; --ui-silver: rgba(235,240,255,.9); --ui-border: rgba(255,255,255,.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { height: 100vh; background: var(--bg); color: var(--ui-silver); font-family: 'Inter', sans-serif; overflow: hidden; text-transform: uppercase; }

        /* --- VISUAL LAYER --- */
        .ambient-bg { position: fixed; inset: 0; z-index: 1; background-size: cover; background-position: center; opacity: 0; filter: brightness(.4) blur(60px); transform: scale(1.1); transition: all 2s cubic-bezier(0.16, 1, 0.3, 1); }
        .ambient-bg.loaded { opacity: 1; filter: brightness(.6) blur(0px); transform: scale(1); }
        #webgl-canvas { position: fixed; inset: 0; z-index: 2; pointer-events: none; }

        /* --- LOADER --- */
        #loader { position: fixed; inset: 0; z-index: 10000; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.6s ease; }
        .load-line { width: 200px; height: 2px; background: rgba(255,255,255,.05); position: relative; overflow: hidden; border-radius: 10px; }
        #progress { position: absolute; height: 100%; width: 0%; background: var(--accent); transition: width 0.3s cubic-bezier(0.1, 0.5, 0.5, 1); box-shadow: 0 0 15px var(--accent); }
        #load-perc { font-size: 9px; font-weight: 900; letter-spacing: 2px; margin-top: 12px; opacity: 0; transition: opacity 0.4s; }

        /* --- UI WRAPPER --- */
        .wrapper { position: relative; height: 100dvh; width: 100%; z-index: 10; opacity: 0; display: none; transition: 1s cubic-bezier(0.16, 1, 0.3, 1); }
        .wrapper.active { opacity: 1; display: block; }
        .header { position: absolute; top: 40px; width: 100%; display: flex; justify-content: center; }
        .status-pill { background: rgba(0,0,0,.4); border: 1px solid var(--ui-border); padding: 10px 25px; border-radius: 100px; backdrop-filter: blur(10px); font-size: 10px; font-weight: 900; letter-spacing: 2px; display: flex; gap: 30px; }
        .brand { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); text-align: center; pointer-events: none; }
        .logo { font-size: clamp(5rem, 20vw, 12rem); font-weight: 900; letter-spacing: -.05em; background: linear-gradient(180deg, #fff 30%, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; opacity: .8; }
        .tagline { font-size: 10px; font-weight: 600; letter-spacing: 8px; margin-top: 30px; opacity: 0; transform: translateY(15px); transition: 1s ease 0.3s; }
        .tagline.show { opacity: .8; transform: translateY(0); }

        .side-nav { position: absolute; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; padding: 0 50px; z-index: 20; }
        .nav-left { left: 0; } .nav-right { right: 0; }
        .btn { width: 64px; height: 64px; border-radius: 22px; background: rgba(0,0,0,.3); border: 1px solid var(--ui-border); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); backdrop-filter: blur(15px); }
        .btn:hover { background: rgba(255,255,255,.1); transform: scale(1.1) translateY(-3px); border-color: var(--accent); }

        /* --- BUTTERY SMOOTH IFRAME SYSTEM --- */
        #container { position: fixed; inset: 0; z-index: 1000; visibility: hidden; pointer-events: none; background: rgba(0,0,0,0.4); backdrop-filter: blur(0px); transition: backdrop-filter 0.6s, visibility 0.6s; }
        #container.active { visibility: visible; pointer-events: all; backdrop-filter: blur(30px); }

        .frame-slot { position: absolute; inset: 0; border: none; opacity: 0; transform: scale(1.02); transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); pointer-events: none; }
        .frame-slot.active { opacity: 1; transform: scale(1); pointer-events: all; z-index: 2; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="load-line"><div id="progress"></div></div>
        <div id="load-perc">0%</div>
    </div>
    
    <div class="ambient-bg" id="bg"></div>
    <canvas id="webgl-canvas"></canvas>

    <div class="wrapper" id="ui">
        <div class="header"><div class="status-pill"><span id="date">SYNC</span><span id="clock">00:00:00</span></div></div>
        <div class="side-nav nav-left">
            <div class="btn" onclick="setHash('settings')"><i data-lucide="settings"></i></div>
            <div class="btn" onclick="setHash('games')"><i data-lucide="gamepad-2"></i></div>
        </div>
        <div class="brand">
            <h1 class="logo">HRN</h1>
            <p class="tagline" id="tagline"></p>
        </div>
        <div class="side-nav nav-right">
            <div class="btn" onclick="setHash('info')"><i data-lucide="info"></i></div>
            <div class="btn" onclick="setHash('add')"><i data-lucide="plus"></i></div>
        </div>
    </div>

    <div id="container">
        <iframe id="frame1" class="frame-slot"></iframe>
        <iframe id="frame2" class="frame-slot"></iframe>
    </div>

    <script id="particle-worker" type="application/javascript">
        let c, p = [];
        self.onmessage = function(e) {
            const { cmd, w, h, amount } = e.data;
            if (cmd === 'init') {
                c = amount;
                p = Array.from({length: c}, () => ({
                    x: Math.random() * w, y: Math.random() * h,
                    vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
                    s: Math.random() * 2 + 1, o: Math.random() * 0.5 + 0.3
                }));
                const u = () => {
                    const pD = new Float32Array(c * 2), sD = new Float32Array(c), oD = new Float32Array(c);
                    for(let i=0; i<c; i++) {
                        let pt = p[i]; pt.x = (pt.x + pt.vx + w) % w; pt.y = (pt.y + pt.vy + h) % h;
                        pD[i*2] = pt.x; pD[i*2+1] = pt.y; sD[i] = pt.s; oD[i] = pt.o;
                    }
                    self.postMessage({pD, sD, oD}, [pD.buffer, sD.buffer, oD.buffer]);
                    setTimeout(u, 16);
                }; u();
            }
        };
    </script>

    <script>
        const $ = id => document.getElementById(id);
        const taglines = ["YOU ARE THE AURA","LEGEND IN MAKING","POWER WITHIN YOU","OWN THE GAME"];
        let cache = {}, currentProgress = 0, activeFrame = 1;

        // --- BUTTERY TRANSITION LOGIC ---
        function switchFrame(content) {
            const nextFrameNum = activeFrame === 1 ? 2 : 1;
            const currentF = $('frame' + activeFrame);
            const nextF = $('frame' + nextFrameNum);

            // Laad content in onzichtbare frame
            nextF.srcdoc = content;
            
            nextF.onload = () => {
                // De eigenlijke "Smooth" swap
                nextF.classList.add('active');
                currentF.classList.remove('active');
                activeFrame = nextFrameNum;
                
                // Ruim de oude op na de transitie
                setTimeout(() => { currentF.srcdoc = ""; }, 500);
            };
        }

        function updateProgress(target) {
            if(target > 0) $('load-perc').style.opacity = 1;
            const step = () => {
                if (currentProgress < target) {
                    currentProgress += (target - currentProgress) * 0.15 + 0.8;
                    if(currentProgress >= target) currentProgress = target;
                    $('progress').style.width = currentProgress + '%';
                    $('load-perc').textContent = Math.floor(currentProgress) + '%';
                    requestAnimationFrame(step);
                }
            };
            requestAnimationFrame(step);
        }

        async function syncData(isInitial = false) {
            try {
                const res = await fetch('./pages.txt?t=' + Date.now());
                const reader = res.body.getReader();
                const total = +res.headers.get('Content-Length') || 100000;
                let received = 0, chunks = [];

                while(true) {
                    const {done, value} = await reader.read();
                    if(done) break;
                    chunks.push(value); received += value.length;
                    updateProgress(Math.min(99, Math.floor((received / total) * 100)));
                }

                const text = new TextDecoder().decode(new Uint8Array(chunks.reduce((a,c) => [...a, ...c], [])));
                const regex = /\/:(\w+):\/\s*([\s\S]*?)(?=\/:\w+:\/|$)/g;
                cache = {}; let m; while ((m = regex.exec(text)) !== null) cache[m[1]] = m[2].trim();
                
                updateProgress(100);
                if(isInitial) checkFinish();
                else {
                    const h = window.location.hash.slice(1);
                    if(h && cache[h]) switchFrame(cache[h]);
                }
            } catch(e) { updateProgress(100); checkFinish(); }
        }

        function checkFinish() {
            if(currentProgress >= 100) reveal();
            else setTimeout(checkFinish, 100);
        }

        function reveal() {
            $('loader').style.opacity = 0;
            setTimeout(() => {
                $('loader').style.display = 'none';
                lucide.createIcons();
                const h = window.location.hash.slice(1);
                if(h && cache[h]) handleNavigation(h);
                else { $('ui').classList.add('active'); $('tagline').classList.add('show'); $('tagline').textContent = taglines[Math.floor(Math.random()*taglines.length)]; }
            }, 600);
        }

        function handleNavigation(hash) {
            const container = $('container');
            if(hash && cache[hash]) {
                container.classList.add('active');
                $('ui').classList.remove('active');
                switchFrame(cache[hash]);
            } else {
                container.classList.remove('active');
                setTimeout(() => { $('ui').classList.add('active'); }, 400);
            }
        }

        window.onhashchange = () => handleNavigation(window.location.hash.slice(1));

        // --- INIT PARTICLES & DB ---
        async function init() {
            const canvas = $('webgl-canvas');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const gl = canvas.getContext('webgl', {alpha: true});
            if (gl) {
                const vs = `attribute vec2 p;attribute float s;attribute float o;uniform vec2 r;void main(){gl_Position=vec4((p/r*2.0-1.0)*vec2(1,-1),0,1);gl_PointSize=s;}`;
                const fs = `precision lowp float;uniform vec3 c;void main(){gl_FragColor=vec4(c,0.4);}`;
                const sh = (t, s) => { const x = gl.createShader(t); gl.shaderSource(x, s); gl.compileShader(x); return x; };
                const pr = gl.createProgram(); gl.attachShader(pr, sh(gl.VERTEX_SHADER, vs)); gl.attachShader(pr, sh(gl.FRAGMENT_SHADER, fs));
                gl.linkProgram(pr); gl.useProgram(pr);
                const posB = gl.createBuffer();
                const clr = localStorage.getItem('hrn_clr') || "#89b4fa";
                document.documentElement.style.setProperty('--accent', clr);
                gl.uniform3fv(gl.getUniformLocation(pr, "c"), [parseInt(clr.slice(1,3),16)/255, parseInt(clr.slice(3,5),16)/255, parseInt(clr.slice(5,7),16)/255]);
                const worker = new Worker(URL.createObjectURL(new Blob([$('particle-worker').textContent], {type:'text/javascript'})));
                worker.postMessage({cmd:'init', w:canvas.width, h:canvas.height, amount: 150});
                worker.onmessage = e => {
                    const {pD} = e.data;
                    gl.clear(gl.COLOR_BUFFER_BIT);
                    gl.uniform2f(gl.getUniformLocation(pr, "r"), canvas.width, canvas.height);
                    gl.bindBuffer(gl.ARRAY_BUFFER, posB); gl.bufferData(gl.ARRAY_BUFFER, pD, gl.STREAM_DRAW);
                    const a = gl.getAttribLocation(pr, "p"); gl.enableVertexAttribArray(a); gl.vertexAttribPointer(a, 2, gl.FLOAT, false, 0, 0);
                    gl.drawArrays(gl.POINTS, 0, 150);
                };
            }

            const dbReq = indexedDB.open("hrn_db", 1);
            dbReq.onsuccess = e => {
                const tx = e.target.result.transaction('background', 'readonly');
                const req = tx.objectStore('background').get('current_bg');
                req.onsuccess = () => {
                    const img = new Image();
                    img.src = req.result ? req.result.value : 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564';
                    img.onload = () => { $('bg').style.backgroundImage = `url(${img.src})`; $('bg').classList.add('loaded'); };
                };
            };
            syncData(true);
        }

        setInterval(() => {
            const n = new Date();
            $('clock').textContent = n.toTimeString().split(' ')[0];
            $('date').textContent = n.toLocaleDateString('en-US', {weekday:'short', day:'numeric'}).toUpperCase();
        }, 1000);

        window.onload = init;
        window.onmessage = e => { 
            if(e.data === 'close') window.location.hash = ''; 
            if(e.data === 'sync') syncData(); 
        };
        function setHash(h) { window.location.hash = h; }
    </script>
</body>
</html>
