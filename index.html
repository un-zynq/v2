<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HRN | Gaming Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg: #05070a;
            --accent: #89b4fa;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.45);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --discord-gray: #121417;
            --transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }

        /* --- GLOBAL HIDDEN SCROLLBARS --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            scrollbar-width: none !important;
            -ms-overflow-style: none !important;
        }
        *::-webkit-scrollbar {
            display: none !important;
            width: 0 !important;
            height: 0 !important;
        }

        html, body {
            height: 100vh;
            height: 100dvh;
            width: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            overflow: hidden;
            cursor: url('https://cdn.jsdelivr.net/gh/un-zynq/new-ui/cursor-32.png'), auto;
        }

        a, button, .side-link, .discord-pill {
            cursor: url('https://cdn.jsdelivr.net/gh/un-zynq/new-ui/cursor-32.png'), pointer !important;
            pointer-events: auto;
        }

        .ambient-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #121720 0%, #05070a 100%);
            z-index: -1;
        }

        .glow {
            position: absolute;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(137, 180, 250, 0.07) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
            display: none;
            will-change: left, top;
        }

        @media (hover: hover) { .glow { display: block; } }

        .wrapper {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100dvh;
            padding: 40px;
            max-width: 1600px;
            margin: 0 auto;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: center;
            z-index: 100;
        }
        
        #clock {
            background: var(--glass);
            padding: 10px 24px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            color: var(--text-dim);
            font-variant-numeric: tabular-nums;
            text-transform: uppercase;
        }

        .main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-grow: 1;
            width: 100%;
            position: relative;
        }

        /* --- DESKTOP SIDE NAV --- */
        .side-nav {
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 300; 
            width: 60px;
            position: relative;
        }

        .side-link {
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            transition: var(--transition);
            text-decoration: none;
        }

        .side-link:hover {
            background: rgba(137, 180, 250, 0.1);
            border-color: var(--accent);
            transform: translateY(-3px);
            color: var(--accent);
        }

        .side-link svg { width: 24px; height: 24px; stroke-width: 1.5px; }

        /* --- CENTER CONTENT --- */
        .center-brand {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: fit-content;
            z-index: 10;
        }

        .logo {
            font-size: clamp(5rem, 20vw, 13rem);
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 0.75;
            background: linear-gradient(180deg, #fff 30%, rgba(137, 180, 250, 0.5) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 50px rgba(0,0,0,0.5));
        }

        .discord-pill {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 14px 32px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.15);
            font-size: 0.8rem;
            font-weight: 800;
            background: rgba(255,255,255,0.03);
            transition: var(--transition);
            backdrop-filter: blur(10px);
            text-decoration: none;
            color: white;
        }

        .discord-pill:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fff;
            transform: scale(1.05);
        }

        .discord-pill svg { width: 20px; height: 20px; fill: currentColor; }

        .footer {
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            position: relative;
        }

        .meta-info { 
            display: flex; 
            flex-direction: column;
            align-items: center;
            gap: 8px; 
            font-size: 0.7rem; 
            color: var(--text-dim); 
        }

        .status-indicator { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            background: var(--glass);
            padding: 4px 12px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        .dot { 
            width: 6px; height: 6px; 
            background: #50fa7b; 
            border-radius: 50%; 
            animation: pulse 2s infinite;
        }

        /* --- MOBILE OPTIMIZATION (EXACT STYLE) --- */
        @media (max-width: 850px) {
            .wrapper { padding: 15px; }
            .main { flex-direction: column; justify-content: center; gap: 0; }
            .center-brand { position: static; transform: none; order: 1; width: 100%; margin-bottom: 10px; }
            .logo { margin-bottom: 5px; }
            
            /* Oude Discord Pill style voor mobiel (zwevend rechtsonder) */
            .discord-pill {
                position: fixed;
                bottom: 25px;
                right: 20px;
                width: 46px;
                height: 46px;
                padding: 0;
                justify-content: center;
                border-radius: 16px;
                z-index: 400;
                background: var(--discord-gray);
                border: 1px solid rgba(255,255,255,0.05);
                color: rgba(255,255,255,0.3);
                box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            }
            .discord-pill span { display: none; }
            .discord-pill svg { width: 1.1rem; height: 1.1rem; }

            /* EXACTE SCROLLBALK STYLING VAN ERVOOR */
            .side-nav {
                order: 2;
                flex-direction: row;
                width: 100%;
                justify-content: flex-start;
                padding: 20px 40px;
                gap: 12px;
                overflow-x: auto;
                scroll-snap-type: x mandatory;
                -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
                mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
            }

            .side-link { 
                flex: 0 0 54px; 
                height: 54px; 
                border-radius: 14px; 
                scroll-snap-align: center;
            }

            .desktop-only { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="ambient-bg"></div>
    <div class="glow" id="mouse-glow"></div>

    <div class="wrapper">
        <header class="header">
            <div id="clock">LADEN...</div>
        </header>

        <main class="main">
            <nav class="side-nav">
                <a href="#" class="side-link"><i data-lucide="play"></i></a>
                <a href="#" class="side-link"><i data-lucide="users"></i></a>
                <a href="#" class="side-link"><i data-lucide="trophy"></i></a>
                <a href="#" class="side-link mobile-only"><i data-lucide="shopping-cart"></i></a>
                <a href="#" class="side-link mobile-only"><i data-lucide="settings"></i></a>
                <a href="#" class="side-link mobile-only"><i data-lucide="user"></i></a>
            </nav>

            <div class="center-brand">
                <h1 class="logo">HRN</h1>
                <a href="https://discord.gg/JAmeRKQzX" target="_blank" class="discord-pill">
                    <svg viewBox="0 0 127.14 96.36"><path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.71,32.65-1.82,56.6,.48,80.21h0A105.73,105.73,0,0,0,32.47,96.36,77.7,77.7,0,0,0,39.2,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.73,11.1,105.32,105.32,0,0,0,32.05-16.15h0C129.58,52.84,121,29.22,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5.07-12.73,11.41-12.73S54,46,53.86,53,48.74,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5.07-12.73,11.44-12.73S96.23,46,96.11,53,91,65.69,84.69,65.69Z"/></svg>
                    <span>JOIN DISCORD</span>
                </a>
            </div>

            <nav class="side-nav desktop-only">
                <a href="#" class="side-link"><i data-lucide="shopping-cart"></i></a>
                <a href="#" class="side-link"><i data-lucide="settings"></i></a>
                <a href="#" class="side-link"><i data-lucide="user"></i></a>
            </nav>
        </main>

        <footer class="footer">
            <div class="meta-info">
                <div class="status-indicator">
                    <div class="dot"></div>
                    <span>ONLINE</span>
                </div>
                <span style="opacity: 0.3; letter-spacing: 1px;">V4.4.2</span>
            </div>
        </footer>
    </div>

    <script>
        lucide.createIcons();
        function updateTime() {
            const now = new Date();
            let hours = now.getHours() % 12 || 12;
            let min = now.getMinutes().toString().padStart(2, '0');
            let sec = now.getSeconds().toString().padStart(2, '0');
            let ampm = now.getHours() >= 12 ? 'PM' : 'AM';
            const clockEl = document.getElementById('clock');
            if(clockEl) clockEl.textContent = `${hours}:${min}:${sec} ${ampm}`;
        }
        setInterval(updateTime, 1000); updateTime();
        
        const glow = document.getElementById('mouse-glow');
        let mX = 0, mY = 0, gX = 0, gY = 0;
        document.addEventListener('mousemove', (e) => { mX = e.clientX; mY = e.clientY; }, { passive: true });
        function lerp() {
            gX += (mX - gX) * 0.1; gY += (mY - gY) * 0.1;
            if (glow) { glow.style.left = gX + 'px'; glow.style.top = gY + 'px'; }
            requestAnimationFrame(lerp);
        }
        lerp();
    </script>
</body>
</html>
