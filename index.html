<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="dynamic-title">HRN | Gaming Hub</title>
    <link rel="icon" id="dynamic-favicon" href="favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #05070a;
            --accent: #89b4fa;
            --accent-glow: rgba(137, 180, 250, 0.15);
            --text-main: #f0f4ff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --transition: all .3s cubic-bezier(.23, 1, .32, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; scrollbar-width: none; }
        *::-webkit-scrollbar { display: none; }
        html, body { height: 100dvh; width: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); overflow: hidden; user-select: none; }
        
        .ambient-bg { position: fixed; inset: 0; z-index: 1; background-size: cover; background-position: center; transition: opacity .8s ease; pointer-events: none; }
        #particles { position: fixed; inset: 0; z-index: 3; pointer-events: none; }
        .glow { position: fixed; width: 500px; height: 500px; background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%); border-radius: 50%; pointer-events: none; z-index: 4; opacity: 0.5; filter: blur(60px); mix-blend-mode: screen; transform: translate(-50%, -50%); transition: background 0.5s ease; }

        .wrapper { display: flex; flex-direction: column; height: 100dvh; padding: 25px; max-width: 1600px; margin: 0 auto; position: relative; z-index: 10; }
        .header { display: flex; justify-content: center; z-index: 50; opacity: 0; transition: opacity .6s ease; margin-bottom: 20px; }
        .header.show { opacity: 1; }
        #status-pill { display: flex; align-items: center; gap: 14px; background: var(--glass); padding: 10px 22px; border-radius: 99px; border: 1px solid var(--glass-border); backdrop-filter: blur(15px); font-size: .7rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        
        .main { display: flex; justify-content: space-between; align-items: center; flex-grow: 1; position: relative; z-index: 20; }
        .side-nav { display: flex; flex-direction: column; gap: 15px; z-index: 30; }
        .side-link { width: 58px; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; color: var(--text-dim); background: var(--glass); border: 1px solid var(--glass-border); border-radius: 18px; transition: var(--transition); text-decoration: none; cursor: pointer; position: relative; }
        .side-link:hover, .side-link.active { color: var(--accent); border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); transform: translateY(-2px); }
        .side-link.active::after { content: ''; position: absolute; left: -10px; width: 3px; height: 18px; background: var(--accent); border-radius: 10px; box-shadow: 0 0 10px var(--accent); }
        
        .center-brand { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .logo { font-size: clamp(4rem, 15vw, 10rem); font-weight: 900; letter-spacing: -.05em; line-height: .8; background: linear-gradient(180deg, #fff 30%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 15px 30px rgba(0,0,0,0.5)); opacity: 0.8; }
        .tagline { font-size: 0.9rem; letter-spacing: 4px; color: var(--text-dim); text-transform: uppercase; opacity: 0; transform: translateY(10px); transition: 0.8s ease; }
        .tagline.show { opacity: 1; transform: translateY(0); }

        #iframe-container { position: fixed; inset: 0; z-index: 100; background: var(--bg); opacity: 0; visibility: hidden; transition: opacity .3s ease; pointer-events: none; }
        #iframe-container.active { opacity: 1; visibility: visible; pointer-events: auto; }
        #content-iframe { width: 100%; height: 100%; border: none; }

        @media (max-width: 768px) {
            .main { flex-direction: column; justify-content: center; gap: 50px; }
            .side-nav { flex-direction: row; order: 2; flex-wrap: wrap; justify-content: center; }
            .desktop-nav-right { display: none; }
            .side-link.active::after { bottom: -10px; left: 50%; width: 18px; height: 3px; transform: translateX(-50%); }
        }
    </style>
</head>
<body>
    <div class="ambient-bg" id="ambient-bg"></div>
    <div class="glow" id="mouse-glow"></div>
    <canvas id="particles"></canvas>

    <div class="wrapper">
        <header class="header" id="header">
            <div id="status-pill"><span id="date"></span><div style="width:1px;height:12px;background:var(--glass-border)"></div><span id="clock"></span></div>
        </header>

        <main class="main">
            <nav class="side-nav">
                <div class="side-link" data-page="settings"><i data-lucide="settings"></i></div>
                <div class="side-link" data-page="games"><i data-lucide="gamepad-2"></i></div>
                <div class="side-link" data-page="bookmarklets"><i data-lucide="bookmark"></i></div>
            </nav>
            <div class="center-brand">
                <h1 class="logo">HRN</h1>
                <p class="tagline" id="tagline-text"></p>
            </div>
            <nav class="side-nav desktop-nav-right">
                <div class="side-link" data-page="about"><i data-lucide="info"></i></div>
                <div class="side-link" data-page="add"><i data-lucide="plus"></i></div>
            </nav>
        </main>
    </div>

    <div id="iframe-container"><iframe id="content-iframe" src="about:blank"></iframe></div>

    <script>
        lucide.createIcons();
        const taglines = ["ELITE GAMING","BUILT DIFFERENT","NO SKILL NO ENTRY","LEVEL UP","CLUTCH OR KICK","STAY AHEAD"];
        let particlesArray = [], w, h, pageCache = {}, currentAccentColor = '#89b4fa';
        const canvas = document.getElementById('particles'), ctx = canvas.getContext('2d');
        const container = document.getElementById('iframe-container'), iframe = document.getElementById('content-iframe');
        const glow = document.getElementById('mouse-glow');
        let currentPage = null;

        async function prefetchPages() {
            const pages = ['settings', 'games', 'about', 'add', 'bookmarklets'];
            for (const p of pages) {
                try {
                    const res = await fetch(p + '.html');
                    if(res.ok) pageCache[p] = await res.text();
                } catch(e) {}
            }
            checkHash();
        }

        function syncSettings() {
            currentAccentColor = localStorage.getItem('hrn_theme_color') || "#89b4fa";
            const bgUrl = localStorage.getItem('hrn_bg_url');
            const tabTitle = localStorage.getItem('hrn_tab_title') || "HRN | Gaming Hub";
            const favicon = localStorage.getItem('hrn_favicon_url');
            
            document.documentElement.style.setProperty('--accent', currentAccentColor);
            document.documentElement.style.setProperty('--accent-glow', currentAccentColor + '26'); // 15% hex alpha
            document.getElementById('dynamic-title').textContent = tabTitle;
            if(favicon) document.getElementById('dynamic-favicon').href = favicon;
            
            const ambient = document.getElementById('ambient-bg');
            ambient.style.backgroundImage = bgUrl ? `url('${bgUrl}')` : "none";
            ambient.style.opacity = bgUrl ? "0.4" : "0";
            
            initParticles(localStorage.getItem('hrn_particle_amount') || "mid");
        }

        function openPage(page) {
            if (!page || !pageCache[page]) return;
            currentPage = page;
            if (window.location.hash !== '#' + page) history.pushState(null, null, '#' + page);
            
            iframe.srcdoc = pageCache[page];
            container.classList.add('active');
            document.querySelectorAll('.side-link').forEach(l => l.classList.toggle('active', l.dataset.page === page));
        }

        function closeIframe() {
            container.classList.remove('active');
            iframe.srcdoc = ""; iframe.src = "about:blank";
            currentPage = null;
            if (window.location.hash) history.pushState(null, null, ' ');
            document.querySelectorAll('.side-link').forEach(l => l.classList.remove('active'));
        }

        function checkHash() {
            const hash = window.location.hash.substring(1);
            if (hash) openPage(hash);
            else if (currentPage) closeIframe();
        }

        class Particle {
            constructor() { this.init(); }
            init() { 
                this.x = Math.random() * w; 
                this.y = Math.random() * h; 
                this.size = Math.random() * 1.8 + 0.8; 
                this.speedX = Math.random() * 0.4 - 0.2; 
                this.speedY = Math.random() * 0.4 - 0.2; 
                this.opacity = Math.random() * 0.5 + 0.4;
            }
            update() { 
                this.x += this.speedX; 
                this.y += this.speedY; 
                
                // Sexy Wrap Around
                if (this.x < 0) this.x = w;
                if (this.x > w) this.x = 0;
                if (this.y < 0) this.y = h;
                if (this.y > h) this.y = 0;
            }
            draw(color) { 
                ctx.fillStyle = color; 
                ctx.globalAlpha = this.opacity; 
                ctx.beginPath(); 
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); 
                ctx.fill(); 
            }
        }

        function initParticles(mode) {
            if (mode === 'off') { particlesArray = []; return; }
            const counts = { low: 40, mid: 95, high: 240 };
            const target = counts[mode] || 95;
            particlesArray = Array.from({ length: target }, () => new Particle());
        }

        function animate() { 
            ctx.clearRect(0, 0, w, h); 
            // Kleur één keer per frame doorgeven voor performance
            particlesArray.forEach(p => { 
                p.update(); 
                p.draw(currentAccentColor); 
            }); 
            requestAnimationFrame(animate); 
        }

        window.addEventListener('hashchange', checkHash);
        window.addEventListener('message', e => {
            if (e.data.type === 'updateSettings') syncSettings();
            if (e.data.type === 'closeIframe') closeIframe();
        });

        document.querySelectorAll('.side-link').forEach(l => l.addEventListener('click', () => openPage(l.dataset.page)));
        window.addEventListener('mousemove', e => { 
            glow.style.left = e.clientX + 'px'; 
            glow.style.top = e.clientY + 'px'; 
        });
        window.addEventListener('resize', () => { 
            w = window.innerWidth; h = window.innerHeight; 
            canvas.width = w; canvas.height = h; 
        });

        window.addEventListener('load', () => { 
            w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h;
            syncSettings(); prefetchPages(); animate(); 
            document.getElementById('header').classList.add('show');
            const tag = document.getElementById('tagline-text');
            tag.textContent = taglines[Math.floor(Math.random() * taglines.length)];
            setTimeout(() => tag.classList.add('show'), 500);
            setInterval(() => {
                const now = new Date();
                document.getElementById('clock').textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                document.getElementById('date').textContent = now.toLocaleDateString([], {weekday:'short', day:'numeric', month:'short'});
            }, 1000);
        });
    </script>
</body>
</html>
