<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="dynamic-title">HRN | Gaming Hub</title>
    <link rel="icon" id="dynamic-favicon" href="favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root{
            --bg:#05070a;
            --accent:#89b4fa;
            --accent-glow:rgba(137,180,250,.18);
            --text-main:#f0f4ff;
            --text-dim:rgba(255,255,255,.58);
            --glass:rgba(255,255,255,.035);
            --glass-border:rgba(255,255,255,.09);
            --transition:all .35s cubic-bezier(.23,1,.32,1);
        }
        *{margin:0;padding:0;box-sizing:border-box;scrollbar-width:none}
        *::-webkit-scrollbar{display:none}
        html,body{
            height:100dvh; width:100%; font-family:'Inter',system-ui,sans-serif;
            background:var(--bg); color:var(--text-main); overflow:hidden; user-select:none;
        }
        .ambient-bg{
            position:fixed; inset:0; z-index:1;
            background:radial-gradient(circle at 40% 30%,rgba(137,180,250,.05) 0%,transparent 60%), #05070a;
            background-size: cover;
            background-position: center;
            transition: opacity .6s ease;
        }
        .glow{position:fixed;width:460px;height:460px;background:radial-gradient(circle,var(--accent-glow) 0%,transparent 70%);border-radius:50%;pointer-events:none;z-index:2;opacity:.38;filter:blur(55px);mix-blend-mode:screen;display:none;}
        @media(hover:hover){.glow{display:block}}
        #particles{position:fixed;inset:0;z-index:3;pointer-events:none}
        .wrapper{display:flex;flex-direction:column;height:100dvh;padding:28px 36px;max-width:1680px;margin:0 auto;position:relative;z-index:10;}
        .header{display:flex;justify-content:center;z-index:50;opacity:0;transition:opacity .6s ease;}
        .header.show{opacity:1}
        #status-pill{display:flex;align-items:center;gap:14px;background:var(--glass);padding:9px 24px;border-radius:9999px;border:1px solid var(--glass-border);backdrop-filter:blur(20px);font-size:.75rem;font-weight:500;letter-spacing:.12em;color:var(--text-dim);text-transform:uppercase;box-shadow:0 4px 15px rgba(0,0,0,.15);}
        .main{display:flex;justify-content:space-between;align-items:center;flex-grow:1;position:relative;z-index:20;}
        .side-nav.desktop-only{display:flex;flex-direction:column;gap:16px;z-index:30;width:62px;}
        .side-nav.mobile-nav{display:none;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:280px;margin:0 auto;z-index:30;}
        .side-link{width:100%;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;color:var(--text-main);background:var(--glass);border:1px solid var(--glass-border);border-radius:15px;transition:var(--transition);text-decoration:none;box-shadow:0 4px 12px rgba(0,0,0,.1);}
        .side-link:hover{background:rgba(137,180,250,.13);border-color:var(--accent);transform:translateY(-4px) scale(1.05);color:var(--accent);}
        .side-link svg{width:22px;height:22px;stroke-width:2.1px;}
        .side-link.active{background:rgba(137,180,250,.18);border-color:var(--accent);color:var(--accent);box-shadow:0 0 20px rgba(137,180,250,.3);}
        .center-brand{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;display:flex;flex-direction:column;align-items:center;gap:18px;z-index:40;}
        .logo{font-size:clamp(4.2rem,14vw,10.5rem);font-weight:900;letter-spacing:-.07em;line-height:.82;background:linear-gradient(180deg,#f0f4ff 28%,#a8c4ff 72%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 20px 45px rgba(137,180,250,.35));opacity:.5;transition:opacity .6s ease;}
        .logo:hover{opacity:.56}
        .tagline{font-size:1.02rem;font-weight:400;letter-spacing:.15em;color:var(--text-dim);margin-top:-4px;min-height:1.3em;opacity:0;transform:translateY(10px);transition:all .6s cubic-bezier(.23,1,.32,1);}
        .tagline.show{opacity:1;transform:translateY(0);}
        #iframe-container{position:fixed;inset:0;z-index:100;background:var(--bg);opacity:0;visibility:hidden;transition:opacity .4s cubic-bezier(.23,1,.32,1);pointer-events:none;}
        #iframe-container.active{opacity:1;visibility:visible;pointer-events:auto;}
        #content-iframe{width:100%;height:100%;border:none;background:var(--bg);}
        .iframe-loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:16px;color:var(--text-dim);z-index:110;}
        .spinner{width:42px;height:42px;border:3px solid rgba(137,180,250,.15);border-top-color:var(--accent);border-radius:50%;animation:spin .9s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg)}}
        @media(max-width:768px){
            .wrapper{padding:20px 16px}
            .main{flex-direction:column;justify-content:center;gap:28px}
            .center-brand{position:static;transform:none;order:1;gap:16px}
            .logo{font-size:clamp(3.7rem,16.5vw,8.6rem);opacity:.68}
            .side-nav.mobile-nav{display:grid!important;grid-template-columns:repeat(3,1fr);gap:9px;width:100%;max-width:255px;margin:0 auto;order:2}
            .desktop-only{display:none!important}
        }
    </style>
</head>
<body>
    <div class="ambient-bg" id="ambient-bg"></div>
    <div class="glow" id="mouse-glow"></div>
    <canvas id="particles"></canvas>

    <div class="wrapper">
        <header class="header" id="header">
            <div id="status-pill">
                <span id="date"></span>
                <div style="width:1px;height:12px;background:var(--glass-border)"></div>
                <span id="clock"></span>
            </div>
        </header>

        <main class="main">
            <nav class="side-nav desktop-only">
                <a href="#" class="side-link" data-page="settings"><i data-lucide="settings"></i></a>
                <a href="#" class="side-link" data-page="games"><i data-lucide="gamepad-2"></i></a>
                <a href="#" class="side-link" data-page="bookmarklets"><i data-lucide="bookmark"></i></a>
                <a href="#" class="side-link" data-page="about"><i data-lucide="info"></i></a>
                <a href="#" class="side-link" data-page="add"><i data-lucide="plus"></i></a>
            </nav>

            <div class="center-brand">
                <h1 class="logo">HRN</h1>
                <p class="tagline" id="tagline"></p>
            </div>

            <nav class="side-nav mobile-nav">
                <a href="#" class="side-link" data-page="settings"><i data-lucide="settings"></i></a>
                <a href="#" class="side-link" data-page="games"><i data-lucide="gamepad-2"></i></a>
                <a href="#" class="side-link" data-page="bookmarklets"><i data-lucide="bookmark"></i></a>
                <a href="#" class="side-link" data-page="about"><i data-lucide="info"></i></a>
                <a href="#" class="side-link" data-page="add"><i data-lucide="plus"></i></a>
            </nav>
        </main>
    </div>

    <div id="iframe-container">
        <div class="iframe-loading" id="iframe-loading">
            <div class="spinner"></div>
        </div>
        <iframe id="content-iframe" src="" allowfullscreen></iframe>
    </div>

    <script>
        lucide.createIcons();

        const taglines = [
            "ELITE GAMING COMMUNITY","528 GAMES. ONE PLATFORM.","PLAY ANYTHING. MASTER EVERYTHING.",
            "WHERE LEGENDS ARE BORN","NO SKILL, NO ENTRY","LEVEL UP OR LOG OUT",
            "FOR THE REAL ONES","HIGH RISK. HIGH REWARD.","CLUTCH OR KICK","BUILT DIFFERENT"
        ];

        let currentState = { bgUrl: null, tabTitle: null, favicon: null, particles: null };

        function syncSettings() {
            const bgUrl = localStorage.getItem('hrn_bg_url');
            const tabTitle = localStorage.getItem('hrn_tab_title');
            const favicon = localStorage.getItem('hrn_favicon_url');
            const particles = localStorage.getItem('hrn_particles') !== 'false';

            if (bgUrl !== currentState.bgUrl) {
                const ambient = document.getElementById('ambient-bg');
                ambient.style.backgroundImage = bgUrl ? `url('${bgUrl}')` : '';
                ambient.style.opacity = bgUrl ? '0.25' : '';
                currentState.bgUrl = bgUrl;
            }
            if (tabTitle !== currentState.tabTitle) {
                document.getElementById('dynamic-title').textContent = tabTitle || 'HRN | Gaming Hub';
                currentState.tabTitle = tabTitle;
            }
            if (favicon !== currentState.favicon) {
                let link = document.getElementById('dynamic-favicon') || document.querySelector("link[rel*='icon']");
                link.href = favicon || 'favicon.ico';
                currentState.favicon = favicon;
            }
            if (particles !== currentState.particles) {
                document.getElementById('particles').style.display = particles ? 'block' : 'none';
                currentState.particles = particles;
            }
        }

        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particlesArray = [], w, h;

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.size = Math.random() * 1.7 + 0.5;
                this.speedX = Math.random() * 0.22 - 0.11;
                this.speedY = Math.random() * 0.22 - 0.16;
                this.hue = 212 + Math.random() * 28;
                this.life = Math.random() * 8000 + 6000;
                this.age = Math.random() * this.life;
                this.baseOpacity = Math.random() * 0.28 + 0.12;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY; this.age += 16;
                if (this.x < 0) this.x = w; if (this.x > w) this.x = 0;
                if (this.y < 0) this.y = h; if (this.y > h) this.y = 0;
                if (this.age > this.life) this.reset();
            }
            draw() {
                const p = this.age / this.life;
                const o = p < 0.15 ? this.baseOpacity * (p / 0.15) : p > 0.80 ? this.baseOpacity * ((1 - p) / 0.20) : this.baseOpacity;
                if (o <= 0) return;
                ctx.save();
                ctx.globalAlpha = o;
                ctx.fillStyle = `hsl(${this.hue},75%,94%)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function resize() {
            w = window.innerWidth; h = window.innerHeight;
            canvas.width = w; canvas.height = h;
        }

        function animateParticles() {
            ctx.clearRect(0, 0, w, h);
            for (let p of particlesArray) { p.update(); p.draw(); }
            requestAnimationFrame(animateParticles);
        }

        const iframeContainer = document.getElementById('iframe-container');
        const loading = document.getElementById('iframe-loading');
        const contentIframe = document.getElementById('content-iframe');
        let currentPage = null;
        let isHidden = false;

        function openPage(page) {
            syncSettings();
            
            if (currentPage === page && isHidden) {
                showIframe();
                return;
            }
            
            if (currentPage === page && !isHidden) {
                hideIframe();
                return;
            }

            currentPage = page;
            isHidden = false;

            document.querySelectorAll('.side-link').forEach(link => {
                link.classList.toggle('active', link.dataset.page === page);
            });

            history.pushState({page: page}, '', '#' + page);
            iframeContainer.style.visibility = 'visible';
            iframeContainer.classList.add('active');
            iframeContainer.style.opacity = '1';
            
            loading.style.display = 'flex';
            contentIframe.style.opacity = '0';
            contentIframe.src = page + '.html';

            contentIframe.onload = () => {
                loading.style.display = 'none';
                contentIframe.style.opacity = '1';
            };
        }

        function hideIframe() {
            isHidden = true;
            iframeContainer.classList.remove('active');
            iframeContainer.style.opacity = '0';
            
            setTimeout(() => {
                if (isHidden) {
                    iframeContainer.style.visibility = 'hidden';
                    document.querySelectorAll('.side-link').forEach(l => l.classList.remove('active'));
                }
            }, 400);

            history.pushState(null, '', window.location.pathname);
        }

        function showIframe() {
            syncSettings();
            isHidden = false;
            iframeContainer.style.visibility = 'visible';
            iframeContainer.classList.add('active');
            iframeContainer.style.opacity = '1';
            
            if (currentPage) {
                document.querySelectorAll('.side-link').forEach(link => {
                    link.classList.toggle('active', link.dataset.page === currentPage);
                });
                history.pushState({page: currentPage}, '', '#' + currentPage);
            }
        }

        window.addEventListener('message', (e) => {
            if (e.data?.type === 'updateSettings') syncSettings();
            if (e.data?.type === 'closeIframe') hideIframe();
        });

        document.querySelectorAll('.side-link').forEach(link => {
            link.addEventListener('click', e => { e.preventDefault(); openPage(link.dataset.page); });
        });

        window.addEventListener('popstate', () => {
            const hash = window.location.hash.slice(1);
            if (hash) openPage(hash); else hideIframe();
        });

        window.addEventListener('focus', syncSettings);

        function updateDateTime() {
            const now = new Date();
            const hours = now.getHours() % 12 || 12;
            const min = now.getMinutes().toString().padStart(2, '0');
            const ampm = now.getHours() >= 12 ? 'PM' : 'AM';
            document.getElementById('clock').textContent = `${hours}:${min} ${ampm}`;
            document.getElementById('date').textContent = now.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'}).toUpperCase();
        }

        const glow = document.getElementById('mouse-glow');
        let tx = 0, ty = 0, cx = 0, cy = 0;
        document.addEventListener('mousemove', e => { tx = e.clientX; ty = e.clientY; }, {passive: true});

        function animateGlow() {
            cx += (tx - cx) * 0.08; cy += (ty - cy) * 0.08;
            glow.style.transform = `translate3d(${cx}px,${cy}px,0) translate(-50%,-50%)`;
            requestAnimationFrame(animateGlow);
        }

        window.addEventListener('load', () => {
            resize();
            const count = Math.floor(Math.min(w * h / 14000, 80));
            for (let i = 0; i < count; i++) particlesArray.push(new Particle());
            animateParticles();
            syncSettings();
            updateDateTime();
            setInterval(updateDateTime, 1000);
            document.getElementById('header').classList.toggle('show', window.innerHeight > 600);
            const tag = document.getElementById('tagline');
            tag.textContent = taglines[Math.floor(Math.random() * taglines.length)];
            setTimeout(() => tag.classList.add('show'), 300);
            animateGlow();
            if (window.location.hash) openPage(window.location.hash.slice(1));
        });
        window.addEventListener('resize', resize);
    </script>
</body>
</html>
