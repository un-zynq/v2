<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="dynamic-title">HRN</title>
    <link id="app-favicon" rel="icon" type="image/png" href="/logo.svg?v=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root{--bg:#030508;--accent:#89b4fa;--accent-rgb:137,180,250;--ui-silver:rgba(235,240,255,.85);--ui-border:rgba(255,255,255,.1)}*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{height:100%;width:100%;background:var(--bg);color:var(--ui-silver);font-family:Inter,sans-serif;overflow:hidden;text-transform:uppercase}#webgl-canvas{position:fixed;inset:0;z-index:2;pointer-events:none}.ambient-bg{position:fixed;inset:0;z-index:1;pointer-events:none;background-size:cover;background-position:center;opacity:0;filter:brightness(.7);transition:2.5s cubic-bezier(.4,0,.2,1)}.ambient-bg.loaded{opacity:1}.overlay-dim{position:fixed;inset:0;z-index:1;background:rgba(0,0,0,.3);pointer-events:none}#loader{position:fixed;inset:0;z-index:10000;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .8s cubic-bezier(.4,0,.2,1),visibility .8s}.load-line{width:220px;height:2px;background:rgba(255,255,255,.05);position:relative;overflow:hidden;border-radius:10px}#progress{position:absolute;height:100%;width:0;background:var(--accent);transition:width .6s cubic-bezier(.22,1,.36,1);box-shadow:0 0 15px var(--accent)}.wrapper{position:relative;display:flex;flex-direction:column;height:100dvh;width:100%;z-index:10;opacity:0;transform:scale(1.02);transition:1.5s cubic-bezier(.16,1,.3,1)}.wrapper.active{opacity:1;transform:scale(1)}.header{position:absolute;top:38px;width:100%;display:flex;justify-content:center;z-index:100}.status-pill{background:rgba(0,0,0,.4);border:1px solid var(--ui-border);padding:11px 28px;border-radius:100px;backdrop-filter:blur(12px);font-size:9px;font-weight:900;letter-spacing:2.5px;display:flex;gap:28px;color:var(--ui-silver)}.brand{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;width:100%;display:flex;flex-direction:column;align-items:center;gap:35px}.logo{font-size:clamp(5.5rem,22vw,11.5rem);font-weight:900;letter-spacing:-.06em;line-height:.7;background:linear-gradient(180deg,#fff 50%,var(--accent) 150%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;opacity:.6}.tagline{font-size:10px;font-weight:600;letter-spacing:9px;color:#fff;margin-top:0;opacity:0;transform:translateY(15px);transition:1.5s cubic-bezier(.16,1,.3,1) .5s;text-shadow:0 2px 15px rgba(0,0,0,.8);line-height:1.2;max-width:75%}.tagline.show{opacity:.9;transform:translateY(0)}.side-nav{position:absolute;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:20px;padding:0 55px;z-index:20;transition:1.2s cubic-bezier(.16,1,.3,1)}.nav-left{left:-150px;opacity:0}.nav-right{right:-150px;opacity:0}.wrapper.active .nav-left{left:0;opacity:1}.wrapper.active .nav-right{right:0;opacity:1}.mobile-nav,.bottom-nav{display:none;pointer-events:all;justify-content:center}.mobile-nav{gap:15px;margin-top:5px}.bottom-nav{gap:18px;margin-top:40px;flex-wrap:wrap}.bottom-nav.show{display:flex}.btn{width:58px;height:58px;border-radius:18px;background:rgba(0,0,0,.4);border:1px solid var(--ui-border);color:var(--ui-silver);opacity:.85;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.4s cubic-bezier(.16,1,.3,1);backdrop-filter:blur(12px)}.btn svg{width:22px;height:22px;stroke-width:1.8px}.btn:active{transform:scale(.96)}.btn.active,.btn:hover{opacity:1;color:#fff;border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.1);transform:scale(1.08) translateY(-2px);box-shadow:0 12px 25px -10px rgba(0,0,0,.5)}@media (min-width:901px){.brand{gap:0}.tagline{margin-top:32px}.side-nav{gap:25px}.btn{width:62px;height:62px}.bottom-nav{gap:22px;margin-top:48px}}@media (max-width:900px){.side-nav,.bottom-nav{display:none!important}.mobile-nav{display:flex!important}}
        
        /* High Performance Pre-loaded Container */
        #container {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: transparent;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #container.active {
            opacity: 1;
            pointer-events: all;
        }
        .page-frame {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            pointer-events: none;
            transform: scale(1.05); /* Start iets groter voor smooth zoom-in */
            transition: opacity 0.4s ease, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            visibility: hidden; /* Forceert browser om styles te laden zonder interactie */
        }
        .page-frame.visible {
            opacity: 1;
            pointer-events: all;
            transform: scale(1);
            visibility: visible;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="loader"><div class="load-line"><div id="progress"></div></div></div>
    <div class="ambient-bg" id="bg"></div>
    <div class="overlay-dim"></div>
    <canvas id="webgl-canvas"></canvas>

    <div class="wrapper" id="ui">
        <div class="header">
            <div class="status-pill" id="status-pill">
                <span id="date">SYNCING</span>
                <span id="clock">00:00:00</span>
            </div>
        </div>

        <div class="side-nav nav-left" id="side-left">
            <div class="btn" onclick="setHash('settings')"><i data-lucide="settings"></i></div>
            <div class="btn" onclick="setHash('games')"><i data-lucide="gamepad-2"></i></div>
        </div>

        <div class="brand">
            <h1 class="logo" id="main-logo">HRN</h1>
            <p class="tagline" id="tagline"></p>

            <div class="mobile-nav" id="mobile-nav">
                <div class="btn" onclick="setHash('settings')"><i data-lucide="settings"></i></div>
                <div class="btn" onclick="setHash('games')"><i data-lucide="gamepad-2"></i></div>
                <div class="btn" onclick="setHash('info')"><i data-lucide="info"></i></div>
            </div>

            <div class="bottom-nav" id="bottom-nav">
                <div class="btn" onclick="setHash('settings')"><i data-lucide="settings"></i></div>
                <div class="btn" onclick="setHash('games')"><i data-lucide="gamepad-2"></i></div>
                <div class="btn" onclick="setHash('info')"><i data-lucide="info"></i></div>
                <div class="btn" onclick="setHash('add')"><i data-lucide="plus"></i></div>
            </div>
        </div>

        <div class="side-nav nav-right" id="side-right">
            <div class="btn" onclick="setHash('info')"><i data-lucide="info"></i></div>
            <div class="btn" onclick="setHash('add')"><i data-lucide="plus"></i></div>
        </div>
    </div>

    <div id="container"></div>

    <script id="vs" type="x-shader/x-vertex">
        attribute vec2 a_pos;attribute float a_size;attribute float a_op;uniform vec2 u_res;uniform float u_time;varying float v_op;
        void main(){vec2 zeroToOne=a_pos/u_res;vec2 clipSpace=(zeroToOne*2.0)-1.0;gl_Position=vec4(clipSpace*vec2(1.0,-1.0),0.0,1.0);float pulse=0.85+(sin(u_time*1.5+a_op*10.0)*0.15);gl_PointSize=a_size*1.5*pulse;v_op=a_op;}
    </script>
    <script id="fs" type="x-shader/x-fragment">
        precision mediump float;uniform vec3 u_color;varying float v_op;
        void main(){float dist=distance(gl_PointCoord,vec2(0.5));if(dist>0.5)discard;gl_FragColor=vec4(u_color,(v_op*1.3)*(1.0-dist*2.0));}
    </script>

    <script>
        lucide.createIcons();
        const $=id=>document.getElementById(id);
        const canvas=$('webgl-canvas');
        const gl=canvas.getContext('webgl',{antialias:true,alpha:true});
        const cacheVersion = Date.now();

        let particles=[],pAmount=0,pEnabled=true,program,posAttr,sizeAttr,opAttr,resUni,colUni,timeUni,posBuffer,sizeBuffer,opBuffer,cache={},startTime=Date.now();
        const defaultBg="https://img.freepik.com/free-vector/black-background-with-wavy-lines_52683-76524.jpg";
        const taglines=["YOU ARE THE AURA","LEGEND IN MAKING","POWER WITHIN YOU","OWN THE GAME","RULE YOUR WORLD","BORN TO WIN"];
        let db;

        function initDB(){
            return new Promise(resolve=>{
                const req=indexedDB.open("hrn_db",1);
                req.onupgradeneeded=e=>{
                    db=e.target.result;
                    if(!db.objectStoreNames.contains('background')) db.createObjectStore('background',{keyPath:'id'});
                };
                req.onsuccess=e=>{db=e.target.result;resolve();};
                req.onerror=()=>resolve();
            });
        }

        async function loadBackground(){
            if(!db) await initDB();
            return new Promise(resolve=>{
                try{
                    const tx=db.transaction('background','readonly');
                    const req=tx.objectStore('background').get('current_bg');
                    req.onsuccess=()=>resolve(req.result?req.result.value:defaultBg);
                    req.onerror=()=>resolve(defaultBg);
                }catch(e){resolve(defaultBg);}
            });
        }

        async function updateBg(val){
            const bgLayer=$('bg');
            let displayUrl=defaultBg;
            if(val instanceof Blob) displayUrl=URL.createObjectURL(val);
            else if(typeof val==='string'&&val.length>0) displayUrl=val;
            bgLayer.style.backgroundImage=`url('${displayUrl}')`;
            bgLayer.classList.add('loaded');
        }

        function initGL(){
            if(!gl) return;
            const vsS=gl.createShader(gl.VERTEX_SHADER);gl.shaderSource(vsS,$('vs').textContent);gl.compileShader(vsS);
            const fsS=gl.createShader(gl.FRAGMENT_SHADER);gl.shaderSource(fsS,$('fs').textContent);gl.compileShader(fsS);
            program=gl.createProgram();gl.attachShader(program,vsS);gl.attachShader(program,fsS);gl.linkProgram(program);gl.useProgram(program);
            posAttr=gl.getAttribLocation(program,"a_pos");sizeAttr=gl.getAttribLocation(program,"a_size");opAttr=gl.getAttribLocation(program,"a_op");
            resUni=gl.getUniformLocation(program,"u_res");colUni=gl.getUniformLocation(program,"u_color");timeUni=gl.getUniformLocation(program,"u_time");
            posBuffer=gl.createBuffer();sizeBuffer=gl.createBuffer();opBuffer=gl.createBuffer();
            gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);
        }

        async function applyAllSettings(){
            const c=localStorage.getItem('hrn_clr')||"#89b4fa";
            const density=parseFloat(localStorage.getItem('hrn_int'))||1.1;
            pEnabled=localStorage.getItem('hrn_part')!=='false';
            if(program&&gl) gl.uniform3f(colUni,parseInt(c.slice(1,3),16)/255,parseInt(c.slice(3,5),16)/255,parseInt(c.slice(5,7),16)/255);
            document.documentElement.style.setProperty('--accent',c);
            $('dynamic-title').textContent=localStorage.getItem('hrn_title')||"HRN | CORE";
            const newpAmount=Math.floor(((window.innerWidth*window.innerHeight)/10000)*density);
            if(pAmount!==newpAmount){
                particles=[];pAmount=newpAmount;
                for(let i=0;i<pAmount;i++) particles.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,s:Math.random()*4+2.5,vx:(Math.random()-0.5)*0.4,vy:(Math.random()-0.5)*0.4,o:0.8*(Math.random()*0.5+0.5)});
            }
            updateBg(await loadBackground());
            const side=localStorage.getItem('hrn_nav_mode')!=='bottom'&&window.innerWidth>=901;
            $('side-left').style.display=$('side-right').style.display=side?'flex':'none';
            $('bottom-nav').classList.toggle('show',!side&&window.innerWidth>=901);
        }

        function render(){
            if(!gl||!program||!pEnabled||pAmount===0){if(gl)gl.clear(gl.COLOR_BUFFER_BIT);requestAnimationFrame(render);return;}
            const posD=new Float32Array(pAmount*2),sizeD=new Float32Array(pAmount),opD=new Float32Array(pAmount);
            for(let i=0;i<pAmount;i++){
                const p=particles[i];p.x=(p.x+p.vx+window.innerWidth)%window.innerWidth;p.y=(p.y+p.vy+window.innerHeight)%window.innerHeight;
                posD[i*2]=p.x;posD[i*2+1]=p.y;sizeD[i]=p.s;opD[i]=p.o;
            }
            gl.clear(gl.COLOR_BUFFER_BIT);gl.uniform2f(resUni,window.innerWidth,window.innerHeight);gl.uniform1f(timeUni,(Date.now()-startTime)/1000);
            const b=(buf,attr,dat,s)=>{gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.bufferData(gl.ARRAY_BUFFER,dat,gl.DYNAMIC_DRAW);gl.enableVertexAttribArray(attr);gl.vertexAttribPointer(attr,s,gl.FLOAT,false,0,0);};
            b(posBuffer,posAttr,posD,2);b(sizeBuffer,sizeAttr,sizeD,1);b(opBuffer,opAttr,opD,1);
            gl.drawArrays(gl.POINTS,0,pAmount);requestAnimationFrame(render);
        }

        // --- IMPROVED PRE-RENDER LOGIC ---
        async function loadAllFrames() {
            try {
                const r = await fetch('pages.txt?v=' + cacheVersion);
                const text = await r.text();
                const regex = /\/:(\w+):\/\s*([\s\S]*?)(?=\/:\w+:\/|$)/g;
                let m;
                const container = $('container');
                container.innerHTML = ''; 
                while ((m = regex.exec(text)) !== null) {
                    const id = m[1];
                    const content = m[2].trim();
                    const f = document.createElement('iframe');
                    f.id = 'page-' + id;
                    f.className = 'page-frame';
                    f.srcdoc = content;
                    // Forceert browser rendering
                    container.appendChild(f);
                    cache[id] = true; 
                }
            } catch(e) { console.error("Sync error"); }
        }

        function checkHash() {
            const h = window.location.hash.slice(1);
            const container = $('container');
            const frames = document.querySelectorAll('.page-frame');
            
            if(h && cache[h]) {
                const target = $('page-' + h);
                if(target) {
                    // Verberg andere frames direct
                    frames.forEach(f => { if(f !== target) f.classList.remove('visible'); });
                    
                    container.style.display = 'block';
                    void container.offsetWidth; // Force reflow
                    container.classList.add('active');
                    target.classList.add('visible');
                    $('ui').classList.remove('active');
                }
            } else {
                container.classList.remove('active');
                frames.forEach(f => f.classList.remove('visible'));
                setTimeout(() => { 
                    if(!window.location.hash){ 
                        container.style.display='none'; 
                        $('ui').classList.add('active'); 
                    } 
                }, 500);
            }
        }

        async function init(){
            canvas.width=window.innerWidth;canvas.height=window.innerHeight;
            if(gl)gl.viewport(0,0,canvas.width,canvas.height);
            $('tagline').textContent=taglines[Math.floor(Math.random()*taglines.length)];
            initGL();await initDB();
            
            $('progress').style.width='20%';
            await loadAllFrames();
            $('progress').style.width='100%';
            
            await applyAllSettings();
            render();
            checkHash();

            setTimeout(()=>{
                $('loader').style.opacity='0';
                setTimeout(()=>{
                    $('loader').style.display='none';
                    if(!window.location.hash) $('ui').classList.add('active');
                    $('tagline').classList.add('show');
                },800);
            },600);
        }

        window.onhashchange = checkHash;
        window.onresize=()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;if(gl)gl.viewport(0,0,canvas.width,canvas.height);applyAllSettings();};
        window.onmessage=e=>{ if(e.data==='sync') init(); if(e.data==='close') window.location.hash=''; };
        function setHash(n){window.location.hash=n;}
        setInterval(()=>{const n=new Date();$('clock').textContent=n.toTimeString().split(' ')[0];$('date').textContent=n.toLocaleDateString('en-US',{weekday:'short',day:'numeric'}).toUpperCase();},1000);
        window.onload=init;
    </script>
</body>
</html>
