<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>HRN | CORE</title>
    <link id="favicon" rel="icon" href="/logo.svg">
    <style>
        :root{--accent:#89b4fa;--bg:#030508}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:#fff;font-family:'Inter',sans-serif;height:100dvh;overflow:hidden}.main-bg{position:fixed;inset:0;background-size:cover;background-position:center;z-index:-1;transition:background-image 0.4s ease}iframe{border:none;width:100%;height:100%}
    </style>
</head>
<body>
    <div id="app-bg" class="main-bg"></div>
    
    <script>
        const defaults={title:'HRN | CORE',clr:'#89b4fa',op:0.8,int:1.1,fav:'/logo.svg',part:true,bg:'https://img.freepik.com/free-vector/black-background-with-wavy-lines_52683-76524.jpg'};
        
        function applySettings(){
            const get=(k)=>localStorage.getItem('hrn_'+k)||defaults[k];
            document.title=get('title');
            document.getElementById('favicon').href=get('fav');
            document.documentElement.style.setProperty('--accent',get('clr'));
            document.getElementById('app-bg').style.backgroundImage=`url('${localStorage.getItem('hrn_bg')||defaults.bg}')`;
            document.getElementById('app-bg').style.opacity=get('op');
        }

        window.addEventListener('message',(e)=>{
            if(e.data==='sync'||e.data==='close') applySettings();
        });

        window.addEventListener('storage',(e)=>{
            if(e.key && e.key.startsWith('hrn_')) applySettings();
        });

        applySettings();
    </script>
</body>
</html>
