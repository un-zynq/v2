<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title id="dynamic-title">HRN</title>
    <link id="app-favicon" rel="icon" type="image/png" href="/logo.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root{--bg:#030508;--accent:#89b4fa;--accent-rgb:137,180,250;--ui-silver:rgba(235,240,255,0.85);--ui-border:rgba(255,255,255,0.1)}
        *{margin:0;padding:0;box-sizing:border-box}
        body,html{height:100%;width:100%;background:var(--bg);color:var(--ui-silver);font-family:Inter,sans-serif;overflow:hidden;text-transform:uppercase}
        #webgl-canvas{position:fixed;inset:0;z-index:2;pointer-events:none}
        .ambient-bg{position:fixed;inset:0;z-index:1;background-size:cover;background-position:center;opacity:0;filter:brightness(0.5);transition:1s ease;transform:scale(1.05)}
        .ambient-bg.loaded{opacity:1;transform:scale(1)}
        .overlay-dim{position:fixed;inset:0;z-index:1;background:radial-gradient(circle at center,transparent 0,rgba(0,0,0,0.5) 100%)}
        #loader{position:fixed;inset:0;z-index:10000;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:0.8s}
        .load-line{width:240px;height:2px;background:rgba(255,255,255,.03);position:relative;overflow:hidden}
        #progress{position:absolute;height:100%;width:0%;background:var(--accent);transition:0.4s;box-shadow:0 0 20px var(--accent)}
        .wrapper{position:relative;display:flex;flex-direction:column;height:100dvh;width:100%;z-index:10;opacity:0;transition:1s}
        .wrapper.active{opacity:1}
        .header{position:absolute;top:38px;width:100%;display:flex;justify-content:center;z-index:100}
        .status-pill{background:rgba(0,0,0,0.4);border:1px solid var(--ui-border);padding:11px 28px;border-radius:100px;backdrop-filter:blur(12px);font-size:9px;font-weight:900;letter-spacing:2.5px;display:flex;gap:28px}
        .brand{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;width:100%;display:flex;flex-direction:column;align-items:center}
        .logo{font-size:clamp(5.5rem,22vw,11.5rem);font-weight:900;letter-spacing:-.06em;background:linear-gradient(180deg,#fff 40%,var(--accent) 160%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;opacity:0;transform:translateY(25px);transition:2.5s cubic-bezier(.16,1,.3,1)}
        .logo.show{opacity:0.6;transform:translateY(0)}
        .tagline{font-size:10px;letter-spacing:11px;color:#fff;opacity:0;transform:translateY(20px);transition:2.8s cubic-bezier(.16,1,.3,1)}
        .tagline.show{opacity:0.8;transform:translateY(0)}
        .side-nav{position:absolute;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:20px;padding:0 55px;opacity:0;transition:2.2s}
        .nav-left{left:0;transform:translateY(-50%) translateX(-40px)}
        .nav-right{right:0;transform:translateY(-50%) translateX(40px)}
        .side-nav.show{opacity:1;transform:translateY(-50%) translateX(0)}
        .btn{width:64px;height:64px;border-radius:18px;background:rgba(0,0,0,0.4);border:1px solid var(--ui-border);color:var(--ui-silver);display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(12px);transition:0.3s}
        .btn:hover{border-color:var(--accent);transform:translateY(-2px)}
        #container{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.8);display:none;opacity:0;transition:0.4s}
        #container.active{display:block;opacity:1}
        iframe{width:100%;height:100%;border:none}
    </style>
</head>
<body>
    <div id="loader"><div class="load-line"><div id="progress"></div></div></div>
    <div class="ambient-bg" id="bg"></div>
    <div class="overlay-dim"></div>
    <canvas id="webgl-canvas"></canvas>
    
    <div class="wrapper" id="ui">
        <div class="header">
            <div class="status-pill"><span id="date">SYNCING</span><span id="clock">00:00:00</span></div>
        </div>
        <div class="side-nav nav-left" id="n-left">
            <div class="btn" onclick="setHash('settings')"><i data-lucide="settings"></i></div>
            <div class="btn" onclick="setHash('games')"><i data-lucide="gamepad-2"></i></div>
        </div>
        <div class="brand">
            <h1 class="logo" id="main-logo">HRN</h1>
            <p class="tagline" id="tagline"></p>
        </div>
        <div class="side-nav nav-right" id="n-right">
            <div class="btn" onclick="setHash('about')"><i data-lucide="info"></i></div>
            <div class="btn" onclick="setHash('add')"><i data-lucide="plus"></i></div>
        </div>
    </div>
    <div id="container"><iframe id="frame"></iframe></div>

    <script id="vs" type="x-shader/x-vertex">
        attribute vec2 a_pos; attribute float a_size; attribute float a_op;
        uniform vec2 u_res; uniform float u_time; varying float v_op;
        void main(){
            vec2 zto = a_pos/u_res; vec2 cs = (zto*2.0)-1.0;
            gl_Position = vec4(cs*vec2(1,-1),0,1);
            gl_PointSize = a_size * (0.85 + sin(u_time + a_op*10.0)*0.15);
            v_op = a_op;
        }
    </script>
    <script id="fs" type="x-shader/x-fragment">
        precision mediump float; uniform vec3 u_color; varying float v_op;
        void main(){
            float d = distance(gl_PointCoord, vec2(0.5));
            if(d > 0.5) discard;
            gl_FragColor = vec4(u_color, v_op * (1.0 - d * 2.0));
        }
    </script>

    <script>
        lucide.createIcons();
        const $ = id => document.getElementById(id);
        const canvas = $('webgl-canvas'), gl = canvas.getContext('webgl', {alpha:true});
        let particles = [], pAmount = 0, program, posBuffer, sizeBuffer, opBuffer, cache = {}, startTime = Date.now();
        
        function initGL() {
            const vS = gl.createShader(gl.VERTEX_SHADER); gl.shaderSource(vS, $('vs').text); gl.compileShader(vS);
            const fS = gl.createShader(gl.FRAGMENT_SHADER); gl.shaderSource(fS, $('fs').text); gl.compileShader(fS);
            program = gl.createProgram(); gl.attachShader(program, vS); gl.attachShader(program, fS); gl.linkProgram(program);
            posBuffer = gl.createBuffer(); sizeBuffer = gl.createBuffer(); opBuffer = gl.createBuffer();
            gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
        }

        function sync() {
            const c = localStorage.getItem('hrn_clr') || "#89b4fa";
            const o = parseFloat(localStorage.getItem('hrn_op')) || 0.8;
            const d = parseFloat(localStorage.getItem('hrn_int')) || 1.1;
            const pOn = localStorage.getItem('hrn_part') !== 'false';
            
            document.documentElement.style.setProperty('--accent', c);
            $('dynamic-title').textContent = localStorage.getItem('hrn_title') || "HRN | CORE";
            
            // Onmiddellijke deeltjes refresh
            particles = [];
            if(pOn) {
                pAmount = Math.floor(((window.innerWidth * window.innerHeight) / 10000) * d);
                for(let i=0; i<pAmount; i++) {
                    particles.push({
                        x: Math.random()*window.innerWidth, y: Math.random()*window.innerHeight,
                        s: Math.random()*5+2, vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5,
                        o: o * (Math.random()*0.5+0.5)
                    });
                }
            } else { pAmount = 0; }

            const r = parseInt(c.slice(1,3),16)/255, g = parseInt(c.slice(3,5),16)/255, b = parseInt(c.slice(5,7),16)/255;
            gl.useProgram(program);
            gl.uniform3f(gl.getUniformLocation(program, "u_color"), r, g, b);

            const sBg = localStorage.getItem('hrn_bg') || "https://img.freepik.com/free-vector/black-background-with-wavy-lines_52683-76524.jpg";
            $('bg').style.backgroundImage = `url(${sBg})`;
            $('bg').classList.add('loaded');
        }

        function render() {
            const time = (Date.now() - startTime) / 1000;
            const pd = new Float32Array(pAmount * 2), sd = new Float32Array(pAmount), od = new Float32Array(pAmount);
            for(let i=0; i<pAmount; i++) {
                let p = particles[i]; p.x += p.vx; p.y += p.vy;
                if(p.x<0)p.x=window.innerWidth; if(p.x>window.innerWidth)p.x=0;
                if(p.y<0)p.y=window.innerHeight; if(p.y>window.innerHeight)p.y=0;
                pd[i*2]=p.x; pd[i*2+1]=p.y; sd[i]=p.s; od[i]=p.o;
            }
            gl.clear(gl.COLOR_BUFFER_BIT);
            gl.useProgram(program);
            gl.uniform2f(gl.getUniformLocation(program, "u_res"), canvas.width, canvas.height);
            gl.uniform1f(gl.getUniformLocation(program, "u_time"), time);
            
            const bind = (buf, loc, data, size) => {
                gl.bindBuffer(gl.ARRAY_BUFFER, buf); gl.bufferData(gl.ARRAY_BUFFER, data, gl.DYNAMIC_DRAW);
                const a = gl.getAttribLocation(program, loc); gl.enableVertexAttribArray(a); gl.vertexAttribPointer(a, size, gl.FLOAT, false, 0, 0);
            };
            bind(posBuffer, "a_pos", pd, 2); bind(sizeBuffer, "a_size", sd, 1); bind(opBuffer, "a_op", od, 1);
            gl.drawArrays(gl.POINTS, 0, pAmount);
            requestAnimationFrame(render);
        }

        async function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
            initGL(); sync(); render();
            
            const taglines = ["YOU ARE THE AURA", "LEGEND IN MAKING", "POWER WITHIN YOU"];
            $('tagline').textContent = taglines[Math.floor(Math.random()*taglines.length)];

            const pages = ['settings', 'games', 'about', 'add'];
            for(let p of pages) { 
                try { const r = await fetch(p+'.html'); cache[p] = await r.text(); } catch(e){}
                $('progress').style.width = (pages.indexOf(p)+1)/pages.length*100+'%';
            }

            setTimeout(() => {
                $('loader').style.opacity = 0;
                setTimeout(() => {
                    $('loader').style.display = 'none';
                    $('ui').classList.add('active');
                    setTimeout(() => { $('main-logo').classList.add('show'); 
                        setTimeout(() => { $('n-left').classList.add('show'); $('n-right').classList.add('show'); $('tagline').classList.add('show'); }, 400);
                    }, 100);
                }, 800);
            }, 800);
        }

        function setHash(h) { window.location.hash = h; }
        function checkHash() {
            const h = window.location.hash.slice(1);
            if(h && cache[h]) { $('frame').srcdoc = cache[h]; $('container').style.display='block'; void $('container').offsetWidth; $('container').classList.add('active'); }
            else { $('container').classList.remove('active'); setTimeout(()=>$('container').style.display='none', 400); }
        }

        window.onhashchange = checkHash;
        window.onmessage = e => { if(e.data === 'sync') sync(); if(e.data === 'close') setHash(''); };
        window.onload = init;
        setInterval(() => { const n = new Date(); $('clock').textContent = n.toTimeString().split(' ')[0]; $('date').textContent = n.toLocaleDateString('en-US',{weekday:'short',day:'numeric'}).toUpperCase(); }, 1000);
    </script>
</body>
</html>
