<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="dynamic-title">HRN | CORE</title>
    <link id="app-favicon" rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #030508;
            --accent: #89b4fa;
            --accent-rgb: 137, 180, 250;
            --text: #f0f4ff;
            --border: rgba(255, 255, 255, 0.12);
            --logo-opacity: 0.8;
            --hover-opacity: 1.0; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; text-transform: uppercase; }

        /* LOADER */
        #loader { position: fixed; inset: 0; z-index: 10000; background: var(--bg); display: flex; align-items: center; justify-content: center; transition: opacity 0.6s ease; }
        .load-line { width: 140px; height: 1px; background: rgba(255,255,255,0.08); position: relative; }
        #progress { position: absolute; height: 100%; width: 0%; background: var(--accent); transition: width 0.3s; box-shadow: 0 0 15px var(--accent); }

        /* BACKGROUND EFFECTS */
        .ambient-bg { position: fixed; inset: 0; z-index: 1; pointer-events: none; background-size: cover; background-position: center; opacity: 0; filter: brightness(0.4); transition: opacity 1.5s; }
        canvas { position: fixed; inset: 0; z-index: 2; pointer-events: none; display: block; }
        #mouse-glow { position: fixed; width: 500px; height: 500px; border-radius: 50%; pointer-events: none; z-index: 3; background: radial-gradient(circle, rgba(var(--accent-rgb), 0.1) 0%, transparent 70%); transform: translate(-50%, -50%); filter: blur(50px); }

        /* UI STRUCTURE */
        .wrapper { position: relative; display: flex; flex-direction: column; height: 100dvh; width: 100%; z-index: 10; opacity: 0; transition: opacity 0.8s ease; }
        .wrapper.active { opacity: 1; }

        .header { position: absolute; top: 40px; width: 100%; display: flex; justify-content: center; }
        .status-pill { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 10px 25px; border-radius: 100px; backdrop-filter: blur(12px); font-size: 9px; font-weight: 900; letter-spacing: 2px; color: var(--text); display: flex; gap: 20px; }

        .brand { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .logo { font-size: clamp(5rem, 22vw, 13rem); font-weight: 900; letter-spacing: -0.07em; line-height: 0.8; background: linear-gradient(180deg, #fff 50%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; opacity: var(--logo-opacity); transition: 0.4s ease; }
        .tagline { font-size: 10px; letter-spacing: 11px; color: var(--text); margin-top: 30px; opacity: 0; transform: translateY(15px); transition: 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.5s; font-weight: 500; }
        .tagline.show { opacity: calc(var(--logo-opacity) - 0.2); transform: translateY(0); }

        /* NAVIGATION */
        .side-nav { position: absolute; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 25px; padding: 0 55px; z-index: 20; transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s; }
        .nav-left { left: -100px; opacity: 0; }
        .nav-right { right: -100px; opacity: 0; }
        .wrapper.active .nav-left { left: 0; opacity: 1; }
        .wrapper.active .nav-right { right: 0; opacity: 1; }

        /* MOBILE NAVIGATION (RESTORED) */
        .mobile-nav { display: none; gap: 20px; margin-top: 40px; pointer-events: all; }
        
        .btn { width: 62px; height: 62px; border-radius: 22px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); color: var(--text); opacity: var(--logo-opacity); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); pointer-events: all; backdrop-filter: blur(8px); }
        .btn:hover, .btn.active { opacity: var(--hover-opacity); color: var(--accent); border: 1px solid var(--accent); background: rgba(var(--accent-rgb), 0.05); transform: scale(1.1) translateY(-2px); box-shadow: 0 10px 30px -10px rgba(var(--accent-rgb), 0.3); }

        @media (max-width: 900px) {
            .side-nav { display: none !important; }
            .mobile-nav { display: flex; }
            .logo { font-size: clamp(6rem, 28vw, 10rem); }
        }

        /* IFRAME CONTAINER */
        #container { position: fixed; inset: 0; z-index: 1000; background: var(--bg); display: none; }
        #container.active { display: block; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div id="loader"><div class="load-line"><div id="progress"></div></div></div>
    <div class="ambient-bg" id="bg"></div>
    <div id="mouse-glow"></div>
    <canvas id="particles"></canvas>

    <div class="wrapper" id="ui">
        <div class="header">
            <div class="status-pill"><span id="date">SYNCING</span><span id="clock">00:00</span></div>
        </div>

        <div class="side-nav nav-left">
            <div class="btn" onclick="setHash('settings')"><i data-lucide="settings"></i></div>
            <div class="btn" onclick="setHash('games')"><i data-lucide="gamepad-2"></i></div>
        </div>

        <div class="brand">
            <h1 class="logo">HRN</h1>
            <p class="tagline" id="tagline">SYSTEM READY</p>
            <div class="mobile-nav">
                <div class="btn" onclick="setHash('settings')"><i data-lucide="settings"></i></div>
                <div class="btn" onclick="setHash('games')"><i data-lucide="gamepad-2"></i></div>
                <div class="btn" onclick="setHash('about')"><i data-lucide="info"></i></div>
            </div>
        </div>

        <div class="side-nav nav-right">
            <div class="btn" onclick="setHash('about')"><i data-lucide="info"></i></div>
            <div class="btn" onclick="setHash('add')"><i data-lucide="plus"></i></div>
        </div>
    </div>

    <div id="container"><iframe id="frame"></iframe></div>

    <script>
        lucide.createIcons();
        const $ = id => document.getElementById(id);
        const cache = {};
        const canvas = $('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let w, h, cachedAccent;
        let pEnabled = true;
        let pAmount = 50;

        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        function updateColor() { 
            cachedAccent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || "#89b4fa"; 
        }

        class P {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * w; this.y = Math.random() * h;
                this.s = Math.random() * 1.5; 
                this.vx = Math.random() * 0.4 - 0.2; 
                this.vy = Math.random() * 0.4 - 0.2;
                this.o = Math.random() * 0.5;
            }
            draw() {
                ctx.fillStyle = cachedAccent; ctx.globalAlpha = this.o;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, 7); ctx.fill();
                this.x += this.vx; this.y += this.vy;
                if(this.x<0 || this.x>w || this.y<0 || this.y>h) this.init();
            }
        }

        function loop() { 
            ctx.clearRect(0,0,w,h); 
            if(pEnabled) particles.forEach(p => p.draw()); 
            requestAnimationFrame(loop); 
        }

        function sync() {
            const c = localStorage.getItem('hrn_clr') || "#89b4fa";
            const o = parseFloat(localStorage.getItem('hrn_op')) || 0.8;
            pEnabled = localStorage.getItem('hrn_part') !== 'false';
            pAmount = parseInt(localStorage.getItem('hrn_int')) || 50;
            
            document.documentElement.style.setProperty('--accent', c);
            document.documentElement.style.setProperty('--logo-opacity', o);
            document.documentElement.style.setProperty('--hover-opacity', Math.min(o + 0.2, 1.0));
            $('dynamic-title').textContent = localStorage.getItem('hrn_title') || "HRN | CORE";
            
            if(localStorage.getItem('hrn_bg')) { 
                $('bg').style.backgroundImage = `url(${localStorage.getItem('hrn_bg')})`; 
                $('bg').style.opacity = 0.5; 
            }
            if(localStorage.getItem('hrn_fav')) $('app-favicon').href = localStorage.getItem('hrn_fav');
            
            updateColor();
            particles = [];
            for(let i=0; i<pAmount; i++) particles.push(new P());
        }

        async function init() {
            sync();
            const pages = ['settings', 'games', 'about', 'add'];
            let loaded = 0;
            // Parallel loading ⚡
            await Promise.all(pages.map(async p => { 
                try {
                    const r = await fetch(p+'.html');
                    cache[p] = r.ok ? await r.text() : 'Page not found';
                } catch(e) { cache[p] = 'Error loading page'; }
                loaded++; 
                $('progress').style.width = (loaded/pages.length*100)+'%'; 
            }));
            
            loop();
            setTimeout(() => { 
                $('loader').style.opacity='0'; 
                setTimeout(()=>$('loader').style.display='none', 600); 
                $('ui').classList.add('active'); 
                $('tagline').classList.add('show'); 
                checkHash(); 
            }, 800);
        }

        function setHash(n) { window.location.hash = n; }
        function checkHash() {
            const h = window.location.hash.slice(1);
            if(h && cache[h]) { 
                $('frame').srcdoc = cache[h]; 
                $('container').classList.add('active'); 
            } else { 
                $('container').classList.remove('active'); 
            }
        }

        window.addEventListener('hashchange', checkHash);
        window.addEventListener('message', e => { 
            if(e.data === 'close') window.location.hash = ''; 
            if(e.data === 'sync') sync(); 
        });

        window.onmousemove = e => { 
            $('mouse-glow').style.left = e.clientX+'px'; 
            $('mouse-glow').style.top = e.clientY+'px'; 
        };

        setInterval(() => { 
            const n = new Date(); 
            $('clock').textContent = n.toLocaleTimeString('en-US', {hour12:false, hour:'2-digit', minute:'2-digit'}); 
            $('date').textContent = n.toLocaleDateString('en-US', {weekday:'short', day:'numeric'}).toUpperCase(); 
        }, 1000);

        window.onload = init;
    </script>
</body>
</html>
