      if (!query.trim()) {        results = allItems;      } else {        const q = query.toLowerCase();        results = allItems.map(item => {          let score = 0;          const label = (item.label || "").toLowerCase();          const content = (item.content || "").toLowerCase();
          if (label === q) score += 100;          else if (label.startsWith(q)) score += 80;          else if (label.includes(q)) score += 60;                    if (content.includes(q)) {            score += 20;            const count = content.split(q).length - 1;            score += Math.min(count * 2, 20);           }          return { ...item, score };        })        .filter(item => item.score > 0)        .sort((a, b) => b.score - a.score);      }      renderSearchResults(results, query);    }
    function renderSearchResults(results, query) {      if (results.length === 0) {        searchResults.innerHTML = `<div class="search-empty-hint">No results found for "${query}"</div>`;        return;      }
      searchResults.innerHTML = results.map(item => {        const preview = item.content ? item.content.replace(/[#*`]/g, '').substring(0, 80) + '...' : '';        return `          <div class="search-result-item" data-id="${item.id}">            <i data-lucide="${item.icon || 'file-text'}" size="18" class="search-icon-grey"></i>            <div class="search-result-info">              <span class="search-result-label">${item.label}</span>              <span class="search-result-preview">${preview}</span>            </div>          </div>        `;      }).join('');            lucide.createIcons();
      document.querySelectorAll('.search-result-item').forEach(el => {        el.onclick = () => {          scrollToSection(el.dataset.id);          closeSearch();        };      });    }
    async function start() {      await loadScripts();      renderSkeletons();      try {        const response = await fetch(DATA_URL);        docsData = await response.json();      } catch (error) {        contentContainer.innerHTML = "<h1>Error</h1><p>Data load failed.</p>";        return;      }      renderSidebar();      renderAllContent();
      themeToggleBtn.onclick = () => {        const isDark = document.body.classList.contains('dark-mode');        const newTheme = isDark ? 'light' : 'dark';        document.body.className = `${newTheme}-mode`;        localStorage.setItem('theme', newTheme);        themeToggleBtn.innerHTML = `<i data-lucide="${newTheme === 'light' ? 'moon' : 'sun'}" size="20"></i>`;        lucide.createIcons();      };
      document.getElementById('search-trigger').onclick = openSearch;      searchOverlay.onclick = (e) => { if(e.target === searchOverlay) closeSearch(); };      searchInput.oninput = (e) => performSearch(e.target.value);            window.addEventListener('keydown', (e) => {        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {          e.preventDefault();          openSearch();        }        if (e.key === 'Escape') closeSearch();      });
      document.getElementById('burger-btn').onclick = () => toggleSidebar(true);      document.getElementById('sidebar-close').onclick = () => toggleSidebar(false);      overlay.onclick = () => toggleSidebar(false);
      mainScroll.onscroll = () => {        const sections = document.querySelectorAll('.doc-section');        let current = "";        sections.forEach(s => {          if (mainScroll.scrollTop >= s.offsetTop - 100) current = s.id.replace('section-', '');        });        if (current) setActive(current);      };
      llmBtn.onclick = async () => {        const original = llmBtn.innerHTML;        try {          const res = await fetch(LLM_COPY_URL);          if (!res.ok) throw new Error();          const text = await res.text();          await navigator.clipboard.writeText(text);          llmBtn.innerHTML = '<span>Copied!</span>';        } catch (err) {          llmBtn.innerHTML = '<span>Error</span>';        }        lucide.createIcons();        setTimeout(() => { llmBtn.innerHTML = original; lucide.createIcons(); }, 2000);      };
      setTimeout(() => {        document.querySelectorAll('.nav-group-items').forEach(el => {           el.style.maxHeight = el.scrollHeight + 'px';         });      }, 200);    }
    start();  }})();</script></html>
