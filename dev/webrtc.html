<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseNet v7.2 | Auto-Recovery Edition</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #09090b; --side: #121214; --accent: #00e5ff; --text: #fafafa;
            --dim: #71717a; --border: #27272a; --card: #1c1c1f; --danger: #ef4444;
            --success: #22c55e;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        aside { width: 320px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 25px; box-sizing: border-box; }
        .brand { font-weight: 700; font-size: 1.1rem; color: #fff; margin-bottom: 30px; letter-spacing: 1px; }
        .brand span { color: var(--accent); }
        .section-label { font-size: 10px; font-weight: 800; color: var(--dim); text-transform: uppercase; letter-spacing: 1.5px; margin: 20px 0 10px 0; }
        #active-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .node-item { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 8px; position: relative; }
        .node-id { font-family: 'Consolas', monospace; font-size: 11px; color: var(--accent); word-break: break-all; margin-bottom: 12px; display: block; opacity: 0.8; }
        .badge { font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: 600; background: #27272a; color: #a1a1aa; }
        .badge.on { background: rgba(0, 229, 255, 0.1); color: var(--accent); border: 1px solid rgba(0, 229, 255, 0.2); }
        .btn { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 6px; font-weight: 700; cursor: pointer; width: 100%; font-size: 13px; outline: none; transition: 0.2s; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        main { flex: 1; padding: 25px; display: flex; flex-direction: column; gap: 20px; background: #000; }
        #video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; flex: 1; overflow-y: auto; }
        .v-box { background: var(--side); border-radius: 12px; overflow: hidden; position: relative; aspect-ratio: 16/9; border: 1px solid var(--border); }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        .v-label { position: absolute; top: 12px; left: 12px; font-size: 10px; background: rgba(0,0,0,0.7); padding: 4px 8px; border-radius: 4px; color: #fff; }
        #chat-wrap { height: 250px; background: var(--side); border-radius: 12px; border: 1px solid var(--border); display: flex; flex-direction: column; }
        #chat-feed { flex: 1; padding: 15px; overflow-y: auto; font-size: 13px; }
        .chat-in { padding: 15px; display: flex; gap: 10px; border-top: 1px solid var(--border); }
        .chat-in input { flex: 1; background: #000; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 6px; }
        #notification-stack { position: fixed; bottom: 30px; right: 30px; width: 320px; z-index: 9999; display: flex; flex-direction: column; gap: 12px; }
        .toast { background: var(--card); border: 1px solid var(--border); padding: 18px; border-radius: 10px; animation: slideIn 0.3s forwards; border-left: 4px solid var(--accent); }
        .toast.error { border-left-color: var(--danger); }
        @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 10000; backdrop-filter: blur(5px); }
    </style>
</head>
<body>

<div id="id-setup-modal" class="modal-overlay">
    <div style="background:var(--card); padding:25px; border-radius:12px; width:420px; border:1px solid var(--border);">
        <div class="section-label">NODE IDENTITY SETUP</div>
        <p style="font-size:13px; color:var(--dim); margin-bottom:20px;">Kies een Node ID of genereer een willekeurige.</p>
        <input id="custom-id-input" type="text" placeholder="bijv. node_alpha_99" 
               style="width:100%; background:#000; border:1px solid var(--border); color:#fff; padding:12px; border-radius:6px; margin-bottom:15px; font-family: monospace;">
        <div style="display:flex; gap:12px;">
            <button class="btn" style="flex:1; background:#27272a; color:#fff;" onclick="useRandomId()">RANDOM ID</button>
            <button class="btn" style="flex:1" onclick="claimCustomId()">CLAIM ID</button>
        </div>
    </div>
</div>

<div id="dial-modal" class="modal-overlay">
    <div style="background:var(--card); padding:25px; border-radius:12px; width:320px; border:1px solid var(--border);">
        <div class="section-label">Session Setup</div>
        <input id="target-id" type="text" placeholder="Remote Node ID..." style="width:100%; background:#000; border:1px solid var(--border); color:#fff; padding:12px; border-radius:6px; margin-bottom:15px;">
        <button class="btn" onclick="startDial()">ESTABLISH LINK</button>
        <button class="btn" style="background:none; color:var(--dim); margin-top:5px" onclick="closeDial()">CANCEL</button>
    </div>
</div>

<div id="notification-stack"></div>

<aside>
    <div class="brand">PULSE<span>NET</span> 7.2</div>
    <div class="section-label">Status: <span id="status-indicator" style="color:var(--danger)">OFFLINE</span></div>
    <div id="my-id" class="node-id" style="background:#000; padding:12px; border:1px solid var(--border); text-align:center; cursor:pointer;" onclick="copyId()">...</div>
    <button id="dial-btn" class="btn" style="margin-top:10px" onclick="openDial()" disabled>INITIATE LINK</button>
    <div class="section-label">Active Uplinks</div>
    <div id="active-list"></div>
</aside>

<main>
    <div id="video-grid">
        <div class="v-box" id="local-box" style="display:none;">
            <video id="local-video" autoplay muted playsinline></video>
            <div class="v-label">LOCAL HOST</div>
        </div>
    </div>
    <div id="chat-wrap">
        <div id="chat-feed"></div>
        <div class="chat-in">
            <input id="msg-input" placeholder="Wachten op verbinding..." onkeypress="if(event.key==='Enter') sendMsg()" disabled>
            <button id="send-btn" class="btn" style="width:auto; padding:0 20px;" onclick="sendMsg()" disabled>SEND</button>
        </div>
    </div>
</main>

<script>
    class PulseCore {
        constructor() {
            this.peer = null;
            this.currentId = null;
            this.sessions = new Map();
            this.masterLocalStream = null;
            this.reconnectInterval = null;
        }

        init(id) {
            this.currentId = id;
            if (this.peer) { this.peer.destroy(); }

            this.peer = new Peer(id);

            this.peer.on('open', (newId) => {
                this.currentId = newId;
                document.getElementById('my-id').innerText = newId;
                document.getElementById('status-indicator').innerText = "ONLINE";
                document.getElementById('status-indicator').style.color = "var(--success)";
                document.getElementById('dial-btn').disabled = false;
                showToast("Node Connected", "success");
                
                // Stop herstelpogingen als we verbonden zijn
                clearInterval(this.reconnectInterval);
                this.reconnectInterval = null;

                this._setupListeners();
            });

            this.peer.on('error', (err) => {
                console.error("Peer Error:", err.type);
                if (err.type === 'unavailable-id') {
                    showToast("ID al in gebruik. Kies een andere.", "error");
                    document.getElementById('id-setup-modal').style.display = 'flex';
                } else if (err.type === 'disconnected' || err.type === 'network') {
                    this._handleLoss();
                }
            });

            this.peer.on('disconnected', () => this._handleLoss());
        }

        _handleLoss() {
            document.getElementById('status-indicator').innerText = "RECONNECTING...";
            document.getElementById('status-indicator').style.color = "orange";
            
            // Start herstelpoging elke 5 seconden als het nog niet loopt
            if (!this.reconnectInterval) {
                showToast("Verbinding verloren. Herstellen...", "error");
                this.reconnectInterval = setInterval(() => {
                    console.log("Poging tot herstel van ID:", this.currentId);
                    if (this.peer.disconnected) {
                        this.peer.reconnect();
                    } else {
                        this.init(this.currentId);
                    }
                }, 5000);
            }
        }

        _setupListeners() {
            this.peer.on('connection', conn => this._handleData(conn));
            this.peer.on('call', async call => {
                const stream = await this._getStream();
                call.answer(stream);
                this._handleMedia(call);
            });
        }

        async _getStream() {
            if (!this.masterLocalStream) {
                this.masterLocalStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
                document.getElementById('local-video').srcObject = this.masterLocalStream;
                document.getElementById('local-box').style.display = 'block';
            }
            return this.masterLocalStream;
        }

        dial(id) {
            const conn = this.peer.connect(id);
            this._handleData(conn, true);
        }

        _handleData(conn, isInitiator = false) {
            conn.on('open', async () => {
                this.sessions.set(conn.peer, { conn });
                this._syncUI();
                if (isInitiator) {
                    const stream = await this._getStream();
                    const call = this.peer.call(conn.peer, stream);
                    this._handleMedia(call);
                }
            });
            conn.on('data', data => logChat(conn.peer.substring(0,5), data));
            conn.on('close', () => { this.sessions.delete(conn.peer); this._syncUI(); });
        }

        _handleMedia(call) {
            call.on('stream', st => {
                let v = document.getElementById(`v-${call.peer}`);
                if (!v) {
                    const box = document.createElement('div');
                    box.className = 'v-box';
                    box.id = `wrap-${call.peer}`;
                    box.innerHTML = `<video id="v-${call.peer}" autoplay playsinline></video><div class="v-label">${call.peer}</div>`;
                    document.getElementById('video-grid').appendChild(box);
                    v = document.getElementById(`v-${call.peer}`);
                }
                v.srcObject = st;
            });
        }

        _syncUI() {
            const list = document.getElementById('active-list');
            list.innerHTML = '';
            this.sessions.forEach((s, pid) => {
                const item = document.createElement('div');
                item.className = 'node-item';
                item.innerHTML = `<div class="node-id">${pid}</div>`;
                list.appendChild(item);
            });
            const active = this.sessions.size > 0;
            document.getElementById('msg-input').disabled = !active;
            document.getElementById('send-btn').disabled = !active;
        }
    }

    const core = new PulseCore();

    function useRandomId() {
        document.getElementById('id-setup-modal').style.display = 'none';
        core.init(null);
    }

    function claimCustomId() {
        const val = document.getElementById('custom-id-input').value.trim();
        if (val.length < 3) return showToast("ID te kort", "error");
        document.getElementById('id-setup-modal').style.display = 'none';
        core.init(val);
    }

    function showToast(m, type = "info") {
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        t.innerText = m;
        document.getElementById('notification-stack').appendChild(t);
        setTimeout(() => t.remove(), 4000);
    }

    function startDial() {
        const id = document.getElementById('target-id').value.trim();
        if (id) core.dial(id);
        closeDial();
    }

    function sendMsg() {
        const input = document.getElementById('msg-input');
        core.sessions.forEach(s => s.conn.send(input.value));
        logChat('YOU', input.value);
        input.value = '';
    }

    function logChat(u, m) {
        const f = document.getElementById('chat-feed');
        f.innerHTML += `<div><b>${u}:</b> ${m}</div>`;
        f.scrollTop = f.scrollHeight;
    }

    function openDial() { document.getElementById('dial-modal').style.display = 'flex'; }
    function closeDial() { document.getElementById('dial-modal').style.display = 'none'; }
    function copyId() { navigator.clipboard.writeText(core.currentId); showToast("ID Gekopieerd", "success"); }

    window.onload = () => document.getElementById('id-setup-modal').style.display = 'flex';
</script>
</body>
</html>
