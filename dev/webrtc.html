<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseNet Pro • Real-Time Telemetry Edition</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #050506; --card: #0c0c0e; --accent: #22d3ee; 
            --danger: #f43f5e; --border: #1e1e22; --success: #10b981; 
            --warn: #fbbf24; --meta: #52525b;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'JetBrains Mono', monospace; }
        body { background: var(--bg); color: #e4e4e7; display: flex; height: 100vh; overflow: hidden; border: 1px solid var(--border); }

        /* Sidebar */
        aside { width: 340px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; z-index: 50; }
        .title { font-size: 18px; font-weight: 900; color: var(--accent); margin-bottom: 5px; }
        .version { font-size: 8px; color: var(--meta); margin-bottom: 20px; letter-spacing: 2px; }
        
        .id-box { background: #000; padding: 12px; border: 1px solid var(--border); border-radius: 4px; font-size: 10px; cursor: pointer; border-left: 3px solid var(--accent); margin-bottom: 20px; overflow: hidden; text-overflow: ellipsis; }
        
        /* Real-Time Telemetry Bars */
        .telemetry-unit { margin-bottom: 15px; background: #000; border: 1px solid var(--border); padding: 10px; }
        .tel-label { font-size: 8px; color: var(--meta); margin-bottom: 5px; display: flex; justify-content: space-between; text-transform: uppercase; }
        .tel-val { color: var(--accent); font-weight: bold; }
        .progress-bg { height: 4px; background: #1a1a1e; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.5s ease; }

        .btn { padding: 12px; background: var(--accent); color: #000; border: none; border-radius: 4px; font-weight: 800; cursor: pointer; width: 100%; font-size: 10px; text-transform: uppercase; margin-bottom: 8px; transition: 0.2s; }
        .btn:hover { filter: brightness(1.2); }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
        .btn-danger:hover { background: var(--danger); color: #000; }

        /* Main Area */
        main { flex: 1; display: flex; flex-direction: column; padding: 20px; gap: 15px; position: relative; }
        #video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; flex: 1; overflow-y: auto; }
        .v-box { background: #000; aspect-ratio: 16/9; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        .v-overlay { position: absolute; inset: 0; padding: 10px; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent 30%); }

        /* Terminal Chat */
        #term-wrap { height: 200px; background: #000; border: 1px solid var(--border); display: flex; flex-direction: column; border-radius: 4px; }
        #term-feed { flex: 1; padding: 12px; overflow-y: auto; font-size: 11px; line-height: 1.5; color: #a1a1aa; }
        .term-in { padding: 10px; display: flex; border-top: 1px solid var(--border); gap: 10px; }
        .term-in input { flex: 1; background: transparent; border: none; color: var(--accent); outline: none; font-size: 11px; }

        /* Modals & Toasts */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(5px); }
        .modal-card { background: var(--card); padding: 30px; border: 1px solid var(--border); width: 400px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .toast-stack { position: fixed; top: 20px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--card); border: 1px solid var(--border); padding: 15px; width: 300px; font-size: 11px; border-left: 4px solid var(--warn); }
    </style>
</head>
<body>

    <aside>
        <div class="title">PULSE_NET // PRO</div>
        <div class="version">LIVE_BITSTREAM_MONITOR</div>

        <div id="my-id" class="id-box" onclick="copyId()">INITIALIZING_PEER_JS...</div>

        <div class="telemetry-unit">
            <div class="tel-label"><span>Net_Latency (RTT)</span><span class="tel-val" id="val-rtt">0ms</span></div>
            <div class="progress-bg"><div class="progress-fill" id="bar-rtt"></div></div>
        </div>
        <div class="telemetry-unit">
            <div class="tel-label"><span>Packet_Loss</span><span class="tel-val" id="val-loss">0%</span></div>
            <div class="progress-bg"><div class="progress-fill" id="bar-loss" style="background:var(--danger)"></div></div>
        </div>
        <div class="telemetry-unit">
            <div class="tel-label"><span>Bitrate_Inbound</span><span class="tel-val" id="val-bitrate">0 kbps</span></div>
            <div class="progress-bg"><div class="progress-fill" id="bar-bitrate" style="background:var(--success)"></div></div>
        </div>

        <button onclick="openDial()" class="btn">Establish Handshake</button>
        <button onclick="location.reload()" class="btn btn-danger">Emergency Killswitch</button>

        <div style="font-size: 9px; color: var(--meta); margin-top: 15px; margin-bottom: 5px;">ACTIVE_DATA_NODES</div>
        <div id="node-list" style="flex:1; overflow-y:auto;"></div>
    </aside>

    <main>
        <div id="video-grid"></div>
        <div id="term-wrap">
            <div id="term-feed"></div>
            <div class="term-in">
                <span style="color:var(--accent)">>></span>
                <input id="msg-input" placeholder="No active data stream..." onkeypress="if(event.key==='Enter') uiSend()" disabled>
            </div>
        </div>
    </main>

    <div id="dial-modal" class="modal">
        <div class="modal-card">
            <h3 style="margin-bottom:20px; font-size:14px; color:var(--accent);">INITIATE_P2P_HANDSHAKE</h3>
            <input id="target-id" type="text" placeholder="Remote Peer ID..." style="width:100%; padding:12px; background:#000; border:1px solid var(--border); color:var(--accent); margin-bottom:20px; outline:none;">
            
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-bottom:20px;">
                <label style="font-size:9px;"><input type="checkbox" id="sw-vid" checked> VIDEO</label>
                <label style="font-size:9px;"><input type="checkbox" id="sw-aud" checked> AUDIO</label>
                <label style="font-size:9px;"><input type="checkbox" id="sw-txt" checked> DATA</label>
            </div>

            <button id="dial-exe" onclick="uiDial()" class="btn">Execute</button>
            <button onclick="closeDial()" class="btn btn-danger" style="margin:0;">Abort</button>
        </div>
    </div>

    <div id="toast-layer" class="toast-stack"></div>

    <script>
        class PulseNet {
            constructor() {
                this.peer = null;
                this.sessions = new Map();
                this.localStream = null;
                this.events = {};
                this.statsInterval = null;
                this.lastBytesReceived = 0;
            }

            on(e, cb) { if(!this.events[e]) this.events[e] = []; this.events[e].push(cb); }
            emit(e, d) { if(this.events[e]) this.events[e].forEach(cb => cb(d)); }

            start() {
                this.peer = new Peer({ debug: 1 });
                this.peer.on('open', id => this.emit('ready', id));
                this.peer.on('connection', c => this._setupData(c));
                this.peer.on('call', async call => {
                    const s = this.sessions.get(call.peer);
                    // Als we al een sessie hebben (door data verbinding), antwoord direct
                    const config = s ? s.config : { video: true, audio: true };
                    const st = await this._getHW(config);
                    call.answer(st);
                    this._setupMedia(call);
                    if(s) s.call = call;
                    else this.sessions.set(call.peer, { call, config });
                });
                
                this.statsInterval = setInterval(() => this.collectStats(), 2000);
            }

            async collectStats() {
                if (this.sessions.size === 0) return;
                this.sessions.forEach(async (session, id) => {
                    if (!session.call || !session.call.peerConnection) return;
                    const pc = session.call.peerConnection;
                    const stats = await pc.getStats();
                    stats.forEach(report => {
                        if (report.type === 'remote-candidate' && report.roundTripTime) {
                            this.emit('stat_rtt', Math.round(report.roundTripTime * 1000));
                        }
                        if (report.type === 'inbound-rtp' && report.kind === 'video') {
                            const bytes = report.bytesReceived;
                            const bitrate = Math.round(((bytes - this.lastBytesReceived) * 8) / 2000);
                            this.lastBytesReceived = bytes;
                            const loss = report.packetsLost || 0;
                            const total = report.packetsReceived || 1;
                            const lossPct = ((loss / (total + loss)) * 100).toFixed(1);
                            this.emit('stat_network', { bitrate, lossPct });
                        }
                    });
                });
            }

            async _getHW(conf) {
                if(!conf.video && !conf.audio) return null;
                if(!this.localStream) {
                    try {
                        this.localStream = await navigator.mediaDevices.getUserMedia({
                            video: conf.video ? { width: { ideal: 1280 }, frameRate: 30 } : false,
                            audio: conf.audio
                        });
                        this.emit('local_stream', this.localStream);
                    } catch(e) { 
                        this.emit('err', "Hardware access denied."); 
                        return null; 
                    }
                }
                return this.localStream;
            }

            dial(id, config) {
                const conn = this.peer.connect(id);
                this._setupData(conn, config, true);
                setTimeout(() => {
                    if (!this.sessions.has(id)) {
                        this.emit('rejected', { id, reason: 'TIMED_OUT' });
                        conn.close();
                    }
                }, 10000);
            }

            _setupData(conn, outConf = null, isInit = false) {
                conn.on('open', () => {
                    if(isInit) conn.send({ type: 'REQ', config: outConf });
                });

                conn.on('data', async data => {
                    const pid = conn.peer;
                    if(data.type === 'REQ') {
                        this.emit('invite', {
                            id: pid, config: data.config,
                            accept: async () => {
                                conn.send({ type: 'ACC', config: data.config });
                                this.sessions.set(pid, { conn, config: data.config });
                                this.emit('joined', pid);
                            },
                            reject: () => {
                                conn.send({ type: 'REJ', reason: 'USER_DECLINED' });
                                conn.close();
                            }
                        });
                    } else if(data.type === 'ACC') {
                        const st = await this._getHW(outConf);
                        const call = st ? this.peer.call(pid, st) : null;
                        if(call) this._setupMedia(call);
                        this.sessions.set(pid, { conn, call, config: outConf });
                        this.emit('joined', pid);
                    } else if(data.type === 'REJ') {
                        this.emit('rejected', {id: pid, reason: data.reason});
                        conn.close();
                    } else if(data.type === 'MSG') {
                        this.emit('msg', { id: pid, msg: data.content });
                    }
                });

                conn.on('close', () => this.terminate(conn.peer));
            }

            _setupMedia(call) {
                call.on('stream', st => this.emit('remote_stream', { id: call.peer, stream: st }));
            }

            terminate(id) {
                const s = this.sessions.get(id);
                if(!s) return;
                if(s.conn) s.conn.close(); 
                if(s.call) s.call.close();
                this.sessions.delete(id);
                this.emit('left', id);
            }

            broadcast(m) {
                this.sessions.forEach(s => {
                    if(s.conn && s.conn.open) s.conn.send({ type: 'MSG', content: m });
                });
            }
        }

        const net = new PulseNet();

        // UI Handlers
        net.on('ready', id => { document.getElementById('my-id').innerText = id; });

        net.on('stat_rtt', rtt => {
            document.getElementById('val-rtt').innerText = rtt + "ms";
            document.getElementById('bar-rtt').style.width = Math.min(rtt / 5, 100) + "%";
        });

        net.on('stat_network', data => {
            document.getElementById('val-bitrate').innerText = data.bitrate + " kbps";
            document.getElementById('bar-bitrate').style.width = Math.min(data.bitrate / 50, 100) + "%";
            document.getElementById('val-loss').innerText = data.lossPct + "%";
            document.getElementById('bar-loss').style.width = Math.min(data.lossPct * 10, 100) + "%";
        });

        net.on('invite', inv => {
            const t = document.createElement('div');
            t.className = 'toast';
            t.id = `inv-${inv.id}`;
            t.innerHTML = `
                <div style="color:var(--accent); font-weight:bold; margin-bottom:5px;">INCOMING_HANDSHAKE</div>
                <div style="font-size:10px;">ID: ${inv.id.substring(0,12)}...</div>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button class="btn" style="height:25px; margin:0; background:var(--success); color:#000" onclick="uiRespond('${inv.id}', true)">ACCEPT</button>
                    <button class="btn" style="height:25px; margin:0; background:var(--danger); color:#000" onclick="uiRespond('${inv.id}', false)">REJECT</button>
                </div>
            `;
            document.getElementById('toast-layer').appendChild(t);
            window.uiRespond = (id, acc) => { if(acc) inv.accept(); else inv.reject(); t.remove(); };
        });

        net.on('rejected', d => {
            closeDial();
            pushTerm('SYS_ERROR', `CONNECTION_FAILED: ${d.reason}`, 'var(--danger)');
        });

        net.on('joined', id => {
            closeDial();
            updateList();
            pushTerm('PEER_CONNECTED', `Node ${id.substring(0,8)} verified.`, 'var(--success)');
        });

        net.on('left', id => {
            updateList();
            const node = document.getElementById(`v-${id}`);
            if(node) node.remove();
            pushTerm('PEER_DISCONNECTED', `Carrier lost on node ${id.substring(0,8)}`, 'var(--danger)');
        });

        net.on('local_stream', st => renderVideo('HOST_LOCAL', st));
        net.on('remote_stream', d => renderVideo(d.id, d.stream));
        net.on('msg', d => pushTerm(d.id.substring(0,5), d.msg));

        function renderVideo(id, stream) {
            let b = document.getElementById(`v-${id}`);
            if(!b) {
                b = document.createElement('div'); b.id = `v-${id}`; b.className = 'v-box';
                // CRITICAL FIX: Mute local stream to prevent echo
                const isLocal = id === 'HOST_LOCAL';
                b.innerHTML = `<video autoplay playsinline ${isLocal ? 'muted' : ''} id="vid-${id}"></video>
                               <div class="v-overlay">
                                  <div style="font-size:8px; background:rgba(0,0,0,0.7); padding:2px 5px; border:1px solid var(--border); width:fit-content;">
                                      SOURCE::${isLocal ? 'LOCAL_KERNEL' : 'REMOTE_PEER'}
                                  </div>
                               </div>`;
                document.getElementById('video-grid').appendChild(b);
            }
            const v = document.getElementById(`vid-${id}`);
            if (v.srcObject !== stream) v.srcObject = stream;
        }

        function updateList() {
            const l = document.getElementById('node-list'); l.innerHTML = '';
            let hasData = false;
            net.sessions.forEach((s, id) => {
                if(s.config && s.config.txt) hasData = true;
                l.innerHTML += `<div style="font-size:10px; padding:10px; border:1px solid #222; margin-bottom:5px; display:flex; justify-content:space-between; background:#000;">
                    <span>● ${id.substring(0,12)}</span>
                    <span style="color:var(--danger); cursor:pointer;" onclick="net.terminate('${id}')">[X]</span>
                </div>`;
            });
            document.getElementById('msg-input').disabled = !hasData;
            document.getElementById('msg-input').placeholder = hasData ? "Broadcast packet..." : "No data channel available";
        }

        function pushTerm(tag, m, c = 'var(--accent)') {
            const f = document.getElementById('term-feed');
            const time = new Date().toLocaleTimeString([], {hour12:false});
            f.innerHTML += `<div><span style="color:#444">[${time}]</span> <b style="color:${c}">${tag}</b>: ${m}</div>`;
            f.scrollTop = f.scrollHeight;
        }

        function uiDial() {
            const tid = document.getElementById('target-id').value;
            if(!tid) return;
            document.getElementById('dial-exe').innerText = "HANDSHAKING...";
            document.getElementById('dial-exe').disabled = true;
            net.dial(tid, {
                video: document.getElementById('sw-vid').checked,
                audio: document.getElementById('sw-aud').checked,
                txt: document.getElementById('sw-txt').checked
            });
        }

        function uiSend() {
            const i = document.getElementById('msg-input');
            if(!i.value) return;
            net.broadcast(i.value);
            pushTerm('LOCAL_DATA', i.value, '#fff');
            i.value = '';
        }

        function copyId() {
            const id = document.getElementById('my-id').innerText;
            if(id.includes('INITIALIZING')) return;
            navigator.clipboard.writeText(id);
            pushTerm('CLIPBOARD', 'Local PeerID copied to memory buffer.', 'var(--warn)');
        }

        function openDial() { 
            document.getElementById('dial-modal').style.display = 'flex'; 
            document.getElementById('dial-exe').innerText = "Execute";
            document.getElementById('dial-exe').disabled = false;
        }
        function closeDial() { document.getElementById('dial-modal').style.display = 'none'; }

        window.onload = () => net.start();
    </script>
</body>
</html>
