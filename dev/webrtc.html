<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseNet • Simpel</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #111111;
            --text: #ffffff;
            --accent: #00ffff;
            --gray: #222222;
            --danger: #ff4444;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        aside {
            width: 260px;
            background: #1a1a1a;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 15px;
        }
        .title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }
        .id-box {
            background: #222;
            padding: 14px;
            border: 2px solid #444;
            border-radius: 8px;
            font-family: monospace;
            font-size: 15px;
            word-break: break-all;
            cursor: pointer;
            margin-bottom: 15px;
            text-align: center;
        }
        .id-box:hover { border-color: var(--accent); }
        .btn {
            padding: 12px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 8px;
        }
        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 2px solid var(--danger);
        }
        .section {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin: 15px 0 8px;
        }
        #active-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .node-item {
            background: #222;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
        }
        .badge {
            font-size: 10px;
            padding: 2px 6px;
            background: #333;
            border-radius: 3px;
            margin-right: 4px;
        }
        .badge.on { background: #00ffff; color: #000; }

        #video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            flex: 1;
            overflow-y: auto;
        }
        .v-box {
            background: #000;
            aspect-ratio: 16/9;
            border: 2px solid #333;
            position: relative;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .v-label {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 4px;
        }

        #chat-wrap {
            height: 200px;
            background: #1a1a1a;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
        }
        #chat-feed {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            font-size: 14px;
        }
        .chat-in {
            padding: 10px;
            display: flex;
            gap: 8px;
            border-top: 1px solid #333;
        }
        .chat-in input {
            flex: 1;
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 10px;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .modal-content {
            background: #222;
            width: 100%;
            max-width: 380px;
            padding: 25px;
            border: 2px solid #444;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #222;
            color: white;
            padding: 14px 20px;
            border-left: 5px solid var(--accent);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 10000;
            max-width: 320px;
        }
        .toast.error { border-left-color: var(--danger); }
    </style>
</head>
<body>

    <aside>
        <div class="title">PULSE<span style="color:#00ffff">NET</span></div>
        
        <div style="margin-bottom:10px;">Jouw ID</div>
        <div id="my-id" class="id-box" onclick="copyId()">WACHTEN...</div>
        
        <button onclick="forceReclaim()" class="btn">🔄 RECLAIM ID</button>
        <button onclick="switchToRandom()" class="btn" style="background:#444;color:white;">NIEUWE RANDOM ID</button>

        <div class="section">Actieve verbindingen</div>
        <div id="active-list"></div>
    </aside>

    <main>
        <div id="video-grid"></div>

        <div id="chat-wrap">
            <div id="chat-feed"></div>
            <div class="chat-in">
                <input id="msg-input" placeholder="Bericht versturen..." onkeypress="if(event.key==='Enter') sendMsg()" disabled>
                <button onclick="sendMsg()" class="btn" style="width:80px">SEND</button>
            </div>
        </div>
    </main>

    <!-- ID SETUP MODAL (super simpel) -->
    <div id="id-setup-modal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:15px;">Kies je Node ID</h2>
            <p style="font-size:14px;color:#aaa;margin-bottom:20px;">Of gebruik random. PulseNet probeert automatisch je ID terug te nemen als hij verloren gaat.</p>
            
            <input id="custom-id-input" type="text" placeholder="bijv. mijnhuis42" 
                   style="width:100%;padding:14px;background:#111;border:2px solid #555;color:white;font-family:monospace;font-size:16px;margin-bottom:20px;">
            
            <div style="display:flex;gap:10px;">
                <button onclick="useRandomId()" class="btn" style="flex:1;background:#444;color:white;">RANDOM ID</button>
                <button onclick="claimCustomId()" class="btn" style="flex:1;">CLAIM</button>
            </div>
            
            <div style="margin-top:20px;font-size:12px;color:#666;text-align:center;">
                4-20 tekens • a-z 0-9 _ -
            </div>
        </div>
    </div>

    <!-- DIAL MODAL (simpel) -->
    <div id="dial-modal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:15px;">Nieuwe link starten</h2>
            <input id="target-id" type="text" placeholder="Andere Node ID" 
                   style="width:100%;padding:14px;background:#111;border:2px solid #555;color:white;font-family:monospace;font-size:16px;margin-bottom:20px;">
            
            <label style="display:block;margin:8px 0;"><input type="checkbox" id="sw-video" checked> Video</label>
            <label style="display:block;margin:8px 0;"><input type="checkbox" id="sw-audio" checked> Audio</label>
            <label style="display:block;margin:8px 0;"><input type="checkbox" id="sw-chat" checked> Chat</label>
            
            <button onclick="startDial()" class="btn" style="margin-top:15px;width:100%;">START LINK</button>
            <button onclick="closeDial()" style="margin-top:8px;width:100%;background:transparent;color:#888;border:none;">Annuleren</button>
        </div>
    </div>

    <div id="notification-stack"></div>

    <script>
        class PulseCore {
            constructor() {
                this.peer = null;
                this.sessions = new Map();
                this.masterLocalStream = null;
                this.pendingCalls = new Map();
                this.preferredId = null;
                this.reconnectAttempts = 0;
                this.maxReconnects = 20;        // veel meer pogingen
                this.isReclaiming = false;
            }

            init(desiredId = null) {
                return new Promise((resolve, reject) => {
                    if (desiredId) this.preferredId = desiredId;
                    const idToUse = this.preferredId || undefined;

                    // Oude peer altijd eerst volledig destroyen
                    if (this.peer) {
                        this.peer.destroy();
                        this.peer = null;
                    }

                    this.peer = new Peer(idToUse);

                    this._attachListeners();

                    this.peer.on('open', (id) => {
                        this.reconnectAttempts = 0;
                        this.isReclaiming = false;
                        
                        document.getElementById('my-id').innerHTML = `
                            <strong>${id}</strong> 
                            <span style="background:#00ffff;color:#000;padding:2px 8px;border-radius:4px;font-size:12px;">LIVE</span>
                        `;
                        document.getElementById('my-id').style.borderColor = '#00ffff';
                        
                        showToast(`✅ ID <b>${id}</b> actief`, "success");
                        this._syncUI();
                        resolve(id);
                    });

                    this.peer.on('error', (err) => {
                        if (err.type === 'unavailable-id' && this.preferredId) {
                            this.reconnectAttempts++;
                            this.isReclaiming = true;

                            if (this.reconnectAttempts > this.maxReconnects) {
                                showToast("Oude sessie blijft blokkeren.<br>Automatisch overschakelen naar random ID...", "error");
                                this.preferredId = null;
                                setTimeout(() => this.init(), 1000);
                                return;
                            }

                            // LANGERE WACHTTIJD zodat oude instantie écht kan doodgaan
                            const delay = 6500 + Math.random() * 3500;
                            showToast(`🔄 ID <b>${this.preferredId}</b> nog bezet door oude instantie...<br>Wachten ${Math.round(delay/1000)} seconden (poging ${this.reconnectAttempts}/${this.maxReconnects})`, "error");

                            setTimeout(() => {
                                if (this.peer) this.peer.destroy();
                                this.init(this.preferredId).catch(() => {});
                            }, delay);
                            return;
                        }

                        if (err.type === 'disconnected' || err.type === 'server-error') {
                            this.handleLostConnection();
                        } else {
                            showToast(`Fout: ${err.type}`, "error");
                        }
                        reject(err);
                    });
                });
            }

            _attachListeners() {
                this.peer.on('connection', conn => this._handleData(conn));
                this.peer.on('call', async call => {
                    const pid = call.peer;
                    const s = this.sessions.get(pid);
                    if (s) await this._answerCall(call, s.config);
                    else {
                        this.pendingCalls.set(pid, call);
                        setTimeout(() => {
                            if (this.pendingCalls.has(pid)) {
                                this.pendingCalls.get(pid).answer();
                                this.pendingCalls.delete(pid);
                            }
                        }, 8000);
                    }
                });

                this.peer.on('disconnected', () => this.handleLostConnection());
                this.peer.on('close', () => this.handleLostConnection());

                // Heartbeat
                setInterval(() => {
                    const now = Date.now();
                    this.sessions.forEach((s, pid) => {
                        if (now - s.lastSeen > 20000) this.terminate(pid, true, "Verbinding verloren");
                    });
                }, 5000);
            }

            handleLostConnection() {
                if (this.isReclaiming) return;
                this.isReclaiming = true;
                showToast(this.preferredId ? `🔥 ID ${this.preferredId} verloren → reclaim...` : "Verbinding verloren", "error");
                if (this.peer) this.peer.destroy();
                setTimeout(() => this.init(this.preferredId), 1200);
            }

            async _reconcileLocalStream(needsVideo, needsAudio) {
                if (this.masterLocalStream) {
                    const hasV = !!this.masterLocalStream.getVideoTracks().length;
                    const hasA = !!this.masterLocalStream.getAudioTracks().length;
                    if (hasV === needsVideo && hasA === needsAudio) return this.masterLocalStream;
                }
                this._stopHardware();
                if (!needsVideo && !needsAudio) return null;

                try {
                    this.masterLocalStream = await navigator.mediaDevices.getUserMedia({
                        video: needsVideo ? { width: 1280, height: 720 } : false,
                        audio: needsAudio
                    });
                    let box = document.getElementById('local-box');
                    if (!box) {
                        box = document.createElement('div');
                        box.className = 'v-box';
                        box.id = 'local-box';
                        box.innerHTML = `<video id="local-video" autoplay muted playsinline></video><div class="v-label">JIJ</div>`;
                        document.getElementById('video-grid').appendChild(box);
                    }
                    document.getElementById('local-video').srcObject = this.masterLocalStream;
                    return this.masterLocalStream;
                } catch(e) {
                    showToast("Camera/microfoon niet toegestaan", "error");
                    return null;
                }
            }

            _stopHardware() {
                if (this.masterLocalStream) {
                    this.masterLocalStream.getTracks().forEach(t => t.stop());
                    this.masterLocalStream = null;
                }
                const lb = document.getElementById('local-box');
                if (lb) lb.remove();
            }

            async _getOutgoingStream(config) {
                const anyVideo = Array.from(this.sessions.values()).some(s => s.config.video) || config.video;
                const anyAudio = Array.from(this.sessions.values()).some(s => s.config.audio) || config.audio;
                await this._reconcileLocalStream(anyVideo, anyAudio);
                if (!this.masterLocalStream) return null;
                const out = new MediaStream();
                if (config.video) this.masterLocalStream.getVideoTracks().forEach(t => out.addTrack(t));
                if (config.audio) this.masterLocalStream.getAudioTracks().forEach(t => out.addTrack(t));
                return out;
            }

            async _answerCall(call, config) {
                const stream = await this._getOutgoingStream(config);
                call.answer(stream || undefined);
                this._handleMedia(call);
                const s = this.sessions.get(call.peer);
                if (s) s.call = call;
            }

            dial(id, config) {
                if (this.peer.id === id) return showToast("Niet naar jezelf bellen", "error");
                if (this.sessions.has(id)) return;
                const conn = this.peer.connect(id);
                this._handleData(conn, config, true);
            }

            _handleData(conn, config, isInit = false) {
                conn.on('open', () => {
                    if (isInit) conn.send({ type: 'REQ', config });
                });
                conn.on('data', async data => {
                    const pid = conn.peer;
                    if (this.sessions.has(pid)) this.sessions.get(pid).lastSeen = Date.now();

                    if (data.type === 'REQ') this._showInvite(pid, data.config, conn);
                    else if (data.type === 'ACCEPT') {
                        showToast("Link gemaakt", "success");
                        const stream = await this._getOutgoingStream(config);
                        const call = stream ? this.peer.call(pid, stream) : null;
                        if (call) this._handleMedia(call);
                        this.sessions.set(pid, { conn, call, config, lastSeen: Date.now() });
                        this._syncUI();
                    } else if (data.type === 'REJECT') {
                        showToast("Link geweigerd", "error");
                        conn.close();
                    } else if (data.type === 'BYE') {
                        this.terminate(pid, true);
                    } else if (typeof data === 'string') {
                        logChat(pid.substring(0,8), data);
                    }
                });
                conn.on('close', () => this.terminate(conn.peer, true));
            }

            _handleMedia(call) {
                call.on('stream', st => {
                    let box = document.getElementById(`wrap-${call.peer}`);
                    if (!box) {
                        box = document.createElement('div');
                        box.className = 'v-box';
                        box.id = `wrap-${call.peer}`;
                        box.innerHTML = `<video id="v-${call.peer}" autoplay playsinline></video><div class="v-label">${call.peer.substring(0,8)}</div>`;
                        document.getElementById('video-grid').appendChild(box);
                    }
                    document.getElementById(`v-${call.peer}`).srcObject = st;
                });
            }

            terminate(pid, remote, reason) {
                const s = this.sessions.get(pid);
                if (!s) return;
                if (!remote && s.conn.open) s.conn.send({ type: 'BYE' });
                s.conn.close();
                if (s.call) s.call.close();
                this.sessions.delete(pid);
                document.getElementById(`wrap-${pid}`)?.remove();
                this._reconcileLocalStream(
                    Array.from(this.sessions.values()).some(x => x.config.video),
                    Array.from(this.sessions.values()).some(x => x.config.audio)
                );
                this._syncUI();
            }

            _showInvite(pid, config, conn) {
                const t = document.createElement('div');
                t.className = 'toast';
                t.innerHTML = `
                    <div>INCOMING LINK<br>
                    <span class="badge ${config.video?'on':''}">VID</span>
                    <span class="badge ${config.audio?'on':''}">AUD</span>
                    <span class="badge ${config.chat?'on':''}">TXT</span></div>
                    <div style="margin-top:12px;display:flex;gap:8px;">
                        <button onclick="acceptInvite('${pid}')" class="btn" style="padding:8px 16px">ACCEPTEREN</button>
                        <button onclick="rejectInvite('${pid}')" class="btn btn-danger" style="padding:8px 16px">WEIGEREN</button>
                    </div>`;
                document.getElementById('notification-stack').appendChild(t);
                setTimeout(() => t.remove(), 20000);
                window.acceptInvite = (p) => {
                    conn.send({ type: 'ACCEPT' });
                    this.sessions.set(p, { conn, config, lastSeen: Date.now() });
                    this._syncUI();
                    t.remove();
                };
                window.rejectInvite = (p) => {
                    conn.send({ type: 'REJECT' });
                    conn.close();
                    t.remove();
                };
            }

            _syncUI() {
                const list = document.getElementById('active-list');
                list.innerHTML = '';
                let chatOn = false;
                this.sessions.forEach((s, pid) => {
                    if (s.config.chat) chatOn = true;
                    const div = document.createElement('div');
                    div.className = 'node-item';
                    div.innerHTML = `
                        <div style="font-family:monospace;font-size:13px;">${pid}</div>
                        <div style="margin:6px 0;">
                            <span class="badge ${s.config.video?'on':''}">VID</span>
                            <span class="badge ${s.config.audio?'on':''}">AUD</span>
                            <span class="badge ${s.config.chat?'on':''}">TXT</span>
                        </div>
                        <button onclick="core.terminate('${pid}',false)" class="btn-danger" style="width:100%;padding:6px;font-size:12px;">VERBREKEN</button>`;
                    list.appendChild(div);
                });
                document.getElementById('msg-input').disabled = !chatOn;
            }
        }

        let core = new PulseCore();

        function useRandomId() {
            document.getElementById('id-setup-modal').style.display = 'none';
            core.preferredId = null;
            core.init();
        }
        function claimCustomId() {
            const val = document.getElementById('custom-id-input').value.trim();
            if (!/^[a-zA-Z0-9_-]{4,20}$/.test(val)) return showToast("Ongeldige ID", "error");
            document.getElementById('id-setup-modal').style.display = 'none';
            core.init(val);
        }
        function showToast(msg, type = "success") {
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.innerHTML = msg;
            document.getElementById('notification-stack').appendChild(t);
            setTimeout(() => t.remove(), 4500);
        }
        function startDial() {
            const id = document.getElementById('target-id').value.trim();
            if (!id) return;
            core.dial(id, {
                video: document.getElementById('sw-video').checked,
                audio: document.getElementById('sw-audio').checked,
                chat: document.getElementById('sw-chat').checked
            });
            closeDial();
        }
        function sendMsg() {
            const input = document.getElementById('msg-input');
            const txt = input.value.trim();
            if (!txt) return;
            core.sessions.forEach(s => {
                if (s.config.chat && s.conn.open) s.conn.send(txt);
            });
            logChat('JIJ', txt);
            input.value = '';
        }
        function logChat(user, msg) {
            const feed = document.getElementById('chat-feed');
            const d = document.createElement('div');
            d.innerHTML = `<b>${user}:</b> ${msg}`;
            feed.appendChild(d);
            feed.scrollTop = feed.scrollHeight;
        }
        function openDial() {
            document.getElementById('dial-modal').style.display = 'flex';
        }
        function closeDial() {
            document.getElementById('dial-modal').style.display = 'none';
        }
        function copyId() {
            const id = document.getElementById('my-id').innerText.split(' ')[0];
            navigator.clipboard.writeText(id);
            showToast("ID gekopieerd");
        }
        function forceReclaim() {
            if (!core.preferredId) {
                showToast("Je hebt geen custom ID om terug te claimen", "error");
                return;
            }
            showToast("Force reclaim gestart...", "success");
            if (core.peer) core.peer.destroy();
            core.reconnectAttempts = 0;
            core.init(core.preferredId);
        }
        function switchToRandom() {
            if (confirm("Echt overschakelen naar een nieuwe random ID?")) {
                core.preferredId = null;
                if (core.peer) core.peer.destroy();
                core.init();
            }
        }

        // START
        window.onload = () => {
            document.getElementById('id-setup-modal').style.display = 'flex';
            
            // Zorg dat oude tab altijd netjes afsluit
            window.addEventListener('beforeunload', () => {
                if (core.peer) core.peer.destroy();
            });
            
            // Extra knop in sidebar voor dial (simpel)
            const aside = document.querySelector('aside');
            const dialBtn = document.createElement('button');
            dialBtn.className = 'btn';
            dialBtn.textContent = '✦ NIEUWE LINK';
            dialBtn.style.marginTop = 'auto';
            dialBtn.onclick = openDial;
            aside.appendChild(dialBtn);
        };
    </script>
</body>
</html>
