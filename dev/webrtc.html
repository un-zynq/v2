<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseNet Pro • Ultra Edition</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #050506; --card: #0c0c0e; --accent: #22d3ee; 
            --danger: #f43f5e; --border: #1e1e22; --success: #10b981; 
            --warn: #fbbf24; --meta: #52525b;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'JetBrains Mono', monospace; }
        body { background: var(--bg); color: #e4e4e7; display: flex; height: 100vh; overflow: hidden; border: 1px solid var(--border); }
        aside { width: 320px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; z-index: 50; }
        .title { font-size: 16px; font-weight: 900; color: var(--accent); margin-bottom: 5px; letter-spacing: 1px; }
        .version { font-size: 8px; color: var(--meta); margin-bottom: 20px; letter-spacing: 2px; }
        .id-box { background: #000; padding: 12px; border: 1px solid var(--border); border-radius: 4px; font-size: 10px; cursor: pointer; border-left: 3px solid var(--accent); margin-bottom: 20px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .telemetry-unit { margin-bottom: 15px; background: #000; border: 1px solid var(--border); padding: 10px; }
        .tel-label { font-size: 8px; color: var(--meta); margin-bottom: 5px; display: flex; justify-content: space-between; text-transform: uppercase; }
        .tel-val { color: var(--success); font-weight: bold; }
        .progress-bg { height: 4px; background: #1a1a1e; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--success); width: 0%; transition: width 0.3s ease; }
        .btn { padding: 12px; background: var(--accent); color: #000; border: none; border-radius: 4px; font-weight: 800; cursor: pointer; width: 100%; font-size: 10px; text-transform: uppercase; margin-bottom: 8px; transition: 0.2s; }
        .btn:hover { filter: brightness(1.2); }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
        .btn-danger:hover { background: var(--danger); color: #000; }
        main { flex: 1; display: flex; flex-direction: column; padding: 20px; gap: 15px; background: radial-gradient(circle at center, #0a0a0c 0%, #050506 100%); }
        #video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; flex: 1; overflow-y: auto; }
        .v-box { background: #000; aspect-ratio: 16/9; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .v-overlay { position: absolute; inset: 0; padding: 10px; pointer-events: none; background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent 40%); }
        #term-wrap { height: 180px; background: #000; border: 1px solid var(--border); display: flex; flex-direction: column; border-radius: 4px; }
        #term-feed { flex: 1; padding: 12px; overflow-y: auto; font-size: 10px; color: #a1a1aa; scroll-behavior: smooth; }
        .term-in { padding: 10px; display: flex; border-top: 1px solid var(--border); gap: 10px; background: #08080a; }
        .term-in input { flex: 1; background: transparent; border: none; color: var(--accent); outline: none; font-size: 11px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-card { background: var(--card); padding: 25px; border: 1px solid var(--border); width: 380px; border-top: 4px solid var(--accent); }
        .toast-stack { position: fixed; top: 20px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--card); border: 1px solid var(--border); padding: 15px; width: 280px; font-size: 10px; border-left: 4px solid var(--warn); box-shadow: 0 10px 25px rgba(0,0,0,0.5); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        select, input[type="text"] { width:100%; padding:10px; background:#000; border:1px solid var(--border); color:var(--accent); font-size:10px; outline:none; margin-bottom:10px; }
        .label-sm { font-size: 8px; color: var(--meta); margin-bottom: 4px; display: block; text-transform: uppercase; }
    </style>
</head>
<body>
    <aside>
        <div class="title">PULSE_NET // PRO</div>
        <div class="version">CORE_V2.1_STRICT_RESOURCE_CTRL</div>
        <div id="my-id" class="id-box" onclick="copyId()">INITIALIZING...</div>
        <div class="telemetry-unit">
            <div class="tel-label"><span>Active_Bitrate</span><span class="tel-val" id="val-bitrate">0 kbps</span></div>
            <div class="progress-bg"><div class="progress-fill" id="bar-bitrate"></div></div>
        </div>
        <button onclick="openDial()" class="btn">New Handshake</button>
        <button onclick="location.reload()" class="btn btn-danger">Emergency Killswitch</button>
        <div style="font-size: 9px; color: var(--meta); margin: 15px 0 5px 0;">ACTIVE_NODES</div>
        <div id="node-list" style="flex:1; overflow-y:auto;"></div>
    </aside>

    <main>
        <div id="video-grid"></div>
        <div id="term-wrap">
            <div id="term-feed"></div>
            <div class="term-in">
                <span style="color:var(--accent)">>></span>
                <input id="msg-input" placeholder="No active data channel..." onkeypress="if(event.key==='Enter') uiSend()" disabled>
            </div>
        </div>
    </main>

    <div id="dial-modal" class="modal">
        <div class="modal-card">
            <h3 style="margin-bottom:15px; font-size:11px; color:var(--accent);">INITIATE_P2P_LINK</h3>
            <span class="label-sm">Target ID</span>
            <input id="target-id" type="text" spellcheck="false" placeholder="0000-0000-0000...">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div>
                    <span class="label-sm">Resolution</span>
                    <select id="cfg-res"><option value="720">720p</option><option value="1080">1080p</option><option value="480">480p</option></select>
                </div>
                <div>
                    <span class="label-sm">Framerate</span>
                    <select id="cfg-fps"><option value="30">30 FPS</option><option value="60">60 FPS</option><option value="15">15 FPS</option></select>
                </div>
            </div>
            <span class="label-sm">Permissions</span>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-bottom:20px;">
                <label style="font-size:9px;"><input type="checkbox" id="sw-vid" checked> VIDEO</label>
                <label style="font-size:9px;"><input type="checkbox" id="sw-aud" checked> AUDIO</label>
                <label style="font-size:9px;"><input type="checkbox" id="sw-txt" checked> DATA</label>
            </div>
            <button id="dial-exe" onclick="uiDial()" class="btn">Connect</button>
            <button onclick="closeDial()" class="btn btn-danger" style="margin:0;">Cancel</button>
        </div>
    </div>

    <div id="toast-layer" class="toast-stack"></div>

    <script>
        class PulseNet {
            constructor() {
                this.peer = null;
                this.sessions = new Map();
                this.localStream = null;
                this.lastBytes = 0;
                this.events = {};
            }

            on(e, cb) { if(!this.events[e]) this.events[e] = []; this.events[e].push(cb); }
            emit(e, d) { if(this.events[e]) this.events[e].forEach(cb => cb(d)); }

            start() {
                this.peer = new Peer({ debug: 1 });
                this.peer.on('open', id => this.emit('ready', id));
                this.peer.on('connection', c => this._setupData(c));
                this.peer.on('call', async call => {
                    const session = this.sessions.get(call.peer);
                    const config = session ? session.config : { video: true, audio: true, res: 720, fps: 30 };
                    
                    const stream = await this._getHardware(config);
                    call.answer(stream);
                    this._setupMedia(call);
                    if(session) session.call = call;
                });
                
                setInterval(() => this._monitor(), 2000);
            }

            async _getHardware(conf) {
                // Alleen camera/mic starten als dat strikt nodig is
                if (!conf.video && !conf.audio) return null;
                if (this.localStream) return this.localStream; 
                
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: conf.video ? { width: { ideal: parseInt(conf.res) === 1080 ? 1920 : 1280 }, frameRate: { ideal: parseInt(conf.fps) } } : false,
                        audio: conf.audio
                    });
                    this.localStream = stream;
                    this.emit('local_stream', stream);
                    return stream;
                } catch(e) {
                    this.emit('err', "Hardware Access Denied");
                    return null;
                }
            }

            _stopHardware() {
                if (this.localStream && this.sessions.size === 0) {
                    this.localStream.getTracks().forEach(track => track.stop());
                    this.localStream = null;
                    this.emit('local_stream_stop');
                }
            }

            dial(id, config) {
                const conn = this.peer.connect(id);
                this._setupData(conn, config, true);
            }

            _setupData(conn, outConf = null, isInit = false) {
                conn.on('open', () => {
                    if(isInit) conn.send({ type: 'REQ', config: outConf });
                });

                conn.on('data', async data => {
                    const pid = conn.peer;
                    let s = this.sessions.get(pid);
                    if(s) s.lastSeen = Date.now();

                    switch(data.type) {
                        case 'REQ':
                            this.emit('invite', {
                                id: pid, config: data.config,
                                accept: async () => {
                                    conn.send({ type: 'ACC', config: data.config });
                                    this.sessions.set(pid, { conn, config: data.config, lastSeen: Date.now() });
                                    this.emit('joined', pid);
                                },
                                reject: () => { conn.send({ type: 'REJ' }); conn.close(); }
                            });
                            break;
                        case 'ACC':
                            const st = await this._getHardware(outConf);
                            const call = st ? this.peer.call(pid, st) : null;
                            if(call) this._setupMedia(call);
                            this.sessions.set(pid, { conn, call, config: outConf, lastSeen: Date.now() });
                            this.emit('joined', pid);
                            break;
                        case 'REJ': this.emit('rejected', pid); conn.close(); break;
                        case 'MSG': this.emit('msg', { id: pid, msg: data.content }); break;
                        case 'PING': conn.send({ type: 'PONG' }); break;
                    }
                });

                conn.on('close', () => this.terminate(conn.peer));
                conn.on('error', () => this.terminate(conn.peer));
            }

            _setupMedia(call) {
                call.on('stream', st => this.emit('remote_stream', { id: call.peer, stream: st }));
                call.on('close', () => this.terminate(call.peer));
            }

            terminate(id) {
                const s = this.sessions.get(id);
                if(!s) return;
                if(s.conn) s.conn.close();
                if(s.call) s.call.close();
                this.sessions.delete(id);
                this.emit('left', id);
                this._stopHardware(); // Stop camera als niemand meer kijkt
            }

            _monitor() {
                const now = Date.now();
                this.sessions.forEach((s, id) => {
                    if (now - s.lastSeen > 12000) return this.terminate(id);
                    if (s.conn.open) s.conn.send({ type: 'PING' });
                    
                    if (s.call && s.call.peerConnection) {
                        s.call.peerConnection.getStats().then(stats => {
                            stats.forEach(r => {
                                if (r.type === 'inbound-rtp' && r.kind === 'video') {
                                    const bit = Math.round(((r.bytesReceived - this.lastBytes) * 8) / 2000);
                                    this.lastBytes = r.bytesReceived;
                                    this.emit('stat_bitrate', bit);
                                }
                            });
                        });
                    }
                });
            }

            broadcast(m) {
                this.sessions.forEach(s => { if(s.conn.open) s.conn.send({ type: 'MSG', content: m }); });
            }
        }

        const net = new PulseNet();

        // UI Logic
        net.on('ready', id => { document.getElementById('my-id').innerText = id; });
        net.on('stat_bitrate', b => {
            document.getElementById('val-bitrate').innerText = b + " kbps";
            document.getElementById('bar-bitrate').style.width = Math.min(b/40, 100) + "%";
        });

        net.on('invite', inv => {
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerHTML = `<b>HANDSHAKE REQ</b><br><span style="color:gray">${inv.id.substring(0,8)}</span>
            <div style="margin-top:10px; display:flex; gap:5px;">
                <button class="btn" style="background:var(--success); padding:5px" onclick="this.parentElement.parentElement.remove(); uiAccept('${inv.id}')">ACCEPT</button>
                <button class="btn" style="background:var(--danger); padding:5px" onclick="this.parentElement.parentElement.remove(); uiReject('${inv.id}')">DECLINE</button>
            </div>`;
            document.getElementById('toast-layer').appendChild(t);
            window.uiAccept = () => inv.accept();
            window.uiReject = () => inv.reject();
        });

        net.on('joined', id => { closeDial(); updateUI(); pushTerm('LINK_ESTABLISHED', id, 'var(--success)'); });
        net.on('left', id => { 
            const el = document.getElementById(`v-${id}`);
            if(el) el.remove();
            updateUI(); 
            pushTerm('LINK_TERMINATED', id, 'var(--danger)'); 
        });

        net.on('local_stream', st => renderVid('LOCAL', st));
        net.on('local_stream_stop', () => { if(document.getElementById('v-LOCAL')) document.getElementById('v-LOCAL').remove(); });
        net.on('remote_stream', d => renderVid(d.id, d.stream));
        net.on('msg', d => pushTerm(d.id.substring(0,5), d.msg));

        function renderVid(id, stream) {
            let b = document.getElementById(`v-${id}`);
            if(!b) {
                b = document.createElement('div'); b.id = `v-${id}`; b.className = 'v-box';
                b.innerHTML = `<video autoplay playsinline ${id==='LOCAL'?'muted':''}></video><div class="v-overlay"><span style="font-size:8px; background:#000; padding:2px 4px; border:1px solid var(--border)">${id}</span></div>`;
                document.getElementById('video-grid').appendChild(b);
            }
            b.querySelector('video').srcObject = stream;
        }

        function updateUI() {
            const l = document.getElementById('node-list'); l.innerHTML = '';
            let canChat = false;
            net.sessions.forEach((s, id) => {
                if(s.config.txt) canChat = true;
                l.innerHTML += `<div style="font-size:10px; padding:8px; border:1px solid #111; margin-bottom:4px; display:flex; justify-content:space-between; background:#000;">
                    <span>${id.substring(0,8)}</span><span style="color:var(--danger); cursor:pointer" onclick="net.terminate('${id}')">DROP</span>
                </div>`;
            });
            document.getElementById('msg-input').disabled = !canChat;
        }

        function pushTerm(tag, m, c = 'var(--accent)') {
            const f = document.getElementById('term-feed');
            f.innerHTML += `<div><span style="color:#333">[${new Date().toLocaleTimeString()}]</span> <b style="color:${c}">${tag}</b>: ${m}</div>`;
            f.scrollTop = f.scrollHeight;
        }

        function uiDial() {
            const id = document.getElementById('target-id').value;
            if(!id) return;
            net.dial(id, {
                video: document.getElementById('sw-vid').checked,
                audio: document.getElementById('sw-aud').checked,
                txt: document.getElementById('sw-txt').checked,
                res: document.getElementById('cfg-res').value,
                fps: document.getElementById('cfg-fps').value
            });
            document.getElementById('dial-exe').innerText = "CONNECTING...";
        }

        function uiSend() {
            const i = document.getElementById('msg-input');
            net.broadcast(i.value);
            pushTerm('LOCAL', i.value, '#eee');
            i.value = '';
        }

        function copyId() {
            navigator.clipboard.writeText(document.getElementById('my-id').innerText);
            pushTerm('SYSTEM', 'ID copied to clipboard');
        }

        function openDial() { document.getElementById('dial-modal').style.display = 'flex'; }
        function closeDial() { document.getElementById('dial-modal').style.display = 'none'; }

        window.onload = () => net.start();
    </script>
</body>
</html>
