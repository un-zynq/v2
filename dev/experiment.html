<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYNQ | Zero Latency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: ui-sans-serif, system-ui; background: #09090b; color: #fff; }
        .video-container { width: 100%; height: 100%; object-fit: cover; background: #000; border-radius: 0.5rem; }
        .hidden { display: none !important; }
        .modal-pulse { animation: modalEnter 0.2s ease-out; }
        @keyframes modalEnter { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="min-h-screen flex flex-col overflow-hidden">

    <header class="h-16 border-b border-zinc-800 bg-zinc-900/50 px-6 flex items-center justify-between backdrop-blur-md">
        <div class="flex items-center gap-2">
            <span class="text-2xl">⚡</span>
            <span class="text-xl font-black tracking-tighter">ZYNQ</span>
        </div>
        <div class="flex items-center gap-4">
            <div class="bg-zinc-800 px-3 py-1.5 rounded-md flex items-center gap-3 border border-zinc-700">
                <span id="myId" class="font-mono text-cyan-400 text-sm">Laden...</span>
                <button onclick="copyMyId()" class="hover:text-cyan-300 transition-colors">📋</button>
            </div>
            <button onclick="location.reload()" class="text-xs bg-red-500/10 text-red-500 border border-red-500/20 px-3 py-1.5 rounded hover:bg-red-500 hover:text-white transition-all">RESET</button>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        <aside class="w-80 border-r border-zinc-800 p-4 flex flex-col gap-6 bg-zinc-900/30">
            <div class="space-y-2">
                <label class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold">Verbinden</label>
                <div class="flex gap-2">
                    <input id="peerIdInput" type="text" placeholder="ID van peer..." class="flex-1 bg-zinc-800 border border-zinc-700 px-3 py-2 rounded focus:outline-none focus:border-cyan-500 font-mono text-sm">
                    <button onclick="connectChat()" class="bg-white text-black px-3 py-2 rounded font-bold text-xs hover:bg-cyan-400 transition-colors">CHAT</button>
                </div>
            </div>

            <button onclick="startVideoCall()" class="w-full py-4 bg-cyan-500 text-black font-black rounded-lg hover:bg-cyan-400 shadow-[0_0_20px_rgba(6,182,212,0.2)] transition-all uppercase tracking-tighter">
                Start Video Call
            </button>

            <div id="activePeerBox" class="hidden mt-4 p-4 rounded-lg bg-cyan-500/10 border border-cyan-500/20">
                <p class="text-[10px] text-cyan-500 uppercase font-bold mb-1">Actieve Sessie</p>
                <div class="flex justify-between items-center">
                    <span id="activePeerId" class="font-mono text-sm"></span>
                    <button onclick="disconnectActive()" class="text-zinc-500 hover:text-white">✕</button>
                </div>
            </div>

            <div class="mt-auto p-4 bg-zinc-800/50 rounded text-[11px] text-zinc-400 leading-relaxed">
                <span class="text-green-500">●</span> P2P Encrypted <br>
                <span class="text-green-500">●</span> Zero-Latency Protocol v1.5
            </div>
        </aside>

        <section class="flex-1 flex flex-col relative">
            <div id="videoArea" class="flex-1 p-4 bg-black relative">
                <div id="placeholder" class="absolute inset-0 flex flex-col items-center justify-center opacity-20">
                    <span class="text-9xl">⚡</span>
                </div>
                
                <div id="videoGrid" class="hidden h-full grid grid-cols-2 gap-4">
                    <div class="relative group">
                        <video id="localVideo" class="video-container shadow-2xl" autoplay muted playsinline></video>
                        <div class="absolute bottom-4 left-4 bg-black/60 px-2 py-1 rounded text-[10px] backdrop-blur-sm uppercase">Jij</div>
                    </div>
                    <div class="relative group">
                        <video id="remoteVideo" class="video-container shadow-2xl" autoplay playsinline></video>
                        <div class="absolute bottom-4 left-4 bg-black/60 px-2 py-1 rounded text-[10px] backdrop-blur-sm uppercase">Peer</div>
                    </div>
                </div>

                <button id="endCallBtn" onclick="endCall()" class="hidden absolute bottom-10 left-1/2 -translate-x-1/2 bg-red-600 hover:bg-red-500 text-white px-8 py-3 rounded-full font-bold shadow-xl transition-all">
                    STOP OPROEP
                </button>
            </div>

            <div class="h-72 border-t border-zinc-800 flex flex-col bg-zinc-900/50">
                <div id="messages" class="flex-1 p-4 overflow-y-auto space-y-2 scrollbar-hide text-sm"></div>
                <div class="p-4 bg-zinc-900 flex gap-2">
                    <input id="messageInput" type="text" placeholder="Bericht..." onkeydown="if(event.key==='Enter') sendMessage()" class="flex-1 bg-zinc-800 border-none px-4 py-3 rounded-full focus:ring-1 ring-cyan-500 outline-none">
                    <button onclick="sendMessage()" class="w-12 h-12 bg-cyan-500 rounded-full flex items-center justify-center text-black hover:scale-105 transition-transform">➤</button>
                </div>
            </div>
        </section>
    </main>

    <div id="incomingModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 items-center justify-center p-4">
        <div class="modal-pulse bg-zinc-900 border border-zinc-700 p-8 rounded-2xl max-w-sm w-full text-center">
            <div id="modalIcon" class="text-5xl mb-4"></div>
            <h3 id="modalTitle" class="text-xl font-bold mb-1"></h3>
            <p id="modalFrom" class="font-mono text-cyan-400 text-sm mb-6"></p>
            <div class="flex gap-3">
                <button onclick="rejectIncoming()" class="flex-1 py-3 bg-zinc-800 rounded-xl font-bold hover:bg-zinc-700">WEIGER</button>
                <button onclick="acceptIncoming()" class="flex-1 py-3 bg-green-600 rounded-xl font-bold hover:bg-green-500">ACCEPTEER</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script>
        // --- LOGIC ENGINE ---
        class ZynqEngine {
            constructor() {
                this.peer = new Peer(this.genId(), { debug: 1 });
                this.conn = null;
                this.callObj = null;
                this.stream = null;
                this.init();
            }

            genId() { return Math.random().toString(36).substring(2, 6).toUpperCase() + '-' + Math.random().toString(36).substring(2, 6).toUpperCase(); }

            init() {
                this.peer.on('open', id => document.getElementById('myId').textContent = id);
                
                // Inkomende Data/Chat
                this.peer.on('connection', c => {
                    this.conn = c;
                    this.setupDataListeners();
                    this.handleIncomingUI(c.peer, 'CHAT');
                });

                // Inkomende Video
                this.peer.on('call', async call => {
                    this.callObj = call;
                    this.handleIncomingUI(call.peer, 'VIDEO');
                });
            }

            setupDataListeners() {
                this.conn.on('open', () => {
                    activePeer = this.conn.peer;
                    updateUI(true);
                    log(`Verbonden met ${activePeer}`, 'system');
                });
                this.conn.on('data', data => {
                    if(data.type === 'msg') log(data.val, 'peer');
                });
                this.conn.on('close', () => this.reset());
            }

            handleIncomingUI(from, type) {
                document.getElementById('modalTitle').innerText = type === 'VIDEO' ? 'Inkomende Video' : 'Chat Verzoek';
                document.getElementById('modalIcon').innerText = type === 'VIDEO' ? '🎥' : '💬';
                document.getElementById('modalFrom').innerText = from;
                document.getElementById('incomingModal').classList.replace('hidden', 'flex');
            }

            async getMedia() {
                if(!this.stream) {
                    this.stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    document.getElementById('localVideo').srcObject = this.stream;
                }
                return this.stream;
            }

            reset() {
                if(this.stream) this.stream.getTracks().forEach(t => t.stop());
                location.reload();
            }
        }

        const zynq = new ZynqEngine();
        let activePeer = null;

        // --- UI ACTIONS ---
        function log(msg, side) {
            const div = document.createElement('div');
            div.className = side === 'me' ? 'flex justify-end' : (side === 'system' ? 'flex justify-center' : 'flex justify-start');
            const inner = document.createElement('div');
            inner.className = side === 'me' ? 'bg-cyan-500 text-black px-4 py-2 rounded-2xl rounded-tr-none font-medium' : 
                             (side === 'system' ? 'text-zinc-500 text-[10px] uppercase tracking-widest' : 'bg-zinc-800 px-4 py-2 rounded-2xl rounded-tl-none');
            inner.innerText = msg;
            div.appendChild(inner);
            const box = document.getElementById('messages');
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function updateUI(connected) {
            document.getElementById('activePeerBox').classList.toggle('hidden', !connected);
            document.getElementById('activePeerId').innerText = activePeer;
        }

        async function startVideoCall() {
            const id = document.getElementById('peerIdInput').value || activePeer;
            if(!id) return;
            const stream = await zynq.getMedia();
            document.getElementById('videoGrid').classList.remove('hidden');
            document.getElementById('placeholder').classList.add('hidden');
            document.getElementById('endCallBtn').classList.remove('hidden');
            
            zynq.callObj = zynq.peer.call(id, stream);
            zynq.callObj.on('stream', remoteStream => {
                document.getElementById('remoteVideo').srcObject = remoteStream;
            });
            activePeer = id;
            updateUI(true);
        }

        function connectChat() {
            const id = document.getElementById('peerIdInput').value;
            if(!id) return;
            zynq.conn = zynq.peer.connect(id);
            zynq.setupDataListeners();
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            if(!input.value || !zynq.conn) return;
            zynq.conn.send({ type: 'msg', val: input.value });
            log(input.value, 'me');
            input.value = '';
        }

        async function acceptIncoming() {
            const isVideo = document.getElementById('modalTitle').innerText.includes('Video');
            if(isVideo) {
                const stream = await zynq.getMedia();
                zynq.callObj.answer(stream);
                document.getElementById('videoGrid').classList.remove('hidden');
                document.getElementById('placeholder').classList.add('hidden');
                document.getElementById('endCallBtn').classList.remove('hidden');
                zynq.callObj.on('stream', rs => document.getElementById('remoteVideo').srcObject = rs);
            } else {
                zynq.setupDataListeners();
            }
            document.getElementById('incomingModal').classList.replace('flex', 'hidden');
        }

        function rejectIncoming() {
            location.reload();
        }

        function copyMyId() {
            const id = document.getElementById('myId').innerText;
            navigator.clipboard.writeText(id);
            log('Mijn ID gekopieerd naar klembord', 'system');
        }
    </script>
</body>
</html>
