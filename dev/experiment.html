<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZYNQ Snapchat PiP</title>
<script src="https://cdn.jsdelivr.net/gh/un-zynq/zynq-lib@1.1.2/t53.js"></script>

<style>
:root{--bg:#0f172a;--card:#111827;--me:#22c55e;--other:#3b82f6;}
body{margin:0;font-family:system-ui;background:var(--bg);color:white;}
.container{max-width:900px;margin:auto;padding:10px;}

.chat{height:200px;overflow:auto;background:var(--card);border-radius:10px;padding:10px;margin-bottom:10px;}
.msg{padding:8px;margin:5px;border-radius:10px;max-width:70%;}
.me{background:var(--me);margin-left:auto;}
.other{background:var(--other);margin-right:auto;}

.top{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px;}
input,button{padding:8px;border-radius:8px;border:none;}
button{background:var(--me);color:white;}

video{width:100%;max-width:300px;border-radius:10px;background:black;}

/* SNAPCHAT STYLE PiP */
.pip{
  position:fixed;
  width:120px;
  height:160px;
  bottom:20px;
  right:20px;
  border:3px solid white;
  border-radius:15px;
  overflow:hidden;
  z-index:999;
  cursor:grab;
}
.pip video{width:100%;height:100%;object-fit:cover;}

</style>
</head>
<body>

<div class="container">
<h2>⚡ ZYNQ SNAP PiP</h2>
<p>ID: <b id="myId"></b></p>

<div class="top">
<input id="peerId" placeholder="Peer ID">
<button onclick="connect()">Connect</button>
<button onclick="startCall()">Call</button>
<button onclick="togglePiP()">Toggle PiP</button>
</div>

<div class="chat" id="chat"></div>

<div class="top">
<input id="msg" placeholder="Bericht">
<button onclick="sendMsg()">Send</button>
</div>

<video id="remote" autoplay></video>
</div>

<!-- FLOATING PiP -->
<div id="pip" class="pip" style="display:none">
  <video id="local" autoplay muted></video>
</div>

<script>
const peer = new ZYNQ.Peer();
let currentPeer=null;
let pipEnabled=false;

peer.on('ready', id=>{
  document.getElementById('myId').innerText=id;
});

peer.on('incoming', req=>{
  if(confirm('Incoming '+req.type)){
    req.accept('local','remote');
    currentPeer=req.from;
  }else req.reject();
});

peer.on('message', d=>addChat(d.data,false));
peer.on('accepted', d=>{currentPeer=d.id;addSystem('Connected '+d.id);});
peer.on('disconnected', d=>addSystem('Disconnected '+d.id));

function connect(){
  const id=peerId.value;
  peer.connect(id);
  currentPeer=id;
}

function sendMsg(){
  if(!currentPeer)return;
  peer.send(currentPeer,msg.value);
  addChat(msg.value,true);
}

function startCall(){
  const id=peerId.value;
  peer.call(id,'local','remote');
}

function addChat(t,me){
  const div=document.createElement('div');
  div.className='msg '+(me?'me':'other');
  div.innerText=t;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function addSystem(t){
  const div=document.createElement('div');
  div.style.textAlign='center';
  div.innerText=t;
  chat.appendChild(div);
}

// SNAPCHAT STYLE PiP TOGGLE
function togglePiP(){
  pipEnabled=!pipEnabled;
  document.getElementById('pip').style.display = pipEnabled ? 'block':'none';
}

// DRAG PiP
const pip=document.getElementById('pip');
let dragging=false,offsetX,offsetY;

pip.addEventListener('mousedown',e=>{
  dragging=true;
  offsetX=e.clientX-pip.offsetLeft;
  offsetY=e.clientY-pip.offsetTop;
});

document.addEventListener('mousemove',e=>{
  if(dragging){
    pip.style.left=(e.clientX-offsetX)+'px';
    pip.style.top=(e.clientY-offsetY)+'px';
    pip.style.right='auto';
    pip.style.bottom='auto';
  }
});

document.addEventListener('mouseup',()=>dragging=false);

// MOBILE TOUCH
pip.addEventListener('touchstart',e=>{
  dragging=true;
  const t=e.touches[0];
  offsetX=t.clientX-pip.offsetLeft;
  offsetY=t.clientY-pip.offsetTop;
});

document.addEventListener('touchmove',e=>{
  if(dragging){
    const t=e.touches[0];
    pip.style.left=(t.clientX-offsetX)+'px';
    pip.style.top=(t.clientY-offsetY)+'px';
    pip.style.right='auto';
    pip.style.bottom='auto';
  }
});

document.addEventListener('touchend',()=>dragging=false);

</script>

</body>
</html>
