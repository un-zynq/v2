<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZYNQ v35 | T47 Stable</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

    <script src="https://cdn.jsdelivr.net/gh/un-zynq/zynq-lib@1.1.2/t50.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <style>
        :root { --primary: #e91e63; --secondary: #007bff; --bg: #f0f2f5; --sidebar-w: 280px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: var(--sidebar-w); background: #fff; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; z-index: 20; transition: transform 0.3s ease; }
        .sidebar-header { padding: 20px; background: var(--primary); color: white; }
        .peer-list { flex: 1; overflow-y: auto; }
        .peer-item { padding: 12px 20px; border-bottom: 1px solid #f8f9fa; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .peer-item.active { background: #e7f3ff; border-left: 4px solid var(--secondary); }
        .disc-btn { color: #ff4d4d; border: none; background: none; font-size: 18px; cursor: pointer; padding: 5px; }

        /* Main Content */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; background: #fff; }
        .header { padding: 10px 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 12px; height: 60px; z-index: 10; background: #fff; }
        
        #video-container { 
            display: none; 
            position: relative; 
            width: 100%; 
            background: #000; 
            aspect-ratio: 16 / 9; 
            max-height: 30vh; 
        }
        video { width: 100%; height: 100%; object-fit: cover; background: #111; }
        #local { 
            position: absolute; bottom: 10px; right: 10px; width: 100px; 
            aspect-ratio: 16 / 9; border-radius: 6px; border: 2px solid rgba(255,255,255,0.8); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 5;
        }

        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #f8f9fa; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 15px; font-size: 14px; word-wrap: break-word; }
        .msg.sent { background: var(--secondary); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.received { background: white; align-self: flex-start; border: 1px solid #eee; border-bottom-left-radius: 2px; }

        .input-area { padding: 12px; display: flex; gap: 10px; border-top: 1px solid #eee; background: #fff; }
        input[type="text"] { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 20px; }

        #reqBox { display:none; position:fixed; top:20px; left:50%; transform:translateX(-50%); width: 90%; max-width: 320px; background:white; padding:20px; border-radius:15px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); z-index: 1000; text-align: center; }
        
        @media (max-width: 768px) { 
            .sidebar { position: fixed; height: 100%; transform: translateX(-100%); } 
            .sidebar.open { transform: translateX(0); } 
            #video-container { max-height: 25vh; }
        }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header"><strong>ZYNQ Pro</strong><br><small id="myId">Connecting...</small></div>
    <div style="padding: 15px;">
        <input type="text" id="targetId" placeholder="Peer ID...">
        <button id="connBtn" onclick="connectPeer()" style="width:100%; margin-top:10px; padding:10px; background:#1a1a1a; color:white; border:none; border-radius:8px; cursor:pointer;">Request Chat</button>
    </div>
    <div class="peer-list" id="peerList"></div>
</div>

<div class="main">
    <div class="header">
        <button onclick="document.getElementById('sidebar').classList.toggle('open')" style="background:none; border:none; font-size:20px; cursor:pointer;">☰</button>
        <div style="flex:1"><h5 id="chat-title" style="margin:0;">No Active Session</h5></div>
        <button id="vBtn" onclick="startCall()" style="display:none; background:#28a745; color:white; border:none; padding:8px 15px; border-radius:20px; cursor:pointer;">Video Call</button>
    </div>
    <div id="video-container">
        <video id="remote" autoplay playsinline></video>
        <video id="local" autoplay muted playsinline></video>
    </div>
    <div id="chat-window"></div>
    <div class="input-area">
        <input type="text" id="msgIn" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button onclick="sendMsg()" style="background:var(--secondary); color:white; border:none; width:40px; height:40px; border-radius:50%; cursor:pointer;">➤</button>
    </div>
</div>

<div id="reqBox">
    <b id="reqType" style="color:var(--primary)">Request</b>
    <p id="reqFrom" style="font-size:11px; margin:10px 0; font-family: monospace;"></p>
    <div style="display:flex; gap:10px;">
        <button onclick="ans(true)" style="flex:1; padding:12px; background:var(--secondary); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">Accept</button>
        <button onclick="ans(false)" style="flex:1; padding:12px; background:#eee; border:none; border-radius:8px; cursor:pointer;">Reject</button>
    </div>
</div>

<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

<script>

/** APP LOGIC **/
const zynq = new ZYNQ.Peer();
let activeId = null, pendingReq = null, history = {}, activeCalls = new Map();

const toast = (t, c) => Toastify({ text: t, duration: 3000, style: { background: c, borderRadius: "10px" } }).showToast();

zynq.on('ready', id => document.getElementById('myId').innerText = `ID: ${id}`);
zynq.on('incoming', r => { pendingReq = r; document.getElementById('reqType').innerText = r.type; document.getElementById('reqFrom').innerText = r.from; document.getElementById('reqBox').style.display = 'block'; });

zynq.on('accepted', d => { toast(`${d.type} CONNECTED`, "#28a745"); initUI(d.id); openChat(d.id); });
zynq.on('rejected', d => toast("REQUEST REJECTED", "#e91e63"));

zynq.on('message', m => {
    if (!history[m.from]) history[m.from] = { msgs: [] };
    history[m.from].msgs.push(m);
    if (activeId === m.from) renderChat(); else { toast("NEW MESSAGE", "#007bff"); initUI(m.from); }
});

zynq.on('stream', d => {
    if (d.type === 'REMOTE') { 
        activeCalls.set(d.id, d.stream); 
        document.getElementById('video-container').style.display = 'block'; 
    }
});

zynq.on('disconnected', d => {
    if (activeId === d.id) {
        if (d.type === 'VIDEO') document.getElementById('video-container').style.display = 'none';
        else toast("SESSION ENDED", "#ff9800");
    }
});

function initUI(id) {
    if (document.getElementById(`p-${id}`)) return;
    const item = document.createElement('div');
    item.id = `p-${id}`; item.className = 'peer-item';
    item.innerHTML = `<div onclick="openChat('${id}')" style="flex:1"><strong>${id.slice(0,10)}</strong></div><button class="disc-btn" onclick="kill('${id}')">✕</button>`;
    document.getElementById('peerList').prepend(item);
}

function openChat(id) {
    activeId = id;
    document.querySelectorAll('.peer-item').forEach(e => e.classList.remove('active'));
    if(document.getElementById(`p-${id}`)) document.getElementById(`p-${id}`).classList.add('active');
    document.getElementById('chat-title').innerText = id;
    document.getElementById('vBtn').style.display = 'block';
    renderChat();
}

function renderChat() {
    const w = document.getElementById('chat-window'); w.innerHTML = '';
    (history[activeId]?.msgs || []).forEach(m => {
        const d = document.createElement('div');
        d.className = `msg ${m.from === 'Me' ? 'sent' : 'received'}`;
        d.innerText = m.data; w.appendChild(d);
    });
    w.scrollTop = w.scrollHeight;
}

function sendMsg() {
    const i = document.getElementById('msgIn'), v = i.value.trim();
    if (activeId && v && zynq.send(activeId, v)) {
        if (!history[activeId]) history[activeId] = { msgs: [] };
        history[activeId].msgs.push({ from: 'Me', data: v });
        renderChat(); i.value = '';
    }
}

async function connectPeer() {
    const v = document.getElementById('targetId').value.trim();
    if (!v || v === zynq.myId) return;
    document.getElementById('connBtn').innerText = "SEARCHING...";
    if (await zynq.isOnline(v)) {
        zynq.connect(v);
        toast("REQUEST SENT", "#28a745");
    } else {
        toast("PEER OFFLINE", "#e91e63");
    }
    document.getElementById('connBtn').innerText = "Request Chat";
}

function startCall() { zynq.call(activeId, 'local', 'remote'); }
function kill(id) { zynq.disconnect(id); document.getElementById(`p-${id}`)?.remove(); }
function ans(ok) { 
    document.getElementById('reqBox').style.display = 'none';
    if (ok) pendingReq.accept('local', 'remote'); else pendingReq.reject();
}
</script>
</body>
</html>
