<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZYNQ App</title>
<script src="https://cdn.jsdelivr.net/gh/un-zynq/zynq-lib@1.1.2/t53.js"></script>

<style>
:root{
  --bg:#0f172a;
  --card:#111827;
  --border:#334155;
  --me:#22c55e;
  --other:#3b82f6;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:white;
}

.container{
  max-width:900px;
  margin:auto;
  padding:15px;
}

h1{ text-align:center; }

.top{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  margin-bottom:10px;
}

input,button{
  padding:10px;
  border-radius:10px;
  border:none;
  font-size:14px;
}

input{ flex:1; min-width:150px; }
button{ background:var(--me); color:white; cursor:pointer; }

.chat{
  border:1px solid var(--border);
  border-radius:15px;
  padding:10px;
  height:250px;
  overflow:auto;
  background:var(--card);
}

.msg{
  padding:8px 12px;
  margin:6px 0;
  border-radius:12px;
  max-width:70%;
  word-wrap:break-word;
}

.me{
  background:var(--me);
  margin-left:auto;
  text-align:right;
  border:2px solid #16a34a;
}

.other{
  background:var(--other);
  margin-right:auto;
  text-align:left;
  border:2px solid #2563eb;
}

.videos{
  display:flex;
  gap:10px;
  margin-top:10px;
  flex-wrap:wrap;
  justify-content:center;
}

.videoBox{
  border:3px solid var(--border);
  border-radius:12px;
  padding:5px;
  text-align:center;
}

.videoBox.me{ border-color:var(--me); }
.videoBox.other{ border-color:var(--other); }

video{
  width:100%;
  max-width:300px;
  border-radius:10px;
  background:black;
}

@media(max-width:600px){
  .chat{ height:200px; }
  video{ max-width:100%; }
}
</style>
</head>
<body>

<div class="container">
<h1>⚡ ZYNQ Chat & Video</h1>

<p style="text-align:center">Jouw ID: <b id="myId">...</b></p>

<div class="top">
  <input id="peerId" placeholder="Peer ID">
  <button onclick="connect()">Connect</button>
  <button onclick="startCall()">📹 Call</button>
</div>

<div class="chat" id="chat"></div>

<div class="top">
  <input id="msg" placeholder="Typ bericht...">
  <button onclick="sendMsg()">Send</button>
</div>

<div class="videos">
  <div class="videoBox me">
    <div>👤 Jij</div>
    <video id="local" autoplay muted></video>
  </div>

  <div class="videoBox other">
    <div>🧑 Peer</div>
    <video id="remote" autoplay></video>
  </div>
</div>
</div>

<script>
const peer = new ZYNQ.Peer();
let currentPeer = null;

peer.on('ready', id => {
  document.getElementById('myId').innerText = id;
});

peer.on('incoming', req => {
  const accept = confirm(`Incoming ${req.type} van ${req.from}`);
  if (accept) {
    if (req.type === 'VIDEO') {
      req.accept('local', 'remote');
    } else {
      req.accept();
    }
    currentPeer = req.from;
  } else {
    req.reject();
  }
});

peer.on('message', data => {
  addChat(data.data, false);
});

peer.on('accepted', data => {
  addSystem(`✔ Connected met ${data.id}`);
  currentPeer = data.id;
});

peer.on('rejected', data => {
  addSystem(`❌ Rejected door ${data.id}`);
});

peer.on('disconnected', data => {
  addSystem(`🔌 Disconnected ${data.id}`);
});

function connect(){
  const id = document.getElementById('peerId').value;
  if(!id) return;
  peer.connect(id);
  currentPeer = id;
}

function sendMsg(){
  const msg = document.getElementById('msg').value;
  if(!currentPeer) return alert('Geen peer');
  peer.send(currentPeer, msg);
  addChat(msg, true);
}

function startCall(){
  const id = document.getElementById('peerId').value;
  if(!id) return;
  peer.call(id, 'local', 'remote');
}

function addChat(text, isMe){
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ' + (isMe ? 'me' : 'other');
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addSystem(text){
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.style.textAlign='center';
  div.style.opacity='0.6';
  div.innerText=text;
  chat.appendChild(div);
}
</script>

</body>
</html>
