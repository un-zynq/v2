<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRN Games</title>
    <script src="https://cdn.jsdelivr.net/gh/un-zynq/v2/dev/lib7.5.02.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            background: #0f0f0f;
            color: #eee;
        }
        header {
            background: #1a1a1a;
            padding: 1.2rem;
            text-align: center;
        }
        h1 { margin: 0; font-size: 2.3rem; }

        .device-info {
            background: #222;
            padding: 12px;
            text-align: center;
            font-size: 1.1rem;
        }
        .device-type { color: #00ffaa; font-weight: bold; }

        .controls {
            padding: 15px;
            background: #1a1a1a;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        input {
            padding: 12px 16px;
            width: 300px;
            max-width: 100%;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
        }
        button {
            padding: 12px 20px;
            background: #0066ff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #3388ff; }
        button.red { background: #cc0000; }
        button.red:hover { background: #ff3333; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .game-card {
            background: #1f1f1f;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            transition: transform 0.2s;
        }
        .game-card:hover { transform: translateY(-6px); }
        .game-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        .game-info {
            padding: 12px;
            text-align: center;
        }
        .game-name {
            font-size: 1.05rem;
            margin: 0 0 10px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .fav-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .empty {
            text-align: center;
            padding: 100px 20px;
            font-size: 1.4rem;
            color: #777;
        }
    </style>
</head>
<body>

    <header>
        <h1>HRN Games</h1>
    </header>

    <div class="device-info">
        Jouw apparaat: <span class="device-type" id="deviceType">Detecteren...</span>
    </div>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="Zoek games...">
        <button onclick="filterByDevice()">Alleen dit apparaat</button>
        <button onclick="showAll()">Toon alles</button>
        <button onclick="showFavs()">❤️ Favorieten</button>
        <button class="red" onclick="resetFilter()">Reset</button>
    </div>

    <div class="grid" id="gameGrid"></div>

    <script>
        let filterDevice = false;

        window.addEventListener('load', async () => {
            if (!window.HRN) {
                document.getElementById('deviceType').textContent = "Library niet geladen";
                return;
            }

            // Toon device type van de library
            const dt = window.HRN.deviceType;
            const labels = {1: "Touch 🖱️", 2: "Desktop 💻", 3: "Smartphone 📲", 4: "Tablet 📱"};
            document.getElementById('deviceType').innerHTML = 
                `${labels[dt] || "Onbekend"} <small>(type ${dt})</small>`;

            await window.HRN.load();
            renderGames(window.HRN.all());

            document.getElementById('searchInput').addEventListener('input', applyFilterAndSearch);
        });

        function renderGames(games) {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';

            if (games.length === 0) {
                grid.innerHTML = `<div class="empty">Geen games gevonden...</div>`;
                return;
            }

            games.forEach(game => {
                const div = document.createElement('div');
                div.className = 'game-card';
                div.innerHTML = `
                    <button class="fav-btn" onclick="toggleFav('${game.alias}', event)">${game.isFav ? '★' : '☆'}</button>
                    <img src="${game.splash}" alt="${game.name}" loading="lazy" 
                         onerror="this.src='https://via.placeholder.com/300x180/333/888?text=No+Image'">
                    <div class="game-info">
                        <div class="game-name">${game.name}</div>
                        <button onclick="play('${game.alias}')" style="width:100%;">Speel nu</button>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        function play(alias) {
            const game = window.HRN.get(alias);
            if (game) window.open(game.url, '_blank');
        }

        function toggleFav(alias, e) {
            e.stopImmediatePropagation();
            window.HRN.toggleFav(alias);
            applyFilterAndSearch();
        }

        function showFavs() {
            renderGames(window.HRN.getFavs());
        }

        function showAll() {
            filterDevice = false;
            document.getElementById('searchInput').value = '';
            renderGames(window.HRN.all());
        }

        function filterByDevice() {
            filterDevice = true;
            applyFilterAndSearch();
        }

        function resetFilter() {
            filterDevice = false;
            document.getElementById('searchInput').value = '';
            renderGames(window.HRN.all());
        }

        function applyFilterAndSearch() {
            const q = document.getElementById('searchInput').value.trim();
            let games = q ? window.HRN.search(q) : window.HRN.all();

            if (filterDevice) {
                games = games.filter(g => g.devices && g.devices.includes(window.HRN.deviceType));
            }

            renderGames(games);
        }
    </script>
</body>
</html>
