<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Settings Core</title>
    <style>
        :root {
            --accent: #89b4fa;
            --border: rgba(255, 255, 255, .08);
            --glass: rgba(255, 255, 255, .04);
            --text: rgba(255, 255, 255, .92);
            --subtext: rgba(255, 255, 255, .5)
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
            user-select: none
        }

        body {
            background: #000;
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #app-root {
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative
        }

        .ambient-bg {
            position: fixed;
            inset: -10px;
            z-index: 1;
            background-size: cover;
            background-position: center;
            filter: brightness(.4) blur(10px);
            transition: opacity .5s ease
        }

        .overlay-dim {
            position: fixed;
            inset: 0;
            z-index: 2;
            background: rgba(0, 0, 0, .2)
        }

        .core-pane {
            position: relative;
            z-index: 10;
            width: 95%;
            max-width: 650px; /* Slightly wider for PC comfort */
            max-height: 95vh;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, .4);
            overflow-y: auto;
        }

        .core-pane::-webkit-scrollbar {
            width: 4px;
        }
        .core-pane::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h2 {
            font-size: 11px;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase
        }

        label {
            font-size: 9px;
            font-weight: 700;
            color: var(--subtext);
            display: block;
            margin-bottom: 6px;
            letter-spacing: .5px;
            text-transform: uppercase
        }

        input[type=text] {
            width: 100%;
            background: rgba(255, 255, 255, .05);
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 6px;
            color: #fff;
            font-size: 11px;
            outline: 0;
            transition: .2s
        }

        input[type=text]:focus {
            border-color: var(--accent)
        }

        /* Layout Grid */
        .split-row {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr; /* Gives more space to wallpapers */
            gap: 15px;
        }

        @media (max-width: 600px) {
            .split-row {
                grid-template-columns: 1fr;
            }
        }

        /* Optimized Grid for 7+ Items */
        .preset-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 items wide on PC */
            gap: 6px;
        }

        @media (max-width: 500px) {
            .preset-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .pre-bg {
            aspect-ratio: 16/9;
            border-radius: 4px;
            cursor: pointer;
            background-size: cover;
            background-position: center;
            border: 1px solid var(--border);
            transition: .2s
        }

        .pre-bg:hover {
            transform: translateY(-2px);
            border-color: var(--accent)
        }

        /* Cloaking specific grid */
        #mask-presets {
            grid-template-columns: repeat(2, 1fr);
        }

        .pre-mask {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px;
            background: rgba(255, 255, 255, .03);
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: .2s
        }

        .pre-mask:hover {
            background: rgba(255, 255, 255, .08);
            border-color: var(--accent)
        }

        .pre-mask img {
            width: 14px;
            height: 14px
        }

        .pre-mask span {
            font-size: 9px;
            color: var(--text);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-action {
            width: 100%;
            background: rgba(255, 255, 255, .05);
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 6px;
            color: #fff;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: .2s
        }

        .btn-action:hover {
            background: rgba(255, 255, 255, .1)
        }

        .slider-wrap {
            width: 100%;
            height: 30px;
            background: rgba(255, 255, 255, .05);
            border: 1px solid var(--border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            position: relative;
            cursor: ew-resize
        }

        .slider-track {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, .1);
            position: relative
        }

        .slider-fill {
            position: absolute;
            height: 100%;
            background: var(--accent);
            width: 0%
        }

        .slider-knob {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            left: 0%;
            top: 50%;
            transform: translate(-50%, -50%)
        }

        .toggle-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: rgba(255, 255, 255, .05);
            border-radius: 6px;
            border: 1px solid var(--border);
            cursor: pointer
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .1);
            transition: .3s
        }

        .active .dot {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent)
        }

        .hidden-file {
            display: none
        }
    </style>
</head>

<body>
    <div id="app-root">
        <div class="ambient-bg" id="bg-layer"></div>
        <div class="overlay-dim"></div>
        <div class="core-pane">
            <div class="nav">
                <h2>Settings</h2>
                <div style="cursor:pointer;font-size:18px" id="closeBtn">×</div>
            </div>

            <div class="split-row">
                <div>
                    <label>Wallpaper Presets</label>
                    <div class="preset-grid" id="bg-presets"></div>
                </div>
                <div>
                    <label>Tab Masking</label>
                    <div class="preset-grid" id="mask-presets"></div>
                </div>
            </div>

            <div class="split-row">
                <div class="toggle-box" id="nav-toggle">
                    <label style="margin:0;color:#fff;cursor:pointer">Side Navigation</label>
                    <div class="dot"></div>
                </div>
                <div class="toggle-box" id="part-toggle">
                    <label style="margin:0;color:#fff;cursor:pointer">Background Particles</label>
                    <div class="dot"></div>
                </div>
            </div>

            <div class="split-row">
                <div>
                    <label>Accent Color</label>
                    <input type="color" id="clr"
                        style="width:100%;height:30px;background:0 0;border:1px solid var(--border);border-radius:6px;cursor:pointer;padding:2px">
                </div>
                <div>
                    <label>Local Upload</label>
                    <button class="btn-action" id="uploadBtn" style="height:30px">Select Image</button>
                    <input type="file" id="bg-file" class="hidden-file" accept="image/*">
                </div>
            </div>

            <div class="row">
                <label>Remote Image URL</label>
                <input type="text" id="bg" placeholder="https://example.com/image.png">
            </div>

            <div class="split-row">
                <div>
                    <label>Particle Density</label>
                    <div class="slider-wrap" id="slider-int" data-min="0.1" data-max="4.0" data-step="0.1">
                        <div class="slider-track">
                            <div class="slider-fill"></div>
                            <div class="slider-knob"></div>
                        </div>
                    </div>
                </div>
                <div>
                    <label>Glass Opacity</label>
                    <div class="slider-wrap" id="slider-op" data-min="0.1" data-max="1" data-step="0.05">
                        <div class="slider-track">
                            <div class="slider-fill"></div>
                            <div class="slider-knob"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="split-row">
                <div>
                    <label>Page Title</label>
                    <input type="text" id="title">
                </div>
                <div>
                    <label>Favicon URL</label>
                    <input type="text" id="fav">
                </div>
            </div>

            <div class="split-row">
                <button class="btn-action" id="resetBgBtn" style="color:#f38ba8; border-color: rgba(243,139,168,0.15)">Reset BG</button>
                <button class="btn-action" id="resetAllBtn" style="color:#f38ba8; border-color: rgba(243,139,168,0.15)">Purge All</button>
            </div>
        </div>
    </div>

    <script>
        (async () => {
            const syncMessage = () => window.parent.postMessage("sync", "*");
            const defaultBg = "https://img.freepik.com/free-vector/black-background-with-wavy-lines_52683-76524.jpg";
            
            const defaults = {
                title: "HRN | CORE",
                clr: "#89b4fa",
                op: .8,
                int: 1.1,
                fav: "",
                part: true
            };

            const bgPresets = [
                { u: "./images/backgrounds/1.jpg" },
                { u: "./images/backgrounds/2.jpg" },
                { u: "./images/backgrounds/3.jpg" },
                { u: "./images/backgrounds/4.jpg" },
                { u: "./images/backgrounds/5.jpg" },
                { u: "./images/backgrounds/6.jpg" },
                { u: "./images/backgrounds/7.jpg" }
            ];

            const maskPresets = [
                { n: "Google", i: "https://www.google.com/favicon.ico", t: "Google" },
                { n: "Drive", i: "https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png", t: "My Drive" },
                { n: "Class", i: "https://www.gstatic.com/classroom/favicon.png", t: "Classes" },
                { n: "Docs", i: "https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico", t: "Google Docs" }
            ];

            let db;

            async function initDB() {
                return new Promise((resolve) => {
                    const request = indexedDB.open("hrn_db", 1);
                    request.onupgradeneeded = (e) => {
                        db = e.target.result;
                        if (!db.objectStoreNames.contains("background")) {
                            db.createObjectStore("background", { keyPath: "id" });
                        }
                    };
                    request.onsuccess = (e) => {
                        db = e.target.result;
                        resolve();
                    };
                    request.onerror = () => resolve();
                });
            }

            async function saveBackground(data) {
                if (!db) await initDB();
                let value = data;
                if (data instanceof Blob) {
                    value = await new Promise((res) => {
                        const reader = new FileReader;
                        reader.onload = (e => res(e.target.result));
                        reader.readAsDataURL(data);
                    });
                }
                db.transaction("background", "readwrite").objectStore("background").put({
                    id: "current_bg",
                    value: value,
                    timestamp: Date.now()
                });
            }

            async function loadBackground() {
                if (!db) await initDB();
                const request = db.transaction("background", "readonly").objectStore("background").get("current_bg");
                return new Promise((resolve) => {
                    request.onsuccess = () => resolve(request.result ? request.result.value : defaultBg);
                    request.onerror = () => resolve(defaultBg);
                });
            }

            async function setBackground(val) {
                const layer = document.getElementById("bg-layer");
                let url = defaultBg;
                if (val instanceof Blob) {
                    url = URL.createObjectURL(val);
                    await saveBackground(val);
                } else if (val) {
                    url = val;
                    await saveBackground(val);
                } else {
                    url = defaultBg;
                    await saveBackground(defaultBg);
                }
                layer.style.backgroundImage = `url('${url}')`;
                syncMessage();
            }

            const bgContainer = document.getElementById("bg-presets");
            bgPresets.forEach((item) => {
                const div = document.createElement("div");
                div.className = "pre-bg";
                div.style.backgroundImage = `url('${item.u}')`;
                div.onclick = () => setBackground(item.u);
                bgContainer.appendChild(div);
            });

            const maskContainer = document.getElementById("mask-presets");
            maskPresets.forEach((item) => {
                const div = document.createElement("div");
                div.className = "pre-mask";
                div.innerHTML = `<img src="${item.i}"><span>${item.n}</span>`;
                div.onclick = () => {
                    const tInput = document.getElementById("title");
                    const fInput = document.getElementById("fav");
                    tInput.value = item.t;
                    fInput.value = item.i;
                    localStorage.setItem("hrn_title", item.t);
                    localStorage.setItem("hrn_fav", item.i);
                    syncMessage();
                };
                maskContainer.appendChild(div);
            });

            function updateSliderUI(id, val) {
                const el = document.getElementById(id);
                if(!el) return;
                const min = parseFloat(el.dataset.min);
                const max = parseFloat(el.dataset.max);
                const pct = (val - min) / (max - min) * 100;
                el.querySelector(".slider-fill").style.width = pct + "%";
                el.querySelector(".slider-knob").style.left = pct + "%";
            }

            function initSlider(id, key) {
                const el = document.getElementById(id);
                const min = parseFloat(el.dataset.min);
                const max = parseFloat(el.dataset.max);
                const step = parseFloat(el.dataset.step);
                let dragging = false;

                const update = (e) => {
                    const rect = el.getBoundingClientRect();
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    let pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
                    let val = min + pct * (max - min);
                    val = Math.round(val / step) * step;
                    updateSliderUI(id, val);
                    localStorage.setItem("hrn_" + key, val.toFixed(2));
                    syncMessage();
                };

                el.onmousedown = (e) => { dragging = true; update(e); };
                window.onmousemove = (e) => { if (dragging) update(e); };
                window.onmouseup = () => dragging = false;
                el.ontouchstart = (e) => { dragging = true; update(e); };
                window.ontouchmove = (e) => { if (dragging) update(e); };
                window.ontouchend = () => dragging = false;

                const saved = localStorage.getItem("hrn_" + key) || (id.includes("int") ? 1.1 : .8);
                updateSliderUI(id, parseFloat(saved));
            }

            initSlider("slider-int", "int");
            initSlider("slider-op", "op");

            ["title", "clr", "fav", "bg"].forEach((id) => {
                const input = document.getElementById(id);
                input.value = localStorage.getItem("hrn_" + id) || (id === "bg" ? "" : defaults[id]);
                input.oninput = () => {
                    localStorage.setItem("hrn_" + id, input.value);
                    if (id === "clr") document.documentElement.style.setProperty("--accent", input.value);
                    if (id === "bg") setBackground(input.value);
                    syncMessage();
                };
            });

            const navToggle = document.getElementById("nav-toggle");
            let isSideNav = localStorage.getItem("hrn_nav_mode") !== "bottom";
            navToggle.classList.toggle("active", isSideNav);
            navToggle.onclick = () => {
                isSideNav = !isSideNav;
                navToggle.classList.toggle("active", isSideNav);
                localStorage.setItem("hrn_nav_mode", isSideNav ? "side" : "bottom");
                syncMessage();
            };

            const partToggle = document.getElementById("part-toggle");
            let partsEnabled = localStorage.getItem("hrn_part") !== "false";
            partToggle.classList.toggle("active", partsEnabled);
            partToggle.onclick = () => {
                partsEnabled = !partsEnabled;
                partToggle.classList.toggle("active", partsEnabled);
                localStorage.setItem("hrn_part", partsEnabled);
                syncMessage();
            };

            document.getElementById("uploadBtn").onclick = () => document.getElementById("bg-file").click();
            document.getElementById("bg-file").onchange = async (e) => {
                const file = e.target.files[0];
                if (file) await setBackground(file);
            };

            document.getElementById("resetBgBtn").onclick = () => setBackground(defaultBg);
            document.getElementById("resetAllBtn").onclick = () => {
                if(confirm("Purge all data?")) {
                    localStorage.clear();
                    location.reload();
                }
            };

            document.getElementById("closeBtn").onclick = () => window.parent.postMessage("close", "*");
            document.documentElement.style.setProperty("--accent", localStorage.getItem("hrn_clr") || defaults.clr);

            await initDB();
            setBackground(await loadBackground());
        })();
    </script>
</body>

</html>
